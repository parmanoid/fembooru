<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru — Загрузить</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="logo" href="index.html">Boo<span>ru</span></a>
  <div class="nav-search">
    <input type="text" placeholder="Поиск по тегам…" onclick="location.href='index.html'" readonly style="cursor:pointer">
    <span class="search-icon">🔍</span>
  </div>
  <div class="nav-actions" id="nav-actions">
    <a href="login.html" class="btn btn-ghost">Войти</a>
  </div>
</nav>

<div class="upload-layout">
  <div class="upload-card">
    <h2 class="upload-title">⬆ Загрузить пост</h2>

    <!-- File Drop Zone -->
    <div class="form-group">
      <label class="form-label">Файл <span style="color:var(--red)">*</span></label>
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="file-input" accept="image/*,video/*">
        <div class="drop-zone-icon">📎</div>
        <div class="drop-zone-text">Нажмите или перетащите файл</div>
        <div class="drop-zone-hint">Изображения до 30МБ, видео до 200МБ • JPG, PNG, GIF, WEBP, MP4, WEBM</div>
      </div>
      <div id="upload-preview" class="upload-preview"></div>
    </div>

    <!-- Progress -->
    <div id="upload-progress" class="upload-progress">
      <div id="progress-bar" class="upload-progress-bar" style="width:0%"></div>
    </div>

    <!-- Title -->
    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input type="text" id="title-input" placeholder="Название поста…" maxlength="200">
    </div>

    <!-- Tags Field -->
    <div class="form-group">
      <label class="form-label">Теги <span style="color:var(--text3)">(появятся под постом и в сайдбаре)</span></label>
      <div class="tags-input-wrap">
        <div id="tags-pills" class="tags-pills"></div>
        <input type="text" id="tags-input" placeholder="Введите тег и нажмите Enter или , или пробел">
        <div id="tags-autocomplete" class="autocomplete-dropdown"></div>
      </div>
    </div>

    <!-- Description Field -->
    <div class="form-group">
      <label class="form-label">
        Описание
        <span style="color:var(--text3)">(поддерживает #теги и @упоминания)</span>
      </label>
      <div class="desc-wrap">
        <textarea id="desc-input" placeholder="Описание поста… Используйте #тег для встроенных тегов и @ник для упоминаний пользователей" rows="4" maxlength="2000"></textarea>
        <div id="mention-dropdown" class="mention-dropdown"></div>
      </div>
    </div>

    <!-- Mirrors hint -->
    <p style="font-size:12px;color:var(--text3);margin-bottom:16px;padding:8px;background:var(--bg3);border-radius:6px;border:1px solid var(--border)">
      📡 Изображения загружаются через <strong>imgbb</strong> (основной) → telegra.ph (резерв).
      Видео через <strong>catbox.moe</strong> → litterbox.catbox.moe (резерв).
    </p>

    <!-- Submit -->
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <a href="index.html" class="btn btn-ghost">Отмена</a>
      <button id="submit-btn" class="btn btn-primary" onclick="submitUpload()" style="padding:10px 28px">
        🚀 Опубликовать
      </button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script src="js/upload-page.js"></script>
</body>
</html>
