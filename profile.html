<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booru — Профиль</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <a class="logo" href="index.html">Boo<span>ru</span></a>
  <div class="nav-search">
    <input type="text" placeholder="Поиск по тегам…" onclick="location.href='index.html'" readonly style="cursor:pointer">
    <span class="search-icon">🔍</span>
  </div>
  <div class="nav-actions" id="nav-actions">
    <a href="login.html" class="btn btn-ghost">Войти</a>
  </div>
</nav>

<div class="profile-layout" id="profile-container">

  <!-- Profile Header -->
  <div class="profile-header">
    <div class="profile-avatar-wrap">
      <img id="profile-avatar" class="profile-avatar" src="" alt="avatar" onerror="this.src=DEFAULT_AVATAR">
      <button class="avatar-edit-btn" id="avatar-edit-btn" style="display:none" onclick="document.getElementById('edit-avatar-input-quick').click()">✎</button>
      <input type="file" id="edit-avatar-input-quick" accept="image/*" style="display:none" onchange="quickAvatarUpload(this)">
    </div>

    <div class="profile-info">
      <div class="profile-username" id="profile-username">@username</div>

      <div class="profile-status" id="profile-status" style="display:none">💭</div>

      <div class="profile-about" id="profile-about" style="display:none"></div>

      <div class="profile-stats">
        <div class="profile-stat">
          <div class="profile-stat-num" id="posts-count">—</div>
          <div class="profile-stat-label">постов</div>
        </div>
        <div class="profile-stat">
          <div class="profile-stat-num" id="reposts-count">—</div>
          <div class="profile-stat-label">репостов</div>
        </div>
      </div>
    </div>

    <!-- Edit button (own profile) -->
    <button id="edit-profile-btn" class="btn btn-ghost profile-edit-btn" onclick="openEditProfile()" style="display:none">
      ✎ Редактировать
    </button>
  </div>

  <!-- Tabs -->
  <div class="profile-tabs">
    <div class="profile-tab active" data-tab="posts" onclick="switchTab('posts')">Посты</div>
    <div class="profile-tab" data-tab="reposts" onclick="switchTab('reposts')">Репосты</div>
  </div>

  <!-- Content Grid -->
  <div id="profile-content">
    <div class="loading-spinner"><div class="spinner"></div></div>
  </div>

</div>

<!-- Edit Profile Modal -->
<div id="edit-modal" class="modal-overlay" style="display:none" onclick="if(event.target===this) closeEditProfile()">
  <div class="modal">
    <div class="modal-title">✎ Редактировать профиль</div>

    <div class="form-group">
      <label class="form-label">Аватар</label>
      <div style="display:flex;align-items:center;gap:12px">
        <img id="avatar-preview" src="" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:2px solid var(--border)" onerror="this.src=DEFAULT_AVATAR">
        <div>
          <input type="file" id="edit-avatar-input" accept="image/*" style="display:none" onchange="previewAvatar(this)">
          <button class="btn btn-ghost" onclick="document.getElementById('edit-avatar-input').click()">📁 Выбрать фото</button>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Статус <span style="color:var(--text3)">(облако мыслей)</span></label>
      <input type="text" id="edit-status" placeholder="Что думаете?" maxlength="100">
    </div>

    <div class="form-group">
      <label class="form-label">О себе</label>
      <textarea id="edit-about" placeholder="Расскажите о себе…" rows="3" maxlength="500"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeEditProfile()">Отмена</button>
      <button class="btn btn-primary" onclick="saveProfile()">Сохранить</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/app.js"></script>
<script src="js/profile-page.js"></script>

<script>
// Show edit/avatar buttons for own profile
onAuthChange((user) => {
  const editBtn   = document.getElementById('edit-profile-btn');
  const avatarBtn = document.getElementById('avatar-edit-btn');
  const isOwn = user && user.uid === profileUid;
  if (editBtn)   editBtn.style.display   = isOwn ? '' : 'none';
  if (avatarBtn) avatarBtn.style.display = isOwn ? '' : 'none';

  // Sync avatar preview in modal
  const avatarPreview = document.getElementById('avatar-preview');
  if (avatarPreview && profileData) {
    avatarPreview.src = profileData.avatar || DEFAULT_AVATAR;
  }
});

// Update reposts count
async function updateRepostsCount() {
  if (!profileUid) return;
  const snap = await db.ref('reposts/' + profileUid).once('value');
  const countEl = document.getElementById('reposts-count');
  if (countEl) countEl.textContent = snap.numChildren();
}
setTimeout(updateRepostsCount, 1000);

function previewAvatar(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('avatar-preview').src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function quickAvatarUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const user = getCurrentUser();
  if (!user) return;
  try {
    toast('Загрузка аватара…');
    const result = await uploadImageFile(file);
    await db.ref('users/' + user.uid).update({ avatar: result.primary });
    document.getElementById('profile-avatar').src = result.primary;

    // Update posts
    const postsSnap = await db.ref('posts').orderByChild('uid').equalTo(user.uid).once('value');
    const updates = {};
    postsSnap.forEach(c => { updates['posts/' + c.key + '/authorAvatar'] = result.primary; });
    if (Object.keys(updates).length) await db.ref().update(updates);

    toast('Аватар обновлён!', 'success');
  } catch(e) {
    toast('Ошибка: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
