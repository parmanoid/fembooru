<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Booru</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <div class="logo">BOORU</div>

  <input id="search" placeholder="Поиск тегов...">

  <div id="userPanel">
    <span id="nickname">Гость</span>
    <button onclick="openAuth()">Войти</button>
  </div>
</header>

<!-- AUTH -->
<div id="authModal" class="modal hidden">
  <div class="modal-content">
    <h2>Вход / Регистрация</h2>
    <input id="loginNick" placeholder="Ник">
    <input id="loginPass" type="password" placeholder="Пароль">
    <button onclick="login()">Войти / Регистрация</button>
    <button onclick="closeAuth()">Закрыть</button>
  </div>
</div>

<!-- CREATE POST -->
<div class="createPost">
  <input type="file" id="file">
  <input id="tags" placeholder="теги">
  <textarea id="desc" placeholder="описание (#теги @юзеры)"></textarea>
  <button onclick="createPost()">Опубликовать</button>
</div>

<!-- POSTS -->
<div id="posts" class="posts"></div>

<script type="module" src="app.js"></script>

<script>
function openAuth(){ document.getElementById("authModal").classList.remove("hidden"); }
function closeAuth(){ document.getElementById("authModal").classList.add("hidden"); }
</script>

</body>
</html>
