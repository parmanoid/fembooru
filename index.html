<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fembooru</title>
    <link rel="preconnect" href="https://cdn.fluidplayer.com">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --card-h: #27272a;
            --accent: #e11d48; --accent-h: #f43f5e;
            --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a;
            --radius: 12px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* NAV */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; height: 60px; flex-shrink: 0; }
        .nav-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
        .nav-avatar:hover { border-color: var(--accent); }
        .top-nav h1 { color: var(--accent); font-size: 22px; cursor: pointer; font-weight: 900; margin: 0; }
        .menu-btn { background: none; border: none; color: white; font-size: 26px; cursor: pointer; display: none; }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #0f0f11; padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; transition: 0.3s; }
        .lang-switcher { display: flex; gap: 5px; margin-bottom: 25px; background: #1f1f22; padding: 4px; border-radius: 8px;}
        .lang-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 6px 0; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: #3f3f46; color: #fff; }

        /* TABS */
        .tabs-wrap { background: rgba(15,15,17,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); sticky; top: 0; z-index: 500; }
        .app-tabs { display: flex; max-width: 600px; margin: 0 auto; }
        .app-tab { flex: 1; background: transparent; border: none; color: var(--muted); padding: 16px 0; font-size: 13px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 800; text-transform: uppercase; }
        .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .content { flex: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .tab-content { padding: 20px; display: none; flex-direction: column; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: flex; }

        /* GRID */
        .gallery { display: flex; flex-wrap: wrap; gap: 12px; padding-bottom: 50px; }
        .gallery::after { content: ""; flex-grow: 10; }
        .post-card { flex: 1 1 220px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; height: fit-content; }
        .post-card:hover { border-color: #444; transform: translateY(-3px); }
        .pc-media { width: 100%; height: 250px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .pc-media img, .pc-media video { width: 100%; height: 100%; object-fit: cover; }
        .nsfw-tag { position: absolute; top: 10px; left: 10px; background: var(--accent); color: white; font-size: 9px; font-weight: 900; padding: 3px 7px; border-radius: 4px; z-index: 5; }
        .pc-info { padding: 12px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; }

        /* SHORTS */
        .shorts-feed { height: calc(100vh - 110px); overflow-y: scroll; scroll-snap-type: y mandatory; margin: -20px; scrollbar-width: none; }
        .short-wrap { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; background: #000; }
        .short-ui-pc { display: flex; gap: 20px; height: 90%; width: 100%; max-width: 800px; justify-content: center; }
        .short-video { aspect-ratio: 9/16; height: 100%; background: #000; border-radius: 12px; position: relative; border: 1px solid #333; overflow: hidden; }
        .short-video video { width: 100%; height: 100%; object-fit: cover; }
        .short-btns { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; padding-bottom: 20px; }
        .s-btn { width: 50px; height: 50px; border-radius: 50%; background: #1f1f22; border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 20px; position: relative; }
        .s-btn.active { color: var(--accent); border-color: var(--accent); }
        .s-num { position: absolute; bottom: -18px; font-size: 10px; color: var(--muted); width: 100%; text-align: center; }

        /* BOARD */
        .board-post { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin: 0 auto 15px; width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 12px; }
        .b-header { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .b-avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; }
        .b-media { border-radius: 8px; overflow: hidden; border: 1px solid #333; max-height: 400px; width: 100%; display: flex; justify-content: center; background: #000; }
        .b-media img, .b-media video { max-width: 100%; max-height: 400px; object-fit: contain; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal { background: var(--card); padding: 30px; border-radius: var(--radius); width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        input, textarea, button { padding: 12px; border-radius: 8px; border: 1px solid var(--border); background: #27272a; color: white; outline: none; font-size: 14px; }
        .btn-main { background: var(--accent); border: none; font-weight: 700; cursor: pointer; }
        
        .post-view { display: none; padding: 20px; animation: fadeIn 0.3s; }
        .pv-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .pv-main { flex: 2; min-width: 300px; }
        .pv-side { flex: 1; min-width: 280px; background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); height: fit-content; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        #loader { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 45px; height: 45px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .short-ui-pc { flex-direction: column; height: 100%; max-width: 100%; gap: 0; }
            .short-video { width: 100%; border-radius: 0; border: none; }
            .short-btns { position: absolute; right: 12px; bottom: 80px; z-index: 10; }
            .s-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border: none; width: 45px; height: 45px;}
            .short-info { position: absolute; bottom: 20px; left: 15px; text-shadow: 0 1px 4px #000; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div class="toast-container" id="toastBox" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:8px;"></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalTitle">Вход</h2>
        <input type="text" id="authName" placeholder="Никнейм">
        <input type="password" id="authPass" placeholder="Пароль">
        <button class="btn-main" onclick="window.submitAuth()">Войти</button>
        <button onclick="window.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted);">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2>Мой профиль</h2>
        <p style="font-size:11px; color:var(--muted)">Загрузи новую аватарку:</p>
        <input type="file" id="editAvaFile" accept="image/*">
        <textarea id="editBio" placeholder="Твое био..." rows="3"></textarea>
        <button class="btn-main" onclick="window.saveProfile()">Сохранить</button>
        <button onclick="window.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted);">Закрыть</button>
    </div>
</div>

<header class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="window.openMyProfile()">
        <h1 onclick="window.goHome()">fembooru</h1>
    </div>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</header>

<div class="sidebar-overlay" id="menuOverlay" onclick="window.toggleMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:140;"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="window.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="window.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="window.setLang('en')" id="lang-en">EN</button>
        </div>
        <div class="auth-box">
            <div id="loggedOutView"><button class="btn-main" style="width:100%" onclick="window.openAuth()">Вход / Рега</button></div>
            <div id="loggedInView" style="display:none">
                <div id="userNameDisplay" style="font-weight:900; cursor:pointer" onclick="window.openMyProfile()">User</div>
                <button onclick="window.doLogout()" style="width:100%; background:#27272a; margin-top:10px; font-size:12px;">Выйти</button>
            </div>
        </div>
        <div id="sideFilters">
            <h3 data-i18n="feedFilter">Фильтр</h3>
            <div class="filter-group">
                <label><input type="radio" name="rating" value="all" checked onchange="window.renderCurrentTab()"> <span>Всё</span></label>
                <label><input type="radio" name="rating" value="sfw" onchange="window.renderCurrentTab()"> <span>SFW</span></label>
                <label><input type="radio" name="rating" value="nsfw" onchange="window.renderCurrentTab()"> <span style="color:var(--accent)">NSFW</span></label>
            </div>
            <h3 data-i18n="tagSearch">Поиск</h3>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Тэги..." style="width:100%">
                <div id="hints" class="hints"></div>
            </div>
        </div>
    </aside>

    <main class="content">
        <nav class="tabs-wrap">
            <div class="app-tabs">
                <button class="app-tab active" onclick="window.switchTab('gallery')" id="tab-gallery">Галерея</button>
                <button class="app-tab" onclick="window.switchTab('board')" id="tab-board">Борда</button>
                <button class="app-tab" onclick="window.switchTab('shorts')" id="tab-shorts">Шортсы</button>
            </div>
        </nav>

        <div id="tab-content-gallery" class="tab-content active">
            <div class="upload-section" id="upGal" style="display:none">
                <div class="upload-controls">
                    <input type="file" id="fGal" accept="image/*,video/*" multiple>
                    <input type="text" id="t1G" placeholder="Главный тэг">
                    <input type="text" id="t2G" placeholder="Доп. тэги">
                    <label><input type="checkbox" id="nGal"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('gallery')">Пост</button>
                </div>
            </div>
            <div class="gallery" id="galFeed"></div>
        </div>

        <div id="tab-content-board" class="tab-content">
            <div class="upload-section" id="upBoard" style="display:none">
                <textarea id="txtB" placeholder="Текст поста..." rows="2" style="width:100%; margin-bottom:10px"></textarea>
                <div class="upload-controls">
                    <input type="file" id="fBoard" accept="image/*,video/*">
                    <label><input type="checkbox" id="nBoard"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('board')">Запостить</button>
                </div>
            </div>
            <div class="board-feed" id="boardFeed"></div>
        </div>

        <div id="tab-content-shorts" class="tab-content" style="padding:0">
            <div id="upShorts" style="display:none; padding:15px; background:var(--card); border-bottom:1px solid var(--border)">
                <div class="upload-controls">
                    <input type="file" id="fShorts" accept="video/*">
                    <input type="text" id="txtS" placeholder="Описание видео...">
                    <label><input type="checkbox" id="nShorts"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('shorts')">Залить</button>
                </div>
            </div>
            <div class="shorts-feed" id="shortsFeed"></div>
        </div>

        <div id="profileMode" class="view-mode">
            <button onclick="window.closeProfile()" style="margin-bottom:20px; background:#27272a">← Назад</button>
            <div class="profile-header">
                <img src="" id="pAva" class="p-avatar">
                <div>
                    <h2 id="pName">User</h2>
                    <p id="pBio" style="color:var(--muted); font-size:14px"></p>
                    <button id="pEditBtn" class="btn-main" style="padding:5px 12px; display:none; font-size:11px" onclick="window.openModal('editProfileModal')">Настроить</button>
                </div>
            </div>
            <div class="app-tabs" style="margin-bottom:20px">
                <button class="app-tab active" onclick="window.switchProfTab('uploads')" id="pt-uploads">Моё</button>
                <button class="app-tab" onclick="window.switchProfTab('reposts')" id="pt-reposts">Репосты</button>
            </div>
            <div class="gallery" id="profFeed"></div>
        </div>

        <div id="postMode" class="view-mode">
            <button onclick="window.closePost()" style="margin-bottom:20px; background:#27272a">← Назад</button>
            <div class="pv-layout" id="pvContainer"></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI", authDomain: "database-2560e.firebaseapp.com", databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "database-2560e", storageBucket: "database-2560e.firebasestorage.app", messagingSenderId: "52592277568", appId: "1:52592277568:web:4c49e5f818ee7348abc7a5" };
    const IMGBB = "120a27bcbb28d3ffd9f03bc4b32bb54f";
    const app = initializeApp(config); const db = getDatabase(app); const auth = getAuth(app);
    
    window.AppState = { user: null, isAdmin: false, data: { gallery: [], board: [], shorts: [] }, users: {}, currentTab: 'gallery', profUid: null, profTab: 'uploads', lang: 'ru', tags: {} };

    // UTILS
    window.showToast = (m, e=false) => { const b = document.getElementById('toastBox'), t = document.createElement('div'); t.className = `toast ${e?'error':''} show`; t.innerText = m; b.appendChild(t); setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),400)}, 3000); };
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleMenu = () => { const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay'); s.classList.toggle('open'); o.style.display = s.classList.contains('open') ? 'block' : 'none'; };

    // AUTH
    onAuthStateChanged(auth, u => {
        AppState.user = u; Appstate.isAdmin = u && u.email === "test@anon.ru";
        ['Gal', 'Board', 'Shorts'].forEach(i => document.getElementById('up'+i).style.display = u ? 'block' : 'none');
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block';
        document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        if(u) {
            document.getElementById('userNameDisplay').innerText = u.displayName;
            get(ref(db, 'users/'+u.uid)).then(s => { if(s.exists()) document.getElementById('navAvatar').src = s.val().avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png"; });
        }
        fetchAll();
    });

    function genMail(n) { const r = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'}; return n.toLowerCase().replace(/[а-яё]/g, m => r[m] || m).replace(/[^a-z0-9]/g, '') + '@anon.ru'; }
    window.submitAuth = async () => {
        const n = document.getElementById('authName').value.trim(), p = document.getElementById('authPass').value;
        if(!n || p.length < 6) return window.showToast('Данные неверны', true);
        const e = genMail(n);
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) {
            try { const res = await createUserWithEmailAndPassword(auth, e, p); await updateProfile(res.user, { displayName: n }); await set(ref(db, 'users/'+res.user.uid), { name: n, avatar: "https://i.ibb.co/3sW3xQy/default-avatar.png", bio: '' }); } catch(e2) { window.showToast('Ошибка входа', true); }
        }
        window.closeModal('authModal');
    };
    window.doLogout = () => signOut(auth);

    // UPLOAD
    async function upImg(file) { const fd = new FormData(); fd.append('image', file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, { method: 'POST', body: fd }); const d = await res.json(); return d.success ? d.data.url : null; }
    async function upCat(file) { const fd = new FormData(); fd.append('reqtype', 'fileupload'); fd.append('fileToUpload', file); const res = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd }); return res.ok ? await res.text() : null; }

    window.upload = async (type) => {
        const input = document.getElementById(type==='gallery'?'fGal':type==='board'?'fBoard':'fShorts');
        if(!input.files.length) return;
        document.getElementById('loader').style.display='flex';
        for(let f of input.files) {
            try {
                let url = f.type.startsWith('image/') ? await upImg(f) : await upCat(f);
                if(!url) url = await upCat(f);
                const nsfw = document.getElementById('n'+(type.charAt(0).toUpperCase()+type.slice(1))).checked;
                const data = { url, uid: AppState.user.uid, author: AppState.user.displayName, time: Date.now(), isVid: f.type.includes('video'), nsfw };
                if(type==='gallery') { data.t1 = document.getElementById('t1G').value || 'art'; data.t2 = document.getElementById('t2G').value || ''; }
                if(type==='board') data.text = document.getElementById('txtB').value;
                if(type==='shorts') data.text = document.getElementById('txtS').value;
                await push(ref(db, type), data);
            } catch(e) { window.showToast('Сбой загрузки', true); }
        }
        document.getElementById('loader').style.display='none'; input.value='';
    };

    // PROFILE
    window.openMyProfile = () => AppState.user ? window.openProfile(AppState.user.uid) : window.openAuth();
    window.openProfile = async (uid) => {
        AppState.profUid = uid; AppState.currentPostId = null;
        document.getElementById('profileMode').style.display = 'block';
        const d = (await get(ref(db, 'users/'+uid))).val() || {};
        document.getElementById('pAva').src = d.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
        document.getElementById('pName').innerText = d.name || 'Anon';
        document.getElementById('pBio').innerText = d.bio || '';
        document.getElementById('pEditBtn').style.display = AppState.user?.uid === uid ? 'block' : 'none';
        window.switchProfTab('uploads');
    };
    window.closeProfile = () => { AppState.profUid = null; document.getElementById('profileMode').style.display = 'none'; window.renderCurrentTab(); };
    window.saveProfile = async () => {
        const file = document.getElementById('editAvaFile').files[0], bio = document.getElementById('editBio').value;
        let ava = document.getElementById('pAva').src;
        document.getElementById('loader').style.display='flex';
        if(file) ava = await upImg(file);
        await update(ref(db, 'users/'+AppState.user.uid), { avatar: ava, bio });
        document.getElementById('navAvatar').src = ava;
        document.getElementById('loader').style.display='none';
        window.closeModal('editProfileModal'); window.openProfile(AppState.user.uid);
    };
    window.switchProfTab = (t) => { AppState.profTab = t; document.querySelectorAll('#profileMode .app-tab').forEach(b => b.classList.remove('active')); document.getElementById('pt-'+t).classList.add('active'); renderProfFeed(); };

    // FETCH & RENDER
    function fetchAll() {
        onValue(ref(db, 'users'), s => { AppState.users = s.val() || {}; if(AppState.profUid) renderProfFeed(); });
        ['gallery', 'board', 'shorts'].forEach(t => onValue(ref(db, t), s => {
            const a = []; AppState.tags = {};
            s.forEach(c => { 
                const d = c.val(); a.push({id:c.key,...d});
                if(t==='gallery') [d.t1, ...(d.t2||'').split(' ')].filter(Boolean).forEach(x => AppState.tags[x.toLowerCase()] = (AppState.tags[x.toLowerCase()]||0)+1);
            });
            AppState.data[t] = a.reverse(); renderCurrentTab();
        }));
    }

    window.switchTab = (t) => {
        AppState.currentTab = t; AppState.profUid = null;
        document.querySelectorAll('.app-tab').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tab-content-'+t).classList.add('active');
        document.getElementById('profileMode').style.display='none'; document.getElementById('postMode').style.display='none';
        renderCurrentTab();
    };

    window.renderCurrentTab = () => {
        if(AppState.profUid) return renderProfFeed();
        const rf = document.querySelector('input[name="rating"]:checked').value;
        const q = document.getElementById('search').value.toLowerCase().split(' ').filter(Boolean);
        const filter = p => {
            if(rf==='sfw' && p.nsfw) return false; if(rf==='nsfw' && !p.nsfw) return false;
            if(AppState.currentTab==='gallery' && q.length) return q.every(w => `${p.t1} ${p.t2 || ''}`.toLowerCase().includes(w));
            return true;
        };
        const feed = AppState.data[AppState.currentTab].filter(filter);
        if(AppState.currentTab==='gallery') renderGal(feed, 'galFeed');
        if(AppState.currentTab==='board') renderBoard(feed);
        if(AppState.currentTab==='shorts') renderShorts(feed);
    };

    function renderGal(arr, target) {
        const el = document.getElementById(target); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'post-card'; div.onclick = () => window.openPost(p.id, AppState.currentTab);
            div.innerHTML = `${p.nsfw?'<div class="nsfw-tag">NSFW</div>':''}
                <div class="pc-media">${p.isVid?'<video src="'+p.url+'#t=0.1" muted></video>':'<img src="'+p.url+'" loading="lazy">'}</div>
                <div class="pc-info"><span style="color:#60a5fa">#${p.t1}</span><span>❤ ${p.likes?Object.keys(p.likes).length:0}</span></div>`;
            el.appendChild(div);
        });
    }

    function renderBoard(arr) {
        const el = document.getElementById('boardFeed'); el.innerHTML = '';
        arr.forEach(p => {
            const ava = AppState.users[p.uid]?.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
            const div = document.createElement('div'); div.className = 'board-post';
            div.innerHTML = `<div class="b-header" onclick="window.openProfile('${p.uid}')"><img src="${ava}" class="b-avatar"> ${p.author}</div>
                ${p.text?'<div>'+p.text+'</div>':''} ${p.url?`<div class="b-media" onclick="window.openPost('${p.id}','board')">${p.isVid?'<video src="'+p.url+'" controls></video>':'<img src="'+p.url+'">'}</div>`:''}
                <div class="action-row">
                    <button class="btn-action ${p.likes?.[AppState.user?.uid]?'active':''}" onclick="window.like('${p.id}','board')">❤ ${p.likes?Object.keys(p.likes).length:0}</button>
                    <button class="btn-action" onclick="window.repost('${p.id}','board')">🔄 Репост</button>
                    <button class="btn-action" onclick="window.openPost('${p.id}','board')">💬</button>
                </div>`;
            el.appendChild(div);
        });
    }

    function renderShorts(arr) {
        const el = document.getElementById('shortsFeed'); el.innerHTML = '';
        arr.forEach(p => {
            div = document.createElement('div'); div.className = 'short-wrap';
            div.innerHTML = `<div class="short-ui-pc">
                <div class="short-video">
                    <video src="${p.url}" loop playsinline preload="metadata" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="short-info" style="position:absolute; bottom:20px; left:20px; z-index:5">
                        <b onclick="window.openProfile('${p.uid}')" style="cursor:pointer">@${p.author}</b><p style="font-size:13px">${p.text||''}</p>
                    </div>
                </div>
                <div class="short-btns">
                    <button class="s-btn ${p.likes?.[AppState.user?.uid]?'active':''}" onclick="window.like('${p.id}','shorts')">❤<span class="s-num">${p.likes?Object.keys(p.likes).length:0}</span></button>
                    <button class="s-btn" onclick="window.repost('${p.id}','shorts')">🔄</button>
                    <button class="s-btn" onclick="window.openPost('${p.id}','shorts')">💬</button>
                    ${AppState.user?.uid===p.uid||AppState.isAdmin?'<button class="s-btn" onclick="window.del(\''+p.id+'\',\'shorts\')">🗑</button>':''}
                </div>
            </div>`;
            el.appendChild(div);
        });
        const obs = new IntersectionObserver(e => e.forEach(v => { const vid = v.target.querySelector('video'); if(v.isIntersecting) vid.play(); else vid.pause(); }), {threshold:0.7});
        document.querySelectorAll('.short-wrap').forEach(w => obs.observe(w));
    }

    window.openPost = (id, type) => {
        const p = AppState.data[type].find(x => x.id === id); if(!p) return;
        AppState.currentPostId = id; document.getElementById('postMode').style.display='block';
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const tagsHtml = `<span style="color:var(--accent); cursor:pointer" onclick="window.addSearch('${p.t1}')">#${p.t1}</span> ` + (p.t2||'').split(' ').filter(Boolean).map(t => `<span style="color:#60a5fa; cursor:pointer" onclick="window.addSearch('${t}')">#${t}</span>`).join(' ');
        document.getElementById('pvContainer').innerHTML = `<div class="pv-layout"><div class="pv-main">${p.isVid?'<video src="'+p.url+'" controls autoplay></video>':'<img src="'+p.url+'">'}</div>
        <div class="pv-side"><h3>@${p.author}</h3><p>${p.text||''}</p><div style="margin-bottom:15px">${tagsHtml}</div>
        <button class="btn-main" style="width:100%" onclick="window.like('${id}','${type}')">❤ Лайк</button></div></div>`;
    };

    function renderProfFeed() {
        let items = [];
        if(AppState.profTab === 'uploads') ['gallery','board','shorts'].forEach(t => items.push(...AppState.data[t].filter(p => p.uid === AppState.profUid)));
        else { const rep = AppState.users[AppState.profUid]?.reposts || {}; Object.keys(rep).forEach(id => { const type = rep[id]; const post = AppState.data[type]?.find(x => x.id === id); if(post) items.push(post); }); }
        renderGal(items.sort((a,b)=>b.time-a.time), 'profFeed');
    }

    window.addSearch = (tag) => { document.getElementById('search').value = tag; window.closePost(); window.renderCurrentTab(); };
    window.closePost = () => { AppState.currentPostId = null; document.getElementById('postMode').style.display='none'; window.switchTab(AppState.currentTab); };
    window.goHome = () => window.switchTab('gallery');
    window.like = async (id, type) => { if(!AppState.user) return window.openAuth(); const r = ref(db, `${type}/${id}/likes/${AppState.user.uid}`); const s = await get(r); await set(r, s.exists()?null:true); };
    window.repost = async (id, type) => { if(!AppState.user) return window.openAuth(); const r = ref(db, `users/${AppState.user.uid}/reposts/${id}`); const s = await get(r); await set(r, s.exists()?null:type); window.showToast('Репост!'); };
    window.del = async (id, type) => { if(confirm('Удалить?')) await remove(ref(db, `${type}/${id}`)); };
    window.setLang = (l) => { AppState.lang = l; window.renderCurrentTab(); };

</script>
</body>
</html>
