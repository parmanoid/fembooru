<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>fembooru</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default,Array.prototype.includes,String.prototype.includes,Promise,Object.assign,Object.keys,Array.prototype.find,Array.prototype.filter,NodeList.prototype.forEach"></script>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/webtorrent@latest/webtorrent.min.js"></script>
    
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --bg: #050506; --card: #0f0f11; --card-h: #161619;
            --accent: #e11d48; --accent-h: #f43f5e;
            --text: #f4f4f5; --muted: #71717a; --border: #1f1f22;
            --radius: 14px; --radius-sm: 8px;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        /* --- LAYOUT & HEADER --- */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(5, 5, 6, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; height: 64px; flex-shrink: 0; }
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; transition: 0.3s; border: 2px solid transparent;}
        .nav-avatar:hover { border-color: var(--accent); transform: scale(1.1); }
        .top-nav h1 { color: var(--accent); font-size: 24px; cursor: pointer; font-weight: 900; letter-spacing: -1px; margin: 0; display: flex; align-items: center; gap: 12px;}
        .ai-greeting-wrap { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.03); padding: 4px 12px; border-radius: 20px; border: 1px solid #222; }
        .ai-greeting { font-size: 12px; color: var(--muted); font-weight: 600; max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
        @media (min-width: 768px) { .ai-greeting { display: block; animation: fadeIn 1s ease; } }
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: none; }
        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* --- SIDEBAR --- */
        .sidebar { width: 280px; background: rgba(5, 5, 6, 0.95); padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; transition: transform 0.3s; }
        .lang-switcher { display: flex; gap: 6px; margin-bottom: 25px; background: #121214; padding: 6px; border-radius: var(--radius-sm); border: 1px solid var(--border);}
        .lang-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 8px 0; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;}
        .lang-btn.active { background: #27272a; color: #fff; }
        .auth-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: var(--radius-sm); margin-bottom: 25px; border: 1px solid var(--border); }

        /* --- UI ELEMENTS --- */
        .btn-main { background: linear-gradient(135deg, var(--accent), #be123c); border: none; font-weight: 800; cursor: pointer; color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); transition: 0.3s; font-size: 14px; text-align: center;}
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(225,29,72,0.4); }
        .btn-action { background: #161619; border: 1px solid #27272a; color: #eee; padding: 10px 15px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 13px; text-align: center; flex: 1;}
        .btn-action:hover { background: #222226; border-color: #3f3f46; transform: translateY(-2px); }
        .btn-action.active { color: var(--accent); border-color: var(--accent); background: rgba(225,29,72,0.1); }
        input, textarea { padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #0f0f11; color: white; font-size: 14px; transition: 0.3s; font-family: inherit; width: 100%;}
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,29,72,0.2); background: #161619;}

        /* --- HINTS & MENTIONS --- */
        .user-mention { color: var(--accent); cursor: pointer; font-weight: 800; padding: 2px 6px; background: rgba(225,29,72,0.1); border-radius: 6px; transition: 0.2s; display: inline-block;}
        .user-mention:hover { background: rgba(225,29,72,0.2); transform: translateY(-1px); }
        .hints-box { position: absolute; z-index: 9999; background: #161619; border: 1px solid #333; border-radius: var(--radius-sm); box-shadow: 0 20px 50px rgba(0,0,0,0.9); max-height: 250px; overflow-y: auto; display: none; min-width: 220px; }
        .hint-item { padding: 12px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; color: #eee; transition: 0.2s; gap: 10px;}
        .hint-item:hover { background: #27272a; color: var(--accent); padding-left: 20px; }
        .hint-count { color: var(--muted); font-size: 10px; font-weight: 900; background: #000; padding: 3px 8px; border-radius: 6px; }

        /* --- VIEWS & TABS --- */
        .content { flex: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
        .view-layer { display: none; flex-direction: column; width: 100%; min-height: 100%; animation: fadeIn 0.3s ease; }
        .view-layer.active { display: flex; }
        .tabs-wrap { background: rgba(5, 5, 6, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 500; width: 100%; padding: 10px 0;}
        .app-tabs { display: flex; max-width: 900px; margin: 0 auto; gap: 15px; padding: 0 15px;}
        .app-tab { flex: 1; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--muted); padding: 12px 0; font-size: 13px; cursor: pointer; font-weight: 800; text-transform: uppercase; border-radius: var(--radius-sm); text-align: center; transition: 0.3s;}
        .app-tab.active { color: var(--accent); border-color: var(--accent); background: rgba(225, 29, 72, 0.1); }
        .tab-content { display: none; flex-direction: column; padding: 25px; width: 100%; max-width: 1400px; margin: 0 auto;}
        .tab-content.active { display: flex; animation: fadeIn 0.3s ease; }

        /* --- CARDS & MEDIA --- */
        .src-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); color: white; font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 6px; z-index: 10; display: none;}
        .src-badge.p2p { background: rgba(16, 185, 129, 0.9); display: block; }
        
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; padding-bottom: 50px; }
        .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding-bottom: 50px; }
        .board-feed { display: flex; flex-direction: column; gap: 20px; max-width: 750px; margin: 0 auto; padding-bottom: 50px; }
        
        .post-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; display: flex; flex-direction: column; animation: popIn 0.3s forwards; opacity: 0; }
        .post-card:hover { border-color: #444; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .media-box { width: 100%; background: #050506; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; pointer-events: none; }
        .media-box.gal { height: 260px; }
        .media-box.yt { aspect-ratio: 16/9; border-bottom: 1px solid var(--border); }
        .media-box.brd { max-height: 500px; border-radius: 12px; margin-top: 10px; border: 1px solid #222; }
        .media-box img, .media-box video { width: auto; height: auto; max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: 0.3s; }
        .media-box .loaded { opacity: 1; }
        
        .author-badge { position: absolute; top: 12px; right: 12px; display: flex; align-items: center; gap: 6px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 20px; z-index: 5; pointer-events: auto; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s;}
        .author-badge:hover { background: var(--accent); border-color: transparent;}
        .author-badge img { width: 20px; height: 20px; border-radius: 50%; object-fit: cover; }
        .author-badge span { color: #fff; font-size: 11px; font-weight: bold; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
        
        .meta-info { padding: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; background: var(--card); z-index: 2;}

        /* --- SHORTS --- */
        .shorts-feed { height: calc(100vh - 130px); overflow-y: scroll; scroll-snap-type: y mandatory; margin: -25px; scrollbar-width: none; background: #000; }
        .shorts-feed::-webkit-scrollbar { display: none; }
        .short-wrap { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .short-ui { display: flex; flex-direction: row; gap: 30px; height: 100%; width: 100%; max-width: 600px; justify-content: center; align-items: center; position: relative; }
        .short-video { flex: 1; height: 100%; max-width: 480px; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 1px solid #222; cursor: pointer;}
        .short-video video { width: 100%; height: 100%; object-fit: contain; background: #000; pointer-events: none;}
        .short-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 60px 20px 25px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: white; pointer-events: none; z-index: 5; border-radius: 0 0 16px 16px;}
        .short-sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; height: 100%; padding-bottom: 30px; width: 60px; z-index: 10;}
        .s-btn { width: 56px; height: 56px; border-radius: 50%; background: #161619; border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; position: relative; transition: 0.3s;}
        .s-btn:hover { background: #27272a; transform: translateY(-4px); }
        .s-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(225,29,72,0.15); }
        .s-count { position: absolute; bottom: -22px; font-size: 12px; color: var(--muted); width: 100%; text-align: center; font-weight: 900; }

        /* --- PROFILE & POST VIEW --- */
        .profile-header { background: var(--card); border-radius: var(--radius); padding: 40px; display: flex; gap: 30px; align-items: center; border: 1px solid var(--border); margin-bottom: 25px;}
        .p-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--border); background: #27272a;}
        
        .pv-layout { display: flex; gap: 35px; flex-wrap: wrap; align-items: flex-start; margin-top: 10px;}
        .pv-main { flex: 3; min-width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .pv-side { flex: 1; min-width: 320px; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); height: fit-content; position: sticky; top: 20px;}
        .pv-media-box { background: #050506; border-radius: var(--radius); display: flex; justify-content: center; align-items: center; min-height: 50vh; max-height: 85vh; width: 100%; border: 1px solid #222; position: relative;}
        .pv-media-box img, .pv-media-box video { width: auto; height: auto; max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: var(--radius);}
        
        .hashtag { color: #60a5fa; cursor: pointer; font-weight: 700; margin-right: 8px; font-size: 13px; display: inline-block; padding: 6px 12px; background: rgba(96,165,250,0.1); border-radius: 8px; margin-bottom: 8px; transition: 0.2s;}
        .hashtag:hover { background: rgba(96,165,250,0.2); transform: translateY(-2px); }

        .comm-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; padding-right: 8px; }
        .comm-item { background: #161619; padding: 14px 16px; border-radius: var(--radius-sm); font-size: 14px; border: 1px solid #222; line-height: 1.4;}

        /* MODALS & LOADER */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal { background: var(--card); padding: 40px; border-radius: 24px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 18px; border: 1px solid #333; animation: fadeUp 0.3s ease;}
        #loader { display: none; position: fixed; inset: 0; background: rgba(5,5,6,0.95); z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--accent); border-radius: 50%; width: 60px; height: 60px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); z-index: 2000; width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .short-wrap { padding: 0; }
            .short-ui { max-width: 100%; height: 100%; gap: 0; flex-direction: column; position: relative;}
            .short-video { width: 100%; max-width: none; border-radius: 0; border: none; height: 100%; background: #000;}
            .short-video video { border-radius: 0; border: none; object-fit: cover; }
            .short-sidebar { position: absolute; right: 12px; bottom: 100px; z-index: 100; padding: 0; height: auto; }
            .s-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); width: 48px; height: 48px; border: none;}
            .short-overlay { padding-right: 80px; padding-bottom: 30px; pointer-events: auto; border-radius: 0;}
            .profile-header { flex-direction: column; text-align: center; padding: 25px;}
            .pv-layout { flex-direction: column; }
            .pv-side { position: static; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div id="toastBox" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none;"></div>

<div id="globalMentions" class="hints-box"></div>
<div id="searchHints" class="hints-box"></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 style="text-align:center; margin:0;" data-i18n="authTitle">fembooru</h2>
        <input type="text" id="authName" placeholder="Никнейм" autocomplete="nope" spellcheck="false" data-lpignore="true">
        <input type="password" id="authPass" placeholder="Пароль" autocomplete="nope" spellcheck="false" data-lpignore="true">
        <button class="btn-main" onclick="App.UI.submitAuth()" data-i18n="btnEnter">Продолжить</button>
        <button onclick="App.UI.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted); cursor:pointer; font-weight:bold; padding:10px;" data-i18n="btnCancel">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2 style="margin:0;" data-i18n="profSettings">Настройки</h2>
        <p style="font-size:12px; color:var(--muted); margin:0" data-i18n="profAva">Аватарка:</p>
        <input type="file" id="editAvaFile" accept="image/*">
        <textarea id="editBio" placeholder="..." rows="3" autocomplete="nope" spellcheck="false" data-lpignore="true"></textarea>
        <button class="btn-main" onclick="App.UI.saveProfile()" data-i18n="btnSave">Сохранить</button>
        <button onclick="App.UI.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted); cursor:pointer; font-weight:bold; padding:10px;" data-i18n="btnCancel">Закрыть</button>
    </div>
</div>

<header class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="App.UI.safeOpenProfile('MY')" onerror="this.src='https://i.ibb.co/3sW3xQy/default-avatar.png'">
        <div style="display:flex; align-items:center; gap:12px;">
            <h1 onclick="App.UI.goHome()">fembooru</h1>
            <div class="ai-greeting-wrap">
                <span style="color:var(--accent); font-size:14px;">✨</span>
                <span id="aiFact" class="ai-greeting">Оставайся милым :3</span>
            </div>
        </div>
    </div>
    <button class="menu-btn" onclick="App.UI.toggleMenu()">☰</button>
</header>

<div id="menuOverlay" onclick="App.UI.toggleMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:140; backdrop-filter:blur(5px);"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="App.UI.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="App.UI.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="App.UI.setLang('en')" id="lang-en">EN</button>
        </div>
        <div class="auth-box">
            <div id="loggedOutView"><button class="btn-main" style="width:100%" onclick="App.UI.openModal('authModal')" data-i18n="btnLogin">Войти / Рега</button></div>
            <div id="loggedInView" style="display:none">
                <div id="userNameDisplay" style="font-weight:900; cursor:pointer; color:#fff; font-size:16px; margin-bottom:15px; text-align:center;" onclick="App.UI.safeOpenProfile('MY')">User</div>
                <button class="btn-action" onclick="App.Auth.doLogout()" style="width:100%; font-size:12px; padding:10px;" data-i18n="btnLogout">Выйти</button>
            </div>
        </div>

        <h3 style="color:var(--muted); font-size:11px; text-transform:uppercase; margin-bottom:15px; letter-spacing:1px;" data-i18n="filterTitle">Лента</h3>
        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:30px;">
            <label style="cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px;"><input type="radio" name="rating" value="all" checked onchange="App.UI.renderCurrentTab()"> <span data-i18n="fAll">Всё подряд</span></label>
            <label style="cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px;"><input type="radio" name="rating" value="sfw" onchange="App.UI.renderCurrentTab()"> <span data-i18n="fSfw">Безопасно</span></label>
            <label style="cursor:pointer; display:flex; align-items:center; gap:10px; font-size:14px; color:var(--accent); font-weight:bold;"><input type="radio" name="rating" value="nsfw" onchange="App.UI.renderCurrentTab()"> NSFW</label>
        </div>
        
        <h3 style="color:var(--muted); font-size:11px; text-transform:uppercase; margin-bottom:12px; letter-spacing:1px;" data-i18n="searchTitle">Поиск тегов</h3>
        <div class="search-wrap" id="searchContainer">
            <input type="text" id="search" placeholder="..." style="width:100%" autocomplete="nope" spellcheck="false" data-lpignore="true">
        </div>
    </aside>

    <main class="content">
        <div id="mainView" class="view-layer active" style="padding:0">
            <nav class="tabs-wrap">
                <div class="app-tabs">
                    <button class="app-tab active" onclick="App.UI.switchTab('gallery')" id="tab-gallery" data-i18n="tabGal">Галерея</button>
                    <button class="app-tab" onclick="App.UI.switchTab('board')" id="tab-board" data-i18n="tabBoard">Борда</button>
                    <button class="app-tab" onclick="App.UI.switchTab('videos')" id="tab-videos" data-i18n="tabVids">Видео</button>
                    <button class="app-tab" onclick="App.UI.switchTab('shorts')" id="tab-shorts" data-i18n="tabShorts">Шортсы</button>
                </div>
            </nav>

            <div id="tab-content-gallery" class="tab-content active">
                <div id="upGal" style="display:none; margin-bottom:25px; background:var(--card); padding:25px; border-radius:var(--radius); border:1px solid var(--border); box-shadow:0 15px 40px rgba(0,0,0,0.4);">
                    <div style="display:flex; flex-direction:column; gap:15px;">
                        <input type="file" id="fGal" accept="image/*,video/*" multiple>
                        <textarea id="txtGal" placeholder="Описание... @упоминания" rows="2" style="resize:vertical;" autocomplete="nope" data-lpignore="true" spellcheck="false"></textarea>
                        <div style="display:flex; gap:15px; flex-wrap:wrap; align-items:center;">
                            <input type="text" id="t1G" placeholder="Основной тэг" style="width:160px" autocomplete="nope" data-lpignore="true" spellcheck="false">
                            <input type="text" id="t2G" placeholder="Доп. тэги" style="flex:1; min-width:160px;" autocomplete="nope" data-lpignore="true" spellcheck="false">
                            <label style="display:flex; align-items:center; gap:8px; font-size:14px; font-weight:bold; cursor:pointer;"><input type="checkbox" id="nGal"> NSFW</label>
                            <button class="btn-main" onclick="App.DB.upload('gallery')" data-i18n="btnPost">Опубликовать</button>
                        </div>
                    </div>
                </div>
                <div class="gallery-grid" id="galFeed"></div>
            </div>

            <div id="tab-content-board" class="tab-content">
                <div id="upBoard" style="display:none; margin-bottom:25px; background:var(--card); padding:25px; border-radius:var(--radius); border:1px solid var(--border);">

        },
        repost: function(id, type) { 
            if(!App.State.user) return App.UI.openModal('authModal'); 
            var realType = type==='posts'||type==='gallery' ? 'gallery' : type; 
            var r = ref(App.db, 'users/'+App.State.user.uid+'/reposts/'+id); 
            get(r).then(function(s) { set(r, s.exists()?null:realType).then(function(){App.UI.toast('Сохранено!');}); }); 
        },
        del: function(id, type) { 
            if(confirm(App.t('del') + '?')) { 
                var realType = type==='posts'||type==='gallery' ? 'posts' : type; 
                remove(ref(App.db, realType+'/'+id)).then(function(){App.UI.goHome();}); 
            } 
        },
        addComm: function(id, type) {
            if(!App.State.user) return App.UI.openModal('authModal');
            var inp = document.getElementById('cInp'); var txt = inp.value.trim();
            if(!txt) return; inp.disabled = true;
            push(ref(App.db, type+'/'+id+'/comments'), { uid: App.State.user.uid, name: App.State.user.displayName || 'Anon', t: txt, time: Date.now() }).then(function(){
                inp.value = ''; inp.disabled = false; inp.focus();
            }).catch(function(){ App.UI.toast('Ошибка', true); inp.disabled = false; });
        }
    };

    // БАЗОВЫЕ ПОДПИСКИ FIREBASE
    onAuthStateChanged(App.auth, function(u) {
        App.State.user = u; App.State.isAdmin = u && u.email === "test@anon.ru";
        ['Gal', 'Board', 'Shorts'].forEach(function(i) { if(document.getElementById('up'+i)) document.getElementById('up'+i).style.display = u ? 'block' : 'none'; });
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block';
        document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        if(u) {
            document.getElementById('userNameDisplay').innerText = u.displayName;
            get(ref(App.db, 'users/'+u.uid)).then(function(s) { if(s.exists()) document.getElementById('navAvatar').src = s.val().avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png"; });
        }
        
        onValue(ref(App.db, 'users'), function(s) { 
            App.State.users = s.val() || {}; 
            if(App.State.profUid) {
                var currentUser = App.State.users[App.State.profUid];
                if(currentUser) {
                    document.getElementById('pAva').src = currentUser.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
                    document.getElementById('pName').innerText = currentUser.name || 'Anon';
                    document.getElementById('pBio').innerHTML = App.Parser.mentions(currentUser.bio || '');
                }
                App.Render.profFeed(); 
            }
        });
        
        ['posts', 'board', 'shorts'].forEach(function(t) { 
            onValue(ref(App.db, t), function(s) {
                var a = []; 
                s.forEach(function(c) { var d = c.val(); d.id = c.key; a.push(d); });
                App.State.data[t] = a.reverse(); 
                
                var newTags = {};
                if(App.State.data['posts']) {
                    App.State.data['posts'].forEach(function(p) {
                        var tags = [];
                        if(p.t1) tags.push(p.t1);
                        if(p.t2) p.t2.split(' ').forEach(function(x){ tags.push(x); });
                        tags.filter(Boolean).forEach(function(x) { 
                            var tag = x.toLowerCase().replace(/#/g, '').trim(); 
                            if(tag) newTags[tag] = (newTags[tag]||0)+1; 
                        });
                    });
                }
                App.State.tags = newTags;
                App.UI.renderTab();
            });
        });
        App.UI.loadAiFact();
    });

</script>
</body>
</html>
