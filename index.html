<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Global Art Booru Pro + Social</title>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        /* Глобальные стили */
        :root {
            --bg-main: #141414;
            --bg-sidebar: #1d1d1d;
            --bg-card: #242424;
            --bg-input: #2a2a2a;
            --accent: #e63946;
            --accent-hover: #ff4d4d;
            --text-main: #eee;
            --text-muted: #888;
            --ease: cubic-bezier(0.23, 1, 0.32, 1);
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-main); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 280px; background: var(--bg-sidebar); padding: 30px 20px; border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 25px; overflow-y: auto; }
        
        h3 { font-size: 13px; color: var(--text-muted); margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        /* Панель пользователя */
        .auth-panel { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #333; text-align: center; }
        .auth-text { font-size: 14px; margin-bottom: 10px; color: #ccc; }
        .auth-buttons { display: flex; gap: 10px; justify-content: center; }
        .btn-small { padding: 8px 15px; border-radius: 4px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; background: #333; color: white; transition: 0.2s; }
        .btn-small:hover { background: #555; }
        .btn-accent { background: var(--accent); }
        .btn-accent:hover { background: var(--accent-hover); }

        /* Хедер и инпуты */
        .header { margin-bottom: 25px; background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.3); border: 1px solid #333; }
        .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        input[type="text"], input[type="file"], input[type="password"], input[type="email"] { 
            padding: 10px 15px; border: 1px solid #444; border-radius: 6px; background: var(--bg-input); color: white; outline: none; font-size: 14px; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); }
        
        button.action-btn { padding: 12px 24px; cursor: pointer; background: var(--accent); color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        button.action-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
        button.action-btn:disabled { background: #555; cursor: not-allowed; transform: none; opacity: 0.5; }
        
        .checkbox-wrapper { color: var(--accent); cursor: pointer; display: flex; align-items: center; gap: 7px; font-weight: bold; font-size: 14px; }
        
        /* Галерея и Карточки */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding-bottom: 50px; }
        .post { background: var(--bg-card); padding: 15px; border-radius: 12px; position: relative; display: flex; flex-direction: column; border: 1px solid #333; }
        
        .post-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; color: #888; }
        .post-author { color: #ccc; font-weight: bold; font-size: 14px; }
        
        .media-link { display: block; overflow: hidden; border-radius: 8px; position: relative; margin-bottom: 15px; background: #111; aspect-ratio: 16/10; }
        .media-link img, .media-link video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
        .media-link img:hover { transform: scale(1.05); cursor: zoom-in; }
        
        .nsfw-badge { position: absolute; top: 10px; right: 10px; background: rgba(230,57,70,0.9); color: white; padding: 3px 8px; font-size: 10px; border-radius: 4px; font-weight: bold; }
        .btn-delete-post { background: transparent; color: #888; border: none; cursor: pointer; font-size: 12px; transition: 0.2s; padding: 0;}
        .btn-delete-post:hover { color: var(--accent); }
        
        /* Социалка: Лайки и Теги */
        .post-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tags { font-size: 12px; color: #aaa; flex: 1; }
        .primary-badge { color: #4da6ff; text-transform: uppercase; font-weight: bold; }
        
        .like-btn { background: transparent; border: 1px solid #444; border-radius: 20px; padding: 5px 12px; color: #eee; cursor: pointer; display: flex; align-items: center; gap: 5px; transition: 0.2s; font-weight: bold;}
        .like-btn:hover { background: rgba(230, 57, 70, 0.1); border-color: var(--accent); }
        .like-btn.liked { color: var(--accent); border-color: var(--accent); background: rgba(230, 57, 70, 0.1); }
        .like-icon { font-size: 16px; transition: transform 0.2s; }
        .like-btn:active .like-icon { transform: scale(1.3); }

        /* Комментарии */
        .comments-section { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 10px; margin-top: auto; border: 1px solid #333;}
        .comments-list { max-height: 120px; overflow-y: auto; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; font-size: 13px;}
        .comment { background: #2a2a2a; padding: 6px 10px; border-radius: 6px; }
        .comment-author { font-weight: bold; color: #4da6ff; margin-right: 5px; }
        .comment-input-wrap { display: flex; gap: 5px; }
        .comment-input-wrap input { flex: 1; padding: 6px 10px; font-size: 12px; }
        .comment-input-wrap button { background: #444; color: white; border: none; border-radius: 4px; padding: 0 10px; cursor: pointer; }
        .comment-input-wrap button:hover { background: #666; }

        /* Модальные окна */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .modal { background: var(--bg-card); padding: 30px; border-radius: 12px; width: 300px; border: 1px solid #444; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        .modal h2 { margin: 0; text-align: center; color: white; }
        .modal input { width: 100%; box-sizing: border-box; }
        .modal-close { background: transparent; color: #888; border: none; cursor: pointer; text-align: center; margin-top: 10px;}
        .modal-close:hover { color: white; }

        /* Оверлей загрузки */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10,10,10,0.95); z-index: 9999; color: white; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text">Загрузка...</div>
    </div>

    <div id="authModal" class="modal-overlay">
        <div class="modal">
            <h2 id="modalTitle">Вход</h2>
            <input type="text" id="authName" placeholder="Твой Никнейм (только для регистрации)" style="display:none;">
            <input type="email" id="authEmail" placeholder="Email (любой, хоть фейковый)">
            <input type="password" id="authPass" placeholder="Пароль (минимум 6 символов)">
            <button class="action-btn" id="modalSubmitBtn" onclick="submitAuth()">Войти</button>
            <button class="modal-close" onclick="closeModal()">Отмена</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="auth-panel" id="authPanel">
            <div id="loggedOutView">
                <div class="auth-text">Войди, чтобы грузить арты, ставить лайки и писать комменты.</div>
                <div class="auth-buttons">
                    <button class="btn-small btn-accent" onclick="openModal('login')">Вход</button>
                    <button class="btn-small" onclick="openModal('register')">Регистрация</button>
                </div>
            </div>
            <div id="loggedInView" style="display:none;">
                <div class="auth-text" id="userNameDisplay">Привет, Гость!</div>
                <button class="btn-small" onclick="logoutUser()">Выйти из аккаунта</button>
            </div>
        </div>

        <h3>Поиск</h3>
        <input type="text" id="searchInput" placeholder="Введи тег..." style="width: 100%; box-sizing: border-box; margin-bottom: 30px;">
    </aside>
    
    <main class="content">
        <div class="header">
            <div class="controls">
                <input type="file" id="fileInput" accept="image/*,video/mp4,video/webm,video/ogg" multiple style="flex: 1; min-width: 200px;">
                <input type="text" id="primaryTagInput" placeholder="Главный тег" style="width: 130px;">
                <input type="text" id="secondaryTagsInput" placeholder="Детали через пробел" style="width: 180px;">
                <label class="checkbox-wrapper"><input type="checkbox" id="nsfwCheckbox"> NSFW</label>
                <button class="action-btn" id="uploadBtn" onclick="window.processAndUpload()" disabled>Загрузить</button>
            </div>
            <div id="uploadWarn" style="color: #ff4d4d; font-size: 12px; margin-top: 10px;">* Для загрузки нужно войти в аккаунт</div>
        </div>
        
        <div class="gallery" id="gallery"></div>
    </main>

    <script type="module">
        // ИМПОРТЫ
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

        // ==========================================
        // ВСТАВЬ СВОИ КЛЮЧИ СЮДА
        const IMGBB_API_KEY = "120a27bcbb28d3ffd9f03bc4b32bb54f"; 

        const firebaseConfig = {
            apiKey: "ТВОЙ_АПИ_КЛЮЧ_FIREBASE",
            authDomain: "твой-проект.firebaseapp.com",
            databaseURL: "https://твой-проект-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "твой-проект"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const postsRef = ref(db, 'posts');
        
        let allPosts = [];
        let currentUser = null;
        let isAuthMode = 'login'; // 'login' or 'register'

        // ОТСЛЕЖИВАНИЕ АВТОРИЗАЦИИ
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            const uploadBtn = document.getElementById('uploadBtn');
            const uploadWarn = document.getElementById('uploadWarn');
            const loggedOutView = document.getElementById('loggedOutView');
            const loggedInView = document.getElementById('loggedInView');
            const userNameDisplay = document.getElementById('userNameDisplay');

            if (user) {
                uploadBtn.disabled = false;
                uploadWarn.style.display = 'none';
                loggedOutView.style.display = 'none';
                loggedInView.style.display = 'block';
                userNameDisplay.innerText = `Привет, ${user.displayName || 'Анон'}!`;
            } else {
                uploadBtn.disabled = true;
                uploadWarn.style.display = 'block';
                loggedOutView.style.display = 'block';
                loggedInView.style.display = 'none';
            }
            renderGallery(); // Перерисовываем, чтобы обновить кнопки "Удалить" и лайки
        });

        // МОДАЛКИ И АВТОРИЗАЦИЯ
        window.openModal = function(mode) {
            isAuthMode = mode;
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = mode === 'login' ? 'Вход' : 'Регистрация';
            document.getElementById('modalSubmitBtn').innerText = mode === 'login' ? 'Войти' : 'Создать аккаунт';
            document.getElementById('authName').style.display = mode === 'register' ? 'block' : 'none';
        };

        window.closeModal = function() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('authEmail').value = '';
            document.getElementById('authPass').value = '';
            document.getElementById('authName').value = '';
        };

        window.submitAuth = async function() {
            const email = document.getElementById('authEmail').value;
            const pass = document.getElementById('authPass').value;
            const name = document.getElementById('authName').value;

            try {
                if (isAuthMode === 'login') {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    if(!name) return alert('Введи никнейм!');
                    const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                    await updateProfile(userCredential.user, { displayName: name });
                }
                closeModal();
            } catch (error) {
                alert(`Ошибка: ${error.message}`);
            }
        };

        window.logoutUser = () => signOut(auth);

        // ЗАГРУЗКА БАЗЫ ДАННЫХ
        onValue(postsRef, (snapshot) => {
            allPosts = [];
            snapshot.forEach(child => {
                allPosts.push({ id: child.key, ...child.val() });
            });
            allPosts.sort((a, b) => b.timestamp - a.timestamp);
            renderGallery();
        });

        // СЖАТИЕ И ЗАГРУЗКА (Как раньше)
        async function compressImage(file, quality = 0.8) {
            if (file.type === 'image/gif') return file;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1920; let width = img.width, height = img.height;
                        if (width > height && width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } 
                        else if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadToImgBB(imageBlob) {
            const fd = new FormData(); fd.append('image', imageBlob);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const json = await res.json();
            if (json.success) return json.data.url; throw new Error('Ошибка ImgBB');
        }

        async function uploadToCatbox(file) {
            const fd = new FormData(); fd.append('reqtype', 'fileupload'); fd.append('fileToUpload', file);
            const res = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: fd });
            if(res.ok) return await res.text(); throw new Error('Ошибка Catbox');
        }

        window.processAndUpload = async function() {
            if (!currentUser) return alert('Войди в аккаунт!');
            const fileInput = document.getElementById('fileInput');
            const pTag = document.getElementById('primaryTagInput').value.trim().toLowerCase() || 'разное';
            const sTags = document.getElementById('secondaryTagsInput').value.trim().toLowerCase();
            const isNsfw = document.getElementById('nsfwCheckbox').checked;
            const overlay = document.getElementById('loading-overlay');
            const statusText = document.getElementById('loading-text');

            if (fileInput.files.length === 0) return alert('Выбери файлы!');

            overlay.style.display = 'flex';
            document.getElementById('uploadBtn').disabled = true;

            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const ext = file.name.split('.').pop().toLowerCase();
                const isVideo = ['mp4', 'webm', 'ogg', 'mov', 'avi'].includes(ext);
                let finalUrl = "";
                
                try {
                    if (isVideo) {
                        statusText.innerText = `Грузим ВИДЕО [${i+1}/${fileInput.files.length}]...`;
                        finalUrl = await uploadToCatbox(file);
                    } else {
                        statusText.innerText = `Грузим ФОТО [${i+1}/${fileInput.files.length}]...`;
                        const compressed = await compressImage(file, 0.8);
                        finalUrl = await uploadToImgBB(compressed);
                    }

                    // Сохраняем пост С АВТОРОМ
                    await push(postsRef, {
                        url: finalUrl,
                        primary_tag: pTag,
                        secondary_tags: sTags,
                        is_nsfw: isNsfw,
                        is_video: isVideo,
                        author_uid: currentUser.uid,
                        author_name: currentUser.displayName || 'Анон',
                        timestamp: Date.now(),
                        likes: {},
                        comments: {}
                    });
                } catch (error) {
                    alert(`Ошибка с файлом: ${file.name}`);
                }
            }

            overlay.style.display = 'none';
            document.getElementById('uploadBtn').disabled = false;
            fileInput.value = '';
        };

        // СОЦИАЛЬНЫЕ ФУНКЦИИ
        window.toggleLike = async function(postId) {
            if (!currentUser) return alert('Нужно войти в аккаунт, чтобы ставить лайки!');
            
            // Ищем пост локально, чтобы понять текущий статус
            const post = allPosts.find(p => p.id === postId);
            const hasLiked = post.likes && post.likes[currentUser.uid];
            
            // Обновляем конкретный узел в БД
            const updates = {};
            updates[`posts/${postId}/likes/${currentUser.uid}`] = hasLiked ? null : true;
            await update(ref(db), updates);
        };

        window.addComment = async function(postId, inputId) {
            if (!currentUser) return alert('Войди в аккаунт, чтобы писать комменты!');
            const input = document.getElementById(inputId);
            const text = input.value.trim();
            if (!text) return;

            input.disabled = true;
            await push(ref(db, `posts/${postId}/comments`), {
                author: currentUser.displayName || 'Анон',
                text: text,
                timestamp: Date.now()
            });
            input.value = '';
            input.disabled = false;
        };

        window.handleCommentKey = function(e, postId, inputId) {
            if (e.key === 'Enter') window.addComment(postId, inputId);
        };

        window.deletePost = async function(postId, authorUid) {
            if (!currentUser || currentUser.uid !== authorUid) return alert('Ты не можешь удалить чужой пост!');
            if(!confirm('Реально удаляем?')) return;
            await remove(ref(db, 'posts/' + postId));
        };

        // ОТРИСОВКА
        window.renderGallery = function() {
            const gallery = document.getElementById('gallery');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();

            // Сохраняем фокус, если пользователь печатает коммент (чтобы не сбрасывалось при лайках)
            const activeInputId = document.activeElement ? document.activeElement.id : null;
            let activeInputValue = activeInputId ? document.activeElement.value : '';

            gallery.innerHTML = '';

            allPosts.forEach(post => {
                const searchTarget = (post.primary_tag + " " + post.secondary_tags).toLowerCase();
                if (searchQuery && !searchTarget.includes(searchQuery)) return;

                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                // Подсчет лайков
                const likesCount = post.likes ? Object.keys(post.likes).length : 0;
                const iHaveLiked = currentUser && post.likes && post.likes[currentUser.uid];
                
                // Рендер комментов
                let commentsHTML = '';
                if (post.comments) {
                    const commentsArray = Object.values(post.comments).sort((a,b) => a.timestamp - b.timestamp);
                    commentsArray.forEach(c => {
                        commentsHTML += `<div class="comment"><span class="comment-author">${c.author}:</span>${c.text}</div>`;
                    });
                }

                // Видео или Фото
                let mediaHTML = post.is_video 
                    ? `<video id="vid-${post.id}" src="${post.url}" preload="metadata"></video>` 
                    : `<img src="${post.url}" loading="lazy" onclick="window.open('${post.url}', '_blank')">`;

                // Кнопка удаления (видна только автору)
                const deleteBtnHTML = (currentUser && currentUser.uid === post.author_uid) 
                    ? `<button class="btn-delete-post" onclick="window.deletePost('${post.id}', '${post.author_uid}')" title="Удалить свой арт">🗑 Удалить</button>` 
                    : `<div></div>`; // Пустой див для flex-justify

                const dateStr = new Date(post.timestamp).toLocaleDateString();

                postDiv.innerHTML = `
                    ${post.is_nsfw ? '<div class="nsfw-badge">NSFW</div>' : ''}
                    
                    <div class="post-header">
                        <span class="post-author">👤 ${post.author_name}</span>
                        <span>${dateStr}</span>
                    </div>

                    <div class="media-link">
                        ${mediaHTML}
                    </div>

                    <div class="post-actions">
                        <div class="tags">
                            <span class="primary-badge">[${post.primary_tag}]</span> ${post.secondary_tags}
                        </div>
                        <button class="like-btn ${iHaveLiked ? 'liked' : ''}" onclick="window.toggleLike('${post.id}')">
                            <span class="like-icon">❤</span> ${likesCount}
                        </button>
                    </div>

                    <div class="post-header" style="margin-bottom:0;">
                        ${deleteBtnHTML}
                    </div>

                    <hr style="border: 0; border-top: 1px solid #333; margin: 10px 0;">

                    <div class="comments-section">
                        <div class="comments-list">${commentsHTML || '<div style="color:#666; font-size:12px; text-align:center;">Нет комментариев</div>'}</div>
                        <div class="comment-input-wrap">
                            <input type="text" id="comm-${post.id}" placeholder="Написать..." onkeypress="window.handleCommentKey(event, '${post.id}', 'comm-${post.id}')">
                            <button onclick="window.addComment('${post.id}', 'comm-${post.id}')">➤</button>
                        </div>
                    </div>
                `;
                gallery.appendChild(postDiv);

                // Плеер
                if (post.is_video) {
                    setTimeout(() => { fluidPlayer(`vid-${post.id}`, { layoutControls: { primaryColor: '#e63946', playButtonShowing: true, fillToContainer: true }}); }, 50);
                }
            });

            // Восстанавливаем фокус
            if (activeInputId) {
                const inputToFocus = document.getElementById(activeInputId);
                if (inputToFocus) {
                    inputToFocus.focus();
                    inputToFocus.value = activeInputValue;
                }
            }
        };

        document.getElementById('searchInput').addEventListener('input', window.renderGallery);
    </script>
</body>
</html>
