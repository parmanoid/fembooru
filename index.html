<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>fembooru</title>
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --accent: #ff3e3e;
            --text: #ffffff;
            --muted: #888888;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #151515; padding: 25px; border-right: 1px solid #333; overflow-y: auto; display: flex; flex-direction: column; }
        .content { flex: 1; padding: 25px; overflow-y: auto; }
        .auth-box { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px solid #333; }
        .header { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        input, button { padding: 10px; border-radius: 6px; border: 1px solid #444; background: #222; color: white; outline: none; }
        button { cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--accent); border: none; }
        .btn-main:hover { background: #ff6666; transform: translateY(-2px); }
        .btn-main:disabled { opacity: 0.5; cursor: wait; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .post { background: var(--card); border-radius: 12px; padding: 15px; border: 1px solid #333; transition: 0.3s; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .post:hover { border-color: var(--accent); box-shadow: 0 10px 30px rgba(255, 62, 62, 0.1); }
        .media-wrap { width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; background: #000; margin-bottom: 10px; }
        .media-wrap img, .media-wrap video { width: 100%; height: 100%; object-fit: cover; }
        .post-info { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 10px; }
        .tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { background: #333; padding: 3px 8px; border-radius: 4px; font-size: 11px; }
        .like-btn { background: none; border: 1px solid #444; display: flex; align-items: center; gap: 5px; font-size: 12px; color: white; }
        .like-btn.active { color: var(--accent); border-color: var(--accent); }
        .comments { background: #111; padding: 10px; border-radius: 8px; font-size: 12px; max-height: 100px; overflow-y: auto; margin-bottom: 10px; }
        .comment { margin-bottom: 5px; }
        .comment-name { color: #4da6ff; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: var(--card); padding: 30px; border-radius: 15px; width: 300px; display: flex; flex-direction: column; gap: 10px; }
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; color: white; flex-direction: column; justify-content: center; align-items: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loader">
    <div style="border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p id="loader-text">загрузка fembooru...</p>
</div>

<div id="authModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">вход</h2>
        <input type="text" id="regName" placeholder="имя (для регистрации)" style="display:none;">
        <input type="email" id="authEmail" placeholder="email">
        <input type="password" id="authPass" placeholder="пароль">
        <button class="btn-main" onclick="window.submitAuth()">войти в fembooru</button>
        <button onclick="window.closeAuth()">отмена</button>
    </div>
</div>

<aside class="sidebar">
    <h2 style="color: var(--accent); text-align: center; letter-spacing: 2px;">fembooru</h2>
    <div class="auth-box" id="userPanel">
        <p id="userHello">ты не вошел</p>
        <div id="loggedOutBtns">
            <button class="btn-main" onclick="window.openAuth('login')">вход</button>
            <button onclick="window.openAuth('reg')">рега</button>
        </div>
        <button id="logoutBtn" style="display:none;" onclick="window.doLogout()">выйти</button>
    </div>
    <h3>поиск</h3>
    <input type="text" id="search" placeholder="ищи по тегам...">
</aside>

<main class="content">
    <div class="header">
        <div class="controls">
            <input type="file" id="file" accept="image/*,video/*" multiple>
            <input type="text" id="tag1" placeholder="главный тег">
            <input type="text" id="tag2" placeholder="доп. теги">
            <label><input type="checkbox" id="nsfw"> NSFW</label>
            <button class="btn-main" id="upBtn" onclick="window.upload()" disabled>опубликовать</button>
        </div>
    </div>
    <div class="gallery" id="gal"></div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI",
        authDomain: "database-2560e.firebaseapp.com",
        databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "database-2560e",
        storageBucket: "database-2560e.firebasestorage.app",
        messagingSenderId: "52592277568",
        appId: "1:52592277568:web:4c49e5f818ee7348abc7a5"
    };

    const app = initializeApp(config);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let user = null;
    let authMode = 'login';

    onAuthStateChanged(auth, (u) => {
        user = u;
        document.getElementById('upBtn').disabled = !u;
        document.getElementById('logoutBtn').style.display = u ? 'block' : 'none';
        document.getElementById('loggedOutBtns').style.display = u ? 'none' : 'block';
        document.getElementById('userHello').innerText = u ? `привет, ${u.displayName}` : 'ты не вошел';
        window.load();
    });

    window.openAuth = (m) => {
        authMode = m;
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('regName').style.display = m === 'reg' ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = m === 'reg' ? 'регистрация' : 'вход';
    };

    window.closeAuth = () => document.getElementById('authModal').style.display = 'none';

    window.submitAuth = async () => {
        const e = document.getElementById('authEmail').value;
        const p = document.getElementById('authPass').value;
        const n = document.getElementById('regName').value;
        try {
            if(authMode === 'reg') {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
            } else {
                await signInWithEmailAndPassword(auth, e, p);
            }
            window.closeAuth();
        } catch(err) { alert(err.message); }
    };

    window.doLogout = () => signOut(auth);

    async function imgUpload(file) {
        const fd = new FormData(); fd.append('image', file);
        const res = await fetch('https://api.imgbb.com/1/upload?key=120a27bcbb28d3ffd9f03bc4b32bb54f', { method: 'POST', body: fd });
        const d = await res.json(); return d.data.url;
    }

    async function vidUpload(file) {
        const fd = new FormData();
        fd.append('reqtype', 'fileupload');
        fd.append('fileToUpload', file);
        const res = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd });
        return await res.text();
    }

    window.upload = async () => {
        const files = document.getElementById('file').files;
        if(!files.length) return;
        document.getElementById('loader').style.display = 'flex';
        for(let f of files) {
            try {
                const isVid = f.type.includes('video');
                const url = isVid ? await vidUpload(f) : await imgUpload(f);
                await push(ref(db, 'posts'), {
                    url, isVid, uid: user.uid, author: user.displayName,
                    t1: document.getElementById('tag1').value || 'art',
                    t2: document.getElementById('tag2').value || '',
                    nsfw: document.getElementById('nsfw').checked,
                    time: Date.now()
                });
            } catch(e) { alert('ошибка fembooru: ' + e.message); }
        }
        document.getElementById('loader').style.display = 'none';
        document.getElementById('file').value = '';
    };

    window.load = () => {
        onValue(ref(db, 'posts'), (s) => {
            const gal = document.getElementById('gal');
            gal.innerHTML = '';
            const posts = [];
            s.forEach(c => { posts.push({ id: c.key, ...c.val() }); });
            posts.reverse().forEach(p => {
                const q = document.getElementById('search').value.toLowerCase();
                if(q && !`${p.t1} ${p.t2}`.toLowerCase().includes(q)) return;
                
                const div = document.createElement('div');
                div.className = 'post';
                const likes = p.likes ? Object.keys(p.likes).length : 0;
                const liked = user && p.likes && p.likes[user.uid] ? 'active' : '';
                
                let comms = '';
                if(p.comments) Object.values(p.comments).forEach(c => {
                    comms += `<div class="comment"><span class="comment-name">${c.u}:</span> ${c.t}</div>`;
                });

                div.innerHTML = `
                    <div class="post-info">
                        <span>👤 ${p.author}</span>
                        ${user && user.uid === p.uid ? `<button onclick="window.del('${p.id}')" style="padding:2px 5px;font-size:10px;background:#333;color:white;border:1px solid #444;border-radius:4px;cursor:pointer;">удалить</button>` : ''}
                    </div>
                    <div class="media-wrap">
                        ${p.isVid ? `<video id="v-${p.id}" src="${p.url}"></video>` : `<img src="${p.url}" onclick="window.open('${p.url}')">`}
                    </div>
                    <div class="tag-row">
                        <span class="tag" style="color:#4da6ff">#${p.t1}</span>
                        ${p.t2.split(' ').map(t => t ? `<span class="tag">#${t}</span>` : '').join('')}
                    </div>
                    <div class="post-actions">
                        <button class="like-btn ${liked}" onclick="window.like('${p.id}')">❤ ${likes}</button>
                    </div>
                    <div class="comments">${comms || 'комментов нет'}</div>
                    <div style="display:flex;gap:5px;">
                        <input type="text" id="i-${p.id}" placeholder="твой коммент..." style="flex:1;font-size:11px;">
                        <button onclick="window.comm('${p.id}')" style="font-size:11px;">➤</button>
                    </div>
                `;
                gal.appendChild(div);
                if(p.isVid) setTimeout(() => fluidPlayer(`v-${p.id}`, {layoutControls:{primaryColor:"#ff3e3e",fillToContainer:true}}), 50);
            });
        });
    };

    window.del = (id) => confirm('удалить этот пост из fembooru?') && remove(ref(db, `posts/${id}`));

    window.like = async (id) => {
        if(!user) return alert('войди!');
        const p = ref(db, `posts/${id}/likes/${user.uid}`);
        onValue(p, (s) => {
            const val = s.exists() ? null : true;
            update(ref(db), { [`posts/${id}/likes/${user.uid}`]: val });
        }, { onlyOnce: true });
    };

    window.comm = async (id) => {
        if(!user) return alert('войди!');
        const t = document.getElementById(`i-${id}`).value;
        if(!t) return;
        await push(ref(db, `posts/${id}/comments`), { u: user.displayName, t: t });
        document.getElementById(`i-${id}`).value = '';
    };

    document.getElementById('search').addEventListener('input', window.load);

</script>
</body>
</html>
