<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Booru</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div id="profile">
    <img id="avatar" src="https://via.placeholder.com/40">
    <span id="nickname">Guest</span>
  </div>

  <div id="auth">
    <input id="loginNick" placeholder="ник">
    <input id="loginPass" type="password" placeholder="пароль">
    <button onclick="login()">Войти</button>
  </div>

  <input id="search" placeholder="поиск тегов...">
</header>

<main>

<div id="createPost">
  <input type="file" id="file">
  <input id="tags" placeholder="теги">
  <textarea id="desc" placeholder="описание (#теги @пользователи)"></textarea>
  <button onclick="createPost()">Опубликовать</button>
</div>

<div id="posts"></div>

</main>

<script type="module" src="app.js"></script>
</body>
</html>
