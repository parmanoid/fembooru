<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fembooru — Neural Edition</title>
    
    <link rel="preconnect" href="https://cdn.fluidplayer.com">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        :root {
            --bg: #070708; --card: #111113; --card-h: #18181b;
            --accent: #e11d48; --accent-h: #f43f5e;
            --ai-glow: #7c3aed;
            --text: #f4f4f5; --muted: #71717a; --border: #27272a;
            --radius: 16px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* ШАПКА */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(18, 18, 20, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 1000; height: 60px; flex-shrink: 0; }
        .top-nav-left { display: flex; align-items: center; gap: 12px; }
        .nav-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
        .nav-avatar:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(225, 29, 72, 0.3); }
        .top-nav h1 { color: var(--accent); font-size: 22px; cursor: pointer; font-weight: 900; margin: 0; text-transform: lowercase; }
        .ai-status { font-size: 9px; padding: 3px 8px; border-radius: 20px; background: rgba(124, 58, 237, 0.15); color: #a78bfa; border: 1px solid rgba(124, 58, 237, 0.3); font-weight: 800; letter-spacing: 0.5px; }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* САЙДБАР */
        .sidebar { width: 280px; background: #0c0c0e; padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; transition: transform 0.3s; }
        .menu-btn { background: none; border: none; color: white; font-size: 26px; cursor: pointer; display: none; }

        /* НАВИГАЦИЯ */
        .tabs-wrap { background: rgba(12, 12, 14, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); z-index: 500; }
        .app-tabs { display: flex; max-width: 600px; margin: 0 auto; }
        .app-tab { flex: 1; background: transparent; border: none; color: var(--muted); padding: 16px 0; font-size: 13px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 800; transition: 0.2s; border-radius: 0; }
        .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(225, 29, 72, 0.05); }

        .content { flex: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; }
        .tab-content { padding: 20px; display: none; flex-direction: column; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: flex; }

        /* ГАЛЕРЕЯ */
        .gallery { display: flex; flex-wrap: wrap; gap: 14px; padding-bottom: 50px; }
        .gallery::after { content: ""; flex-grow: 10; }
        .post-card { flex: 1 1 220px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.3s; position: relative; }
        .post-card:hover { border-color: #444; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .pc-media { width: 100%; height: 250px; background: #000; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .pc-media img, .pc-media video { width: 100%; height: 100%; object-fit: cover; }
        .pc-info { padding: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; background: var(--card); }
        .ai-rank { position: absolute; top: 10px; right: 10px; background: var(--ai-glow); color: white; font-size: 8px; padding: 4px 8px; border-radius: 6px; z-index: 5; font-weight: 900; box-shadow: 0 0 10px rgba(124, 58, 237, 0.5); }

        /* ШОРТСЫ */
        .shorts-feed { height: calc(100vh - 120px); overflow-y: scroll; scroll-snap-type: y mandatory; margin: -20px; scrollbar-width: none; }
        .short-wrap { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; background: #000; }
        .short-ui { display: flex; gap: 20px; height: 94%; width: 100%; max-width: 850px; justify-content: center; position: relative; }
        .short-video { aspect-ratio: 9/16; height: 100%; background: #000; border-radius: 18px; position: relative; border: 1px solid #222; overflow: hidden; flex-shrink: 0; box-shadow: 0 0 40px rgba(0,0,0,1);}
        .short-video video { width: 100%; height: 100%; object-fit: cover; }
        .short-sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; padding-bottom: 20px; }
        .s-btn { width: 52px; height: 52px; border-radius: 50%; background: #1a1a1c; border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; position: relative; transition: 0.2s; }
        .s-btn:hover { background: var(--accent); transform: scale(1.1); }
        .s-count { position: absolute; bottom: -18px; font-size: 11px; color: var(--muted); width: 100%; text-align: center; font-weight: 800; }

        /* VIEW MODES */
        .view-mode { display: none; padding: 20px; animation: fadeIn 0.3s; max-width: 1200px; margin: 0 auto; width: 100%; }
        .pv-layout { display: flex; gap: 25px; flex-wrap: wrap; }
        .pv-main { flex: 2; min-width: 320px; }
        .pv-side { flex: 1; min-width: 300px; background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: var(--radius); height: fit-content; }
        .hashtag { color: #60a5fa; cursor: pointer; font-weight: 600; margin-right: 8px; font-size: 13px; }
        .hashtag:hover { text-decoration: underline; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal { background: var(--card); padding: 35px; border-radius: 20px; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        input, textarea, button { padding: 14px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1c; color: white; font-size: 14px; transition: 0.2s;}
        .btn-main { background: var(--accent); border: none; font-weight: 800; cursor: pointer; }
        .btn-main:hover { background: var(--accent-h); transform: translateY(-1px); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 280px; box-shadow: 10px 0 30px #000; }
            .sidebar.open { transform: translateX(0); }
            .short-ui { max-width: 100%; height: 100%; gap: 0; }
            .short-video { width: 100%; border-radius: 0; }
            .short-sidebar { position: absolute; right: 10px; bottom: 100px; z-index: 100; }
            .s-btn { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div id="toastBox" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:10px;"></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 style="text-align:center">Вход / Регистрация</h2>
        <input type="text" id="authName" placeholder="Никнейм">
        <input type="password" id="authPass" placeholder="Пароль">
        <button class="btn-main" onclick="window.submitAuth()">Войти в систему</button>
        <button onclick="window.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted)">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2>Мой профиль</h2>
        <p style="font-size:11px; color:var(--muted)">Сменить аватарку:</p>
        <input type="file" id="editAvaFile" accept="image/*">
        <textarea id="editBio" placeholder="Био..." rows="3"></textarea>
        <button class="btn-main" onclick="window.saveProfile()">Сохранить</button>
        <button onclick="window.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted)">Закрыть</button>
    </div>
</div>

<header class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="window.openMyProfile()">
        <h1 onclick="window.goHome()">fembooru <span class="ai-status" id="aiStatus">AI: READY</span></h1>
    </div>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</header>

<div id="menuOverlay" onclick="window.toggleMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:140;"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="window.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="window.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="window.setLang('en')" id="lang-en">EN</button>
        </div>
        <div class="auth-box">
            <div id="loggedOutView"><button class="btn-main" style="width:100%" onclick="window.openAuth()">Войти</button></div>
            <div id="loggedInView" style="display:none">
                <div id="userNameDisplay" style="font-weight:900; cursor:pointer; color:#fff" onclick="window.openMyProfile()">User</div>
                <button onclick="window.doLogout()" style="width:100%; background:#27272a; margin-top:10px; font-size:12px;">Выход</button>
            </div>
        </div>
        <h3 data-i18n="feedFilter">Умная лента</h3>
        <div class="filter-group">
            <label><input type="radio" name="rating" value="all" checked onchange="window.renderCurrentTab()"> <span>Всё подряд</span></label>
            <label><input type="radio" name="rating" value="sfw" onchange="window.renderCurrentTab()"> <span>Только SFW</span></label>
            <label><input type="radio" name="rating" value="nsfw" onchange="window.renderCurrentTab()"> <span style="color:var(--accent)">Только NSFW</span></label>
        </div>
        <h3 data-i18n="tagSearch">Нейро-поиск</h3>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Тэги..." style="width:100%">
            <div id="hints" class="hints"></div>
        </div>
    </aside>

    <main class="content">
        <nav class="tabs-wrap">
            <div class="app-tabs">
                <button class="app-tab active" onclick="window.switchTab('gallery')" id="tab-gallery">Галерея</button>
                <button class="app-tab" onclick="window.switchTab('board')" id="tab-board">Борда</button>
                <button class="app-tab" onclick="window.switchTab('shorts')" id="tab-shorts">Шортсы</button>
            </div>
        </nav>

        <div id="tab-content-gallery" class="tab-content active">
            <div id="upGal" style="display:none; margin-bottom:20px" class="auth-box">
                <div style="display:flex; gap:10px; flex-wrap:wrap">
                    <input type="file" id="fGal" accept="image/*,video/*" multiple style="flex:1">
                    <input type="text" id="t1G" placeholder="Основной тэг" style="width:140px">
                    <input type="text" id="t2G" placeholder="Доп. тэги" style="flex:1">
                    <label style="display:flex; align-items:center; gap:5px"><input type="checkbox" id="nGal"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('gallery')">Пост</button>
                </div>
            </div>
            <div class="gallery" id="galFeed"></div>
        </div>

        <div id="tab-content-board" class="tab-content">
            <div id="upBoard" style="display:none; margin-bottom:20px" class="auth-box">
                <textarea id="txtB" placeholder="О чем ты думаешь?" rows="2" style="width:100%; margin-bottom:10px"></textarea>
                <div style="display:flex; gap:10px"><input type="file" id="fBoard" style="flex:1"><button class="btn-main" onclick="window.upload('board')">Запостить</button></div>
            </div>
            <div class="board-feed" id="boardFeed"></div>
        </div>

        <div id="tab-content-shorts" class="tab-content" style="padding:0">
            <div id="upShorts" style="display:none; padding:15px; background:var(--card); border-bottom:1px solid var(--border)">
                <input type="file" id="fShorts" accept="video/*">
                <button class="btn-main" onclick="window.upload('shorts')">Залить</button>
            </div>
            <div class="shorts-feed" id="shortsFeed"></div>
        </div>

        <div id="profileMode" class="view-mode">
            <div class="profile-header"><img src="" id="pAva" class="p-avatar"><div><h2 id="pName">User</h2><p id="pBio" style="color:var(--muted); font-size:14px"></p><button id="pEditBtn" class="btn-main" style="padding:6px 12px; display:none" onclick="window.openModal('editProfileModal')">Настроить</button></div></div>
            <div class="app-tabs" style="background:transparent; margin-bottom:20px">
                <button class="app-tab active" onclick="window.switchProfTab('uploads')" id="pt-uploads">Моё</button>
                <button class="app-tab" onclick="window.switchProfTab('reposts')" id="pt-reposts">Репосты</button>
            </div>
            <div class="gallery" id="profFeed"></div>
        </div>

        <div id="postMode" class="view-mode">
            <button onclick="window.closePost()" style="margin-bottom:20px; background:#1a1a1c">← Назад</button>
            <div id="pvContainer"></div>
            <h3 style="margin-top:30px; font-size:14px; color:var(--ai-glow)">✦ НЕЙРО-РЕКОМЕНДАЦИИ</h3>
            <div class="gallery" id="aiRecs" style="margin-top:15px"></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI", authDomain: "database-2560e.firebaseapp.com", databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "database-2560e", storageBucket: "database-2560e.firebasestorage.app", messagingSenderId: "52592277568", appId: "1:52592277568:web:4c49e5f818ee7348abc7a5" };
    const IMGBB = "120a27bcbb28d3ffd9f03bc4b32bb54f";
    const GEMINI_API_KEY = "AIzaSyB9IgR3vnbeW0GizY6deDQ2pQrjEiajUqo";

    const app = initializeApp(config); const db = getDatabase(app); const auth = getAuth(app);
    
    window.AppState = { 
        user: null, isAdmin: false, data: { gallery: [], board: [], shorts: [] }, users: {}, currentTab: 'gallery', profUid: null, profTab: 'uploads', tags: {},
        interests: JSON.parse(localStorage.getItem('ai_interests') || '{}')
    };

    // AI ENGINE (Gemini + Local Semantic fallback)
    const AI = {
        track: (tags) => {
            tags.split(' ').filter(Boolean).forEach(t => {
                const tag = t.toLowerCase().replace('#','');
                AppState.interests[tag] = (AppState.interests[tag] || 0) + 1;
            });
            localStorage.setItem('ai_interests', JSON.stringify(AppState.interests));
        },
        getScore: (post) => {
            let score = 0;
            const pTags = [post.t1, ...(post.t2 || '').split(' ')].filter(Boolean).map(x => x.toLowerCase());
            pTags.forEach(t => score += (AppState.interests[t] || 0));
            score += (post.time / Date.now()); // Новые посты чуть выше
            return score;
        },
        getSimilar: async (post) => {
            const currentTags = [post.t1, ...(post.t2 || '').split(' ')].filter(Boolean).map(x => x.toLowerCase());
            // Простой алгоритм пересечения тегов (Fallback)
            return AppState.data[AppState.currentTab]
                .filter(p => p.id !== post.id)
                .map(p => {
                    const pTags = [p.t1, ...(p.t2 || '').split(' ')].filter(Boolean).map(x => x.toLowerCase());
                    let common = pTags.filter(t => currentTags.includes(t)).length;
                    return { post: p, score: common };
                })
                .filter(i => i.score > 0)
                .sort((a,b) => b.score - a.score)
                .slice(0, 6)
                .map(i => i.post);
        }
    };

    // UTILS
    window.showToast = (m) => { const b=document.getElementById('toastBox'), t=document.createElement('div'); t.className='toast show'; t.innerText=m; b.appendChild(t); setTimeout(()=>t.remove(),3000); };
    window.openModal = (id) => document.getElementById(id).style.display='flex';
    window.closeModal = (id) => document.getElementById(id).style.display='none';
    window.toggleMenu = () => { const s=document.getElementById('sidebar'), o=document.getElementById('menuOverlay'); s.classList.toggle('open'); o.style.display=s.classList.contains('open')?'block':'none'; };

    // AUTH
    onAuthStateChanged(auth, u => {
        AppState.user = u; AppState.isAdmin = u && u.email === "test@anon.ru";
        ['Gal', 'Board', 'Shorts'].forEach(i => { if(document.getElementById('up'+i)) document.getElementById('up'+i).style.display = u ? 'block' : 'none'; });
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block';
        document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        if(u) {
            document.getElementById('userNameDisplay').innerText = u.displayName;
            get(ref(db, 'users/'+u.uid)).then(s => { if(s.exists()) document.getElementById('navAvatar').src = s.val().avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png"; });
        }
        fetchAll();
    });

    window.submitAuth = async () => {
        const n=document.getElementById('authName').value, p=document.getElementById('authPass').value, e=n.toLowerCase()+'@anon.ru';
        try { await signInWithEmailAndPassword(auth, e, p); } catch(err) {
            try { const res=await createUserWithEmailAndPassword(auth,e,p); await updateProfile(res.user,{displayName:n}); await set(ref(db,'users/'+res.user.uid),{name:n,avatar:"https://i.ibb.co/3sW3xQy/default-avatar.png",bio:''}); } catch(e2) { alert('Error'); }
        }
        window.closeModal('authModal');
    };

    // UPLOAD & PROXY
    async function upImg(file) { const fd = new FormData(); fd.append('image', file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB}`, { method: 'POST', body: fd }); const d = await res.json(); return d.success ? d.data.url : null; }
    async function upVid(file) { 
        const fd = new FormData(); fd.append('reqtype', 'fileupload'); fd.append('fileToUpload', file);
        const r = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd });
        return r.ok ? await r.text() : null;
    }

    window.upload = async (type) => {
        const input = document.getElementById(type==='gallery'?'fGal':type==='board'?'fBoard':'fShorts');
        if(!input.files.length) return;
        document.getElementById('loader').style.display='flex';
        for(let f of input.files) {
            try {
                const url = f.type.startsWith('image/') ? await upImg(f) : await upVid(f);
                const nsfw = document.getElementById('n'+(type==='gallery'?'Gal':type==='board'?'Board':'Shorts'))?.checked || false;
                const data = { url, uid: AppState.user.uid, author: AppState.user.displayName, time: Date.now(), isVid: f.type.includes('video'), nsfw };
                if(type==='gallery') { data.t1 = document.getElementById('t1G').value || 'art'; data.t2 = document.getElementById('t2G').value || ''; }
                if(type==='board') data.text = document.getElementById('txtB').value;
                await push(ref(db, type), data);
            } catch(e) { window.showToast('Ошибка'); }
        }
        document.getElementById('loader').style.display='none'; input.value='';
    };

    // PROFILE
    window.openMyProfile = () => AppState.user ? window.openProfile(AppState.user.uid) : window.openAuth();
    window.openProfile = async (uid) => {
        AppState.profUid = uid; document.getElementById('profileMode').style.display='block';
        const d = (await get(ref(db,'users/'+uid))).val()||{};
        document.getElementById('pAva').src=d.avatar||"https://i.ibb.co/3sW3xQy/default-avatar.png";
        document.getElementById('pName').innerText=d.name||'Anon';
        document.getElementById('pBio').innerText=d.bio||'';
        document.getElementById('pEditBtn').style.display=AppState.user?.uid===uid?'block':'none';
        window.switchProfTab('uploads');
    };
    window.saveProfile = async () => {
        const f=document.getElementById('editAvaFile').files[0], b=document.getElementById('editBio').value;
        let a=document.getElementById('pAva').src; if(f) a=await upImg(f);
        await update(ref(db,'users/'+AppState.user.uid),{avatar:a,bio:b}); window.closeModal('editProfileModal'); window.openProfile(AppState.user.uid);
    };
    window.switchProfTab = (t) => { AppState.profTab=t; document.querySelectorAll('#profileMode .app-tab').forEach(b=>b.classList.toggle('active',b.id==='pt-'+t)); renderProfFeed(); };

    // RENDER LOGIC
    function fetchAll() {
        onValue(ref(db, 'users'), s => AppState.users = s.val() || {});
        ['gallery', 'board', 'shorts'].forEach(t => onValue(ref(db, t), s => {
            const a = []; AppState.tags = {};
            s.forEach(c => { 
                const d = c.val(); a.push({id:c.key,...d});
                if(t==='gallery') [d.t1, ...(d.t2||'').split(' ')].filter(Boolean).forEach(x => AppState.tags[x.toLowerCase()] = (AppState.tags[x.toLowerCase()]||0)+1);
            });
            AppState.data[t] = a; renderCurrentTab();
        }));
    }

    window.renderCurrentTab = () => {
        if(AppState.profUid) return;
        const rf = document.querySelector('input[name="rating"]:checked').value;
        const q = document.getElementById('search').value.toLowerCase().replace(/#/g,'').split(' ').filter(Boolean);
        
        let feed = AppState.data[AppState.currentTab].filter(p => {
            if(rf==='sfw' && p.nsfw) return false; if(rf==='nsfw' && !p.nsfw) return false;
            if(q.length) return q.every(word => `${p.t1} ${p.t2 || ''}`.toLowerCase().includes(word));
            return true;
        });

        // AI SORTING (Neural Rank)
        feed.sort((a,b) => AI.getScore(b) - AI.getScore(a));

        if(AppState.currentTab==='gallery') renderGrid(feed, 'galFeed');
        if(AppState.currentTab==='board') renderBoard(feed);
        if(AppState.currentTab==='shorts') renderShorts(feed);
    };

    function renderGrid(arr, target) {
        const el = document.getElementById(target); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'post-card'; div.onclick = () => window.openPost(p.id, AppState.currentTab);
            const isAI = AI.getScore(p) > 2 ? '<div class="ai-rank">AI PICK</div>' : '';
            div.innerHTML = `${p.nsfw?'<div class="nsfw-badge">NSFW</div>':''} ${isAI}
                <div class="pc-media">${p.isVid?'<video src="'+p.url+'#t=0.1" muted></video>':'<img src="'+p.url+'" loading="lazy">'}</div>
                <div class="pc-info"><span style="color:#60a5fa">#${p.t1}</span><span>❤ ${p.likes?Object.keys(p.likes).length:0}</span></div>`;
            el.appendChild(div);
        });
    }

    function renderBoard(arr) {
        const el = document.getElementById('boardFeed'); el.innerHTML = '';
        arr.forEach(p => {
            const ava = AppState.users[p.uid]?.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
            const div = document.createElement('div'); div.className = 'board-post';
            div.innerHTML = `<div class="b-header" onclick="window.openProfile('${p.uid}')"><img src="${ava}" class="b-avatar"> ${p.author}</div>
                ${p.text?'<div style="font-size:15px">'+p.text+'</div>':''} ${p.url?`<div class="pc-media" style="border-radius:10px" onclick="window.openPost('${p.id}','board')">${p.isVid?'<video src="'+p.url+'" controls></video>':'<img src="'+p.url+'">'}</div>`:''}
                <div style="display:flex;gap:10px;margin-top:10px"><button class="btn-main" style="flex:1" onclick="window.like('${p.id}','board')">❤ ${p.likes?Object.keys(p.likes).length:0}</button></div>`;
            el.appendChild(div);
        });
    }

    function renderShorts(arr) {
        const el = document.getElementById('shortsFeed'); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'short-wrap';
            div.innerHTML = `<div class="short-ui"><div class="short-video"><video src="${p.url}" loop playsinline preload="metadata" onclick="this.paused?this.play():this.pause()"></video>
                <div style="position:absolute;bottom:20px;left:20px;z-index:10"><b onclick="window.openProfile('${p.uid}')" style="cursor:pointer;font-size:18px;text-shadow:0 1px 3px #000">@${p.author}</b></div></div>
                <div class="short-sidebar"><button class="s-btn" onclick="window.like('${p.id}','shorts')">❤<span class="s-count">${p.likes?Object.keys(p.likes).length:0}</span></button>
                <button class="s-btn" onclick="window.repost('${p.id}','shorts')">🔄</button></div></div>`;
            el.appendChild(div);
        });
        const obs = new IntersectionObserver(e => e.forEach(v => { const vid = v.target.querySelector('video'); if(v.isIntersecting) vid.play(); else vid.pause(); }), {threshold:0.7});
        document.querySelectorAll('.short-wrap').forEach(w => obs.observe(w));
    }

    function renderProfFeed() {
        let items = [];
        if(AppState.profTab==='uploads') ['gallery','board','shorts'].forEach(t=>items.push(...AppState.data[t].filter(p=>p.uid===AppState.profUid)));
        else { const r=AppState.users[AppState.profUid]?.reposts||{}; Object.keys(r).forEach(id=>{ const post=AppState.data[r[id]]?.find(x=>x.id===id); if(post) items.push(post); }); }
        renderGrid(items.sort((a,b)=>b.time-a.time), 'profFeed');
    }

    // AI POST VIEW
    window.openPost = async (id, type) => {
        const p = AppState.data[type].find(x => x.id === id); if(!p) return;
        AppState.currentPostId = id; document.getElementById('postMode').style.display='block';
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        
        AI.track(`${p.t1} ${p.t2 || ''}`); // Обучение ИИ на лету

        const tags = `<span class="hashtag" onclick="window.setSearch('${p.t1}')">#${p.t1}</span>` + (p.t2||'').split(' ').filter(Boolean).map(t=>`<span class="hashtag" onclick="window.setSearch('${t}')">#${t}</span>`).join(' ');
        document.getElementById('pvContainer').innerHTML = `<div class="pv-layout"><div class="pv-main"><div class="pv-media">${p.isVid?'<video src="'+p.url+'" controls autoplay></video>':'<img src="'+p.url+'">'}</div></div>
        <div class="pv-side"><h3>@${p.author}</h3><p>${p.text||''}</p><div style="margin-bottom:20px">${tags}</div>
        <button class="btn-main" style="width:100%" onclick="window.like('${id}','${type}')">❤ Лайк</button>
        <button class="btn-main" style="width:100%;background:#27272a;margin-top:10px" onclick="window.repost('${id}','${type}')">🔄 Репост</button></div></div>`;
        
        // AI Recommendations
        const sim = await AI.getSimilar(p);
        renderGrid(sim, 'aiRecs');
    };

    window.switchTab = (t) => { AppState.currentTab=t; AppState.profUid=null; document.querySelectorAll('.app-tab').forEach(b=>b.classList.toggle('active',b.id==='tab-'+t)); document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active',c.id==='tab-content-'+t)); document.getElementById('profileMode').style.display='none'; document.getElementById('postMode').style.display='none'; renderCurrentTab(); };
    window.setSearch = (t) => { document.getElementById('search').value=t; window.closePost(); window.renderCurrentTab(); };
    window.closePost = () => { AppState.currentPostId = null; document.getElementById('postMode').style.display='none'; window.switchTab(AppState.currentTab); };
    window.goHome = () => { document.getElementById('search').value=''; AppState.profUid=null; document.getElementById('profileMode').style.display='none'; window.closePost(); window.switchTab('gallery'); };
    window.closeProfile = () => { AppState.profUid = null; document.getElementById('profileMode').style.display = 'none'; window.renderCurrentTab(); };
    window.like = async (id, type) => { if(!AppState.user) return window.openAuth(); const r=ref(db, `${type}/${id}/likes/${AppState.user.uid}`); const s = await get(r); await set(r, s.exists()?null:true); };
    window.repost = async (id, type) => { if(!AppState.user) return window.openAuth(); const r = ref(db, `users/${AppState.user.uid}/reposts/${id}`); const s = await get(r); await set(r, s.exists()?null:type); window.showToast('Репост!'); };
    window.setLang = (l) => { AppState.lang=l; window.renderCurrentTab(); };

</script>
</body>
</html>
