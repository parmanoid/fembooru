<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fembooru</title>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        :root {
            --bg: #0d0d0d;
            --card: #161616;
            --accent: #ff3e3e;
            --text: #ffffff;
            --muted: #888888;
            --border: #2a2a2a;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .mobile-nav { display: none; justify-content: space-between; align-items: center; padding: 15px 20px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 100; position: relative; }
        .mobile-nav h1 { margin: 0; color: var(--accent); font-size: 20px; letter-spacing: 1px; cursor: pointer; }
        .menu-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0; }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        .sidebar { width: 280px; background: #111; padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 150; flex-shrink: 0; }
        .sidebar-title { color: var(--accent); text-align: center; letter-spacing: 2px; margin-bottom: 30px; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .auth-box { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 25px; border: 1px solid var(--border); }
        .auth-text { font-size: 13px; margin-bottom: 15px; color: #ccc; text-align: center;}
        
        input, button { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #1a1a1a; color: white; outline: none; font-size: 14px; transition: 0.2s; }
        input:focus { border-color: var(--accent); }
        button { cursor: pointer; font-weight: bold; }
        .btn-main { background: var(--accent); border: none; color: white; }
        .btn-main:hover { background: #ff5555; transform: translateY(-1px); }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .filter-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .filter-group label { font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #ccc; }
        .filter-group input { accent-color: var(--accent); width: 18px; height: 18px; margin: 0;}

        .search-wrap { position: relative; margin-bottom: 20px; }
        .hints { position: absolute; top: 100%; left: 0; width: 100%; background: #222; border-radius: 8px; z-index: 50; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); margin-top: 5px; border: 1px solid #444;}
        .hint-item { padding: 12px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; }
        .hint-item:hover { background: #333; color: var(--accent); }

        .content { flex: 1; padding: 25px; overflow-y: auto; background: var(--bg); position: relative;}
        
        .upload-section { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid var(--border); }
        .upload-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .upload-controls > input[type="file"] { flex: 1; min-width: 200px; }
        .checkbox-wrap { color: var(--accent); font-weight: bold; display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 0 10px;}
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; padding-bottom: 50px;}
        .post { background: var(--card); border-radius: 16px; padding: 15px; border: 1px solid var(--border); animation: fadeIn 0.4s ease; display: flex; flex-direction: column; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .media-wrap { width: 100%; border-radius: 10px; overflow: hidden; background: #050505; margin-bottom: 15px; position: relative; }
        .media-wrap img, .media-wrap video { width: 100%; height: auto; max-height: 600px; display: block; object-fit: contain; cursor: pointer; }
        .nsfw-badge { position: absolute; bottom: 10px; right: 10px; background: rgba(255,62,62,0.9); color: white; font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: bold; z-index: 10;}

        .tag-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 15px; }
        .tag { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; color: #ccc; border: 1px solid #333;}
        .tag.primary { color: #4da6ff; border-color: rgba(77, 166, 255, 0.3); }

        .btn-like { background: transparent; border: 1px solid var(--border); border-radius: 20px; padding: 8px 16px; color: #eee; display: flex; align-items: center; gap: 6px; font-weight: bold;}
        .btn-like.active { color: var(--accent); border-color: var(--accent); background: rgba(255,62,62,0.1); }

        .comments-area { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 12px; margin-top: auto; border: 1px solid var(--border); }
        .comments-list { max-height: 150px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; font-size: 13px; }
        .comment-item { line-height: 1.4; word-break: break-word; border-bottom: 1px solid #222; padding-bottom: 5px;}
        .c-author { color: #4da6ff; font-weight: bold; margin-right: 5px; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal { background: var(--card); padding: 30px; border-radius: 16px; width: 90%; max-width: 320px; display: flex; flex-direction: column; gap: 15px; border: 1px solid var(--border); }
        
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; width: 90%; max-width: 300px; text-align: center; pointer-events: none;}
        .toast { background: #222; border: 1px solid #444; color: white; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transform: translateY(20px); transition: 0.3s ease; font-weight: bold; }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--accent); }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; color: white; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid #333; border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .mobile-nav { display: flex; }
            .sidebar-title { display: none; }
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 280px; transform: translateX(-100%); background: #111; }
            .sidebar.open { transform: translateX(0); }
            .content { padding: 15px; height: calc(100vh - 60px); }
            .upload-controls { flex-direction: column; align-items: stretch; }
            .gallery { grid-template-columns: 1fr; gap: 15px; }
        }
        
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 140; backdrop-filter: blur(2px);}
        .sidebar-overlay.active { display: block; }
    </style>
</head>
<body>

<div class="toast-container" id="toastBox"></div>

<div id="loader">
    <div class="spinner"></div>
    <p id="loader-text">загрузка fembooru...</p>
</div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalTitle">вход</h2>
        <input type="text" id="regName" placeholder="Твой никнейм" style="display:none;">
        <input type="email" id="authEmail" placeholder="Email">
        <input type="password" id="authPass" placeholder="Пароль">
        <button class="btn-main" onclick="window.submitAuth()">Погнали</button>
        <button onclick="window.closeAuth()" style="background: transparent; border: none; color: var(--muted);">Отмена</button>
    </div>
</div>

<div class="mobile-nav">
    <h1 onclick="location.reload()">fembooru</h1>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</div>

<div class="sidebar-overlay" id="menuOverlay" onclick="window.toggleMenu()"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title" onclick="location.reload()">fembooru</div>
        
        <div class="auth-box">
            <div id="loggedOutView">
                <div class="auth-text">Войди в аккаунт для публикации.</div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-main" style="flex:1" onclick="window.openAuth('login')">Вход</button>
                    <button style="flex:1; background:#333;" onclick="window.openAuth('reg')">Рега</button>
                </div>
            </div>
            <div id="loggedInView" style="display:none;">
                <div class="auth-text" id="userNameDisplay" style="color:white; font-size:15px; font-weight:bold;">Привет!</div>
                <button onclick="window.doLogout()" style="width: 100%; background: #222;">Выйти</button>
            </div>
        </div>

        <h3>Лента</h3>
        <div class="filter-group">
            <label><input type="radio" name="rating" value="all" checked onchange="window.load()"> <span>Всё</span></label>
            <label><input type="radio" name="rating" value="sfw" onchange="window.load()"> <span>SFW</span></label>
            <label><input type="radio" name="rating" value="nsfw" onchange="window.load()"> <span>NSFW</span></label>
        </div>

        <h3>Поиск</h3>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Ищи тег..." style="width: 100%;" autocomplete="off">
            <div id="hints" class="hints"></div>
        </div>
    </aside>

    <main class="content" id="mainContent">
        <div class="upload-section" id="uploadPanel" style="display: none;">
            <div class="upload-controls">
                <input type="file" id="file" accept="image/*,video/*" multiple>
                <input type="text" id="tag1" placeholder="Главный тег">
                <input type="text" id="tag2" placeholder="Доп. теги">
                <label class="checkbox-wrap"><input type="checkbox" id="nsfw"> NSFW</label>
                <button class="btn-main" onclick="window.upload()">Опубликовать</button>
            </div>
        </div>
        <div class="gallery" id="gal"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const config = {
        apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI",
        authDomain: "database-2560e.firebaseapp.com",
        databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "database-2560e",
        storageBucket: "database-2560e.firebasestorage.app",
        messagingSenderId: "52592277568",
        appId: "1:52592277568:web:4c49e5f818ee7348abc7a5"
    };

    const IMGBB_KEY = "120a27bcbb28d3ffd9f03bc4b32bb54f";

    const app = initializeApp(config);
    const db = getDatabase(app);
    const auth = getAuth(app);
    let user = null;
    let authMode = 'login';
    let tagStats = {}; 

    window.showToast = (msg, isError = false) => {
        const box = document.getElementById('toastBox');
        const t = document.createElement('div');
        t.className = 'toast ' + (isError ? 'error' : '');
        t.innerText = msg;
        box.appendChild(t);
        setTimeout(() => t.classList.add('show'), 10);
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 3000);
    };

    window.toggleMenu = () => {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('menuOverlay').classList.toggle('active');
    };

    onAuthStateChanged(auth, (u) => {
        user = u;
        document.getElementById('uploadPanel').style.display = u ? 'block' : 'none';
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block';
        document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        if(u) document.getElementById('userNameDisplay').innerText = `Привет, ${u.displayName}!`;
        window.load();
    });

    window.openAuth = (m) => {
        authMode = m;
        document.getElementById('authModal').style.display = 'flex';
        document.getElementById('regName').style.display = m === 'reg' ? 'block' : 'none';
        document.getElementById('modalTitle').innerText = m === 'reg' ? 'Регистрация' : 'Вход';
    };

    window.closeAuth = () => document.getElementById('authModal').style.display = 'none';

    window.submitAuth = async () => {
        const e = document.getElementById('authEmail').value.trim();
        const p = document.getElementById('authPass').value;
        const n = document.getElementById('regName').value.trim();
        try {
            if(authMode === 'reg') {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
            } else {
                await signInWithEmailAndPassword(auth, e, p);
            }
            window.closeAuth();
        } catch(err) { window.showToast(err.message, true); }
    };

    window.doLogout = () => signOut(auth);

    async function safeUpload(file) {
        // Пробуем ImgBB для фото
        if (file.type.startsWith('image/')) {
            try {
                const fd = new FormData(); fd.append('image', file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                const d = await res.json();
                if(d.success) return d.data.url;
            } catch(e) {}
        }
        // Запасной для фото и основной для видео - Catbox через прокси
        const fd2 = new FormData();
        fd2.append('reqtype', 'fileupload');
        fd2.append('fileToUpload', file);
        const res2 = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd2 });
        if(res2.ok) return await res2.text();
        throw new Error('Сервера перегружены');
    }

    window.upload = async () => {
        const files = document.getElementById('file').files;
        if(!files.length) return;
        document.getElementById('loader').style.display = 'flex';
        for(let f of files) {
            try {
                const url = await safeUpload(f);
                await push(ref(db, 'posts'), {
                    url, isVid: f.type.includes('video'), uid: user.uid, author: user.displayName,
                    t1: document.getElementById('tag1').value.trim() || 'art',
                    t2: document.getElementById('tag2').value.trim() || '',
                    nsfw: document.getElementById('nsfw').checked,
                    time: Date.now()
                });
            } catch(e) { window.showToast(`Сбой: ` + e.message, true); }
        }
        document.getElementById('loader').style.display = 'none';
        document.getElementById('file').value = '';
    };

    window.load = () => {
        onValue(ref(db, 'posts'), (s) => {
            const gal = document.getElementById('gal');
            gal.innerHTML = '';
            const posts = [];
            const ratingFilter = document.querySelector('input[name="rating"]:checked').value;
            tagStats = {};

            s.forEach(c => { 
                const data = c.val();
                posts.push({ id: c.key, ...data });
                const allTags = [data.t1, ...(data.t2 || '').split(' ')].filter(t => t);
                allTags.forEach(t => { 
                    const clean = t.toLowerCase();
                    tagStats[clean] = (tagStats[clean] || 0) + 1;
                });
            });

            posts.reverse().forEach(p => {
                const q = document.getElementById('search').value.toLowerCase();
                const tags = `${p.t1} ${p.t2 || ''}`.toLowerCase();
                if(q && !tags.includes(q)) return;
                if(ratingFilter === 'sfw' && p.nsfw) return;
                if(ratingFilter === 'nsfw' && !p.nsfw) return;

                const div = document.createElement('div');
                div.className = 'post';
                const likes = p.likes ? Object.keys(p.likes).length : 0;
                const liked = user && p.likes && p.likes[user.uid] ? 'active' : '';
                
                let comms = '';
                if(p.comments) Object.values(p.comments).forEach(c => {
                    comms += `<div class="comment-item"><span class="c-author">${c.u}:</span> ${c.t}</div>`;
                });

                div.innerHTML = `
                    <div class="post-header">
                        <span class="post-author">👤 ${p.author}</span>
                        ${user && user.uid === p.uid ? `<button class="btn-delete" onclick="window.del('${p.id}')">🗑 Удалить</button>` : '<span></span>'}
                    </div>
                    <div class="media-wrap">
                        ${p.nsfw ? '<div class="nsfw-badge">NSFW</div>' : ''}
                        ${p.isVid ? `<video id="v-${p.id}" src="${p.url}"></video>` : `<img src="${p.url}" onclick="window.open('${p.url}')">`}
                    </div>
                    <div class="tag-row">
                        <span class="tag primary" onclick="window.applyTag('${p.t1}')">#${p.t1}</span>
                        ${(p.t2 || '').split(' ').map(t => t ? `<span class="tag" onclick="window.applyTag('${t}')">#${t}</span>` : '').join('')}
                    </div>
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <button class="btn-like ${liked}" onclick="window.like('${p.id}')">❤ ${likes}</button>
                    </div>
                    <div class="comments-area">
                        <div class="comments-list">${comms || 'Нет комментов'}</div>
                        <div class="comment-input-wrap">
                            <input type="text" id="i-${p.id}" placeholder="Твой коммент...">
                            <button onclick="window.comm('${p.id}')">➤</button>
                        </div>
                    </div>
                `;
                gal.appendChild(div);
                if(p.isVid) setTimeout(() => fluidPlayer(`v-${p.id}`, {layoutControls:{primaryColor:"#ff3e3e",fillToContainer:true}}), 50);
            });
        });
    };

    document.getElementById('search').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase().trim();
        const box = document.getElementById('hints');
        box.innerHTML = '';
        if (!val) { box.style.display = 'none'; window.load(); return; }
        const matches = Object.keys(tagStats).filter(t => t.includes(val));
        if (matches.length > 0) {
            matches.sort((a, b) => tagStats[b] - tagStats[a]);
            matches.slice(0, 10).forEach(m => {
                const item = document.createElement('div');
                item.className = 'hint-item';
                item.innerHTML = `<span>#${m}</span> <span style="color:var(--muted)">${tagStats[m]}</span>`;
                item.onclick = () => {
                    document.getElementById('search').value = m;
                    box.style.display = 'none';
                    window.load();
                };
                box.appendChild(item);
            });
            box.style.display = 'block';
        } else { box.style.display = 'none'; }
        window.load();
    });

    window.applyTag = (t) => { document.getElementById('search').value = t.toLowerCase(); window.load(); };
    window.del = (id) => confirm('Удалить?') && remove(ref(db, `posts/${id}`));
    window.like = async (id) => {
        if(!user) return window.showToast('Войди!', true);
        const hasLiked = (await (update(ref(db), { [`posts/${id}/likes/${user.uid}`]: user ? true : null })));
        // Переключение лайка
        const lRef = ref(db, `posts/${id}/likes/${user.uid}`);
        onValue(lRef, (s) => {
            const v = s.exists() ? null : true;
            update(ref(db), { [`posts/${id}/likes/${user.uid}`]: v });
        }, {onlyOnce: true});
    };
    window.comm = async (id) => {
        const t = document.getElementById(`i-${id}`).value;
        if(!t || !user) return;
        await push(ref(db, `posts/${id}/comments`), { u: user.displayName, t: t });
        document.getElementById(`i-${id}`).value = '';
    };
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) document.getElementById('hints').style.display = 'none'; });

</script>
</body>
</html>
