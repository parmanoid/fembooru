<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Global Art Booru</title>
    
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>

    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #222; padding: 20px; border-right: 1px solid #333; overflow-y: auto; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        
        h3 { font-size: 14px; color: #888; margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; background: #2a2a2a; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 10px; border: 1px solid #444; border-radius: 4px; background: #333; color: white; outline: none; }
        input[type="text"]:focus { border-color: #e63946; }
        button.action-btn { padding: 10px 20px; cursor: pointer; background: #e63946; color: white; border: none; border-radius: 4px; transition: 0.2s; font-weight: bold; }
        button.action-btn:hover { background: #ff4d4d; }
        button.action-btn:disabled { background: #555; cursor: not-allowed; }
        
        .checkbox-wrapper { color: #ff4d4d; cursor: pointer; display: flex; align-items: center; gap: 5px; user-select: none; font-weight: bold; }
        
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .post { background: #2a2a2a; padding: 15px; border-radius: 8px; text-align: center; position: relative; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        
        .media-link { display: block; overflow: hidden; border-radius: 4px; position: relative; margin-bottom: 10px; }
        .media-link img, .media-link video { width: 100%; height: auto; display: block; object-fit: cover; border-radius: 4px; transition: transform 0.2s; }
        .media-link img:hover { transform: scale(1.02); cursor: zoom-in; }
        
        .nsfw-badge { position: absolute; top: 20px; right: 20px; background: rgba(230, 57, 70, 0.9); color: white; padding: 3px 8px; font-size: 11px; border-radius: 4px; z-index: 10; font-weight: bold; letter-spacing: 1px;}
        .btn-delete-post { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(0, 0, 0, 0.6); color: white; border: 1px solid #444; border-radius: 4px; padding: 4px 10px; font-size: 12px; cursor: pointer; transition: 0.2s;}
        .btn-delete-post:hover { background: #e63946; border-color: #e63946; }
        
        .tags { font-size: 13px; color: #aaa; margin-top: auto; text-align: left; background: #222; padding: 10px; border-radius: 4px; }
        .primary-badge { color: #4da6ff; display: inline-block; margin-bottom: 5px; text-transform: uppercase; font-size: 12px; font-weight: bold; }
        
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; color: white; font-size: 20px; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #e63946; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .filter-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 25px; }
        .filter-group label { cursor: pointer; color: #ccc; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .filter-group input[type="radio"] { accent-color: #e63946; }
    </style>
</head>
<body>
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div id="loading-text" style="font-family: monospace;">Инициализация...</div>
    </div>

    <aside class="sidebar">
        <h3>Поиск</h3>
        <input type="text" id="searchInput" placeholder="Поиск по тегам..." style="width: 100%; box-sizing: border-box; margin-bottom: 25px;">
        
        <h3>Контент</h3>
        <div class="filter-group">
            <label><input type="radio" name="filterRating" value="all" checked> Всё подряд</label>
            <label><input type="radio" name="filterRating" value="sfw"> Только SFW</label>
            <label><input type="radio" name="filterRating" value="nsfw"> Только NSFW</label>
        </div>
        
        <h3>Формат</h3>
        <div class="filter-group">
            <label><input type="radio" name="filterType" value="all" checked> Фото + Видео</label>
            <label><input type="radio" name="filterType" value="image"> Только Фото</label>
            <label><input type="radio" name="filterType" value="video"> Только Видео</label>
        </div>
    </aside>
    
    <main class="content">
        <div class="header">
            <div class="controls">
                <input type="file" id="fileInput" accept="image/*,video/mp4,video/webm,video/ogg" multiple style="flex: 1;">
                <input type="text" id="primaryTagInput" placeholder="Главный тег" style="width: 130px;">
                <input type="text" id="secondaryTagsInput" placeholder="Детали (через пробел)" style="width: 180px;">
                <label class="checkbox-wrapper"><input type="checkbox" id="nsfwCheckbox"> NSFW</label>
                <button class="action-btn" id="uploadBtn" onclick="window.processAndUpload()">Загрузить</button>
            </div>
        </div>
        <div class="gallery" id="gallery"></div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const IMGBB_API_KEY = "120a27bcbb28d3ffd9f03bc4b32bb54f"; 

        const firebaseConfig = {
            apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI",
            authDomain: "database-2560e.firebaseapp.com",
            databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "database-2560e",
            storageBucket: "database-2560e.firebasestorage.app",
            messagingSenderId: "52592277568",
            appId: "1:52592277568:web:4c49e5f818ee7348abc7a5",
            measurementId: "G-DGVLJRWDP8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let allPosts = [];

        const postsRef = ref(db, 'posts');
        onValue(postsRef, (snapshot) => {
            allPosts = [];
            snapshot.forEach(child => {
                allPosts.push({ id: child.key, ...child.val() });
            });
            allPosts.reverse(); 
            window.renderGallery();
        });

        async function compressImage(file, quality = 0.8) {
            if (file.type === 'image/gif') return file;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_SIZE = 1920; 
                        let width = img.width;
                        let height = img.height;

                        if (width > height && width > MAX_SIZE) {
                            height *= MAX_SIZE / width;
                            width = MAX_SIZE;
                        } else if (height > MAX_SIZE) {
                            width *= MAX_SIZE / height;
                            height = MAX_SIZE;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append('image', imageBlob);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
            const result = await response.json();
            if (result.success) return result.data.url;
            throw new Error('Ошибка ImgBB');
        }

        async function uploadToCatbox(file) {
            const formData = new FormData();
            formData.append('reqtype', 'fileupload');
            formData.append('fileToUpload', file);
            const response = await fetch('https://catbox.moe/user/api.php', { method: 'POST', body: formData });
            if(response.ok) return await response.text();
            throw new Error('Ошибка Catbox');
        }

        window.processAndUpload = async function() {
            const fileInput = document.getElementById('fileInput');
            const pTag = document.getElementById('primaryTagInput').value.trim().toLowerCase() || 'разное';
            const sTags = document.getElementById('secondaryTagsInput').value.trim().toLowerCase();
            const isNsfw = document.getElementById('nsfwCheckbox').checked;
            const overlay = document.getElementById('loading-overlay');
            const statusText = document.getElementById('loading-text');

            if (fileInput.files.length === 0) return alert('Выбери файлы!');

            overlay.style.display = 'flex';
            document.getElementById('uploadBtn').disabled = true;

            for (let i = 0; i < fileInput.files.length; i++) {
                const file = fileInput.files[i];
                const ext = file.name.split('.').pop().toLowerCase();
                const isVideo = ['mp4', 'webm', 'ogg', 'mov'].includes(ext);
                let finalUrl = "";
                
                try {
                    if (isVideo) {
                        statusText.innerText = `[${i + 1}/${fileInput.files.length}] Отправляем ВИДЕО на Catbox...`;
                        finalUrl = await uploadToCatbox(file);
                    } else {
                        statusText.innerText = `[${i + 1}/${fileInput.files.length}] Сжимаем и шлём ФОТО на ImgBB...`;
                        const compressed = await compressImage(file, 0.8);
                        finalUrl = await uploadToImgBB(compressed);
                    }

                    await push(postsRef, {
                        url: finalUrl,
                        primary_tag: pTag,
                        secondary_tags: sTags,
                        is_nsfw: isNsfw,
                        is_video: isVideo,
                        timestamp: Date.now()
                    });
                } catch (error) {
                    console.error(error);
                    alert(`Не удалось загрузить: ${file.name}`);
                }
            }

            overlay.style.display = 'none';
            document.getElementById('uploadBtn').disabled = false;
            fileInput.value = '';
        };

        window.renderGallery = function() {
            const gallery = document.getElementById('gallery');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filterRating = document.querySelector('input[name="filterRating"]:checked').value;
            const filterType = document.querySelector('input[name="filterType"]:checked').value;

            gallery.innerHTML = '';
            let hasVisiblePosts = false;

            allPosts.forEach(post => {
                if (filterRating === 'sfw' && post.is_nsfw) return;
                if (filterRating === 'nsfw' && !post.is_nsfw) return;
                if (filterType === 'video' && !post.is_video) return;
                if (filterType === 'image' && post.is_video) return;

                const searchTarget = (post.primary_tag + " " + post.secondary_tags).toLowerCase();
                if (searchQuery && !searchTarget.includes(searchQuery)) return;

                hasVisiblePosts = true;

                const postDiv = document.createElement('div');
                postDiv.className = 'post';

                let mediaHTML = post.is_video 
                    ? `<video id="vid-${post.id}" src="${post.url}"></video>` 
                    : `<img src="${post.url}" loading="lazy" onclick="window.open('${post.url}', '_blank')">`;

                postDiv.innerHTML = `
                    <button class="btn-delete-post" onclick="window.deletePost('${post.id}')">Удалить</button>
                    ${post.is_nsfw ? '<div class="nsfw-badge">NSFW</div>' : ''}
                    <div class="media-link">
                        ${mediaHTML}
                    </div>
                    <div class="tags">
                        <span class="primary-badge">[${post.primary_tag}]</span> ${post.secondary_tags}
                    </div>
                `;
                gallery.appendChild(postDiv);

                if (post.is_video) {
                    setTimeout(() => {
                        fluidPlayer(`vid-${post.id}`, { layoutControls: { primaryColor: '#e63946', playButtonShowing: true, fillToContainer: true }});
                    }, 50);
                }
            });

            if (!hasVisiblePosts) {
                gallery.innerHTML = '<p style="color:#666; font-family: monospace;">Ничего не найдено.</p>';
            }
        };

        window.deletePost = async function(id) {
            if(!confirm('Точно сносим этот шедевр?')) return;
            await remove(ref(db, 'posts/' + id));
        };

        document.getElementById('searchInput').addEventListener('input', window.renderGallery);
        document.querySelectorAll('input[type="radio"]').forEach(radio => {
            radio.addEventListener('change', window.renderGallery);
        });
    </script>
</body>
</html>
