<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fembooru</title>
    
    <link rel="preconnect" href="https://cdn.fluidplayer.com">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --card-hover: #27272a;
            --accent: #e11d48; --accent-hover: #f43f5e;
            --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a;
            --radius: 12px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 1000; height: 60px; flex-shrink: 0;}
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-avatar { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; border: 2px solid transparent; transition: 0.2s;}
        .top-nav h1 { margin: 0; color: var(--accent); font-size: 22px; letter-spacing: 1px; cursor: pointer; font-weight: 900; }
        .menu-btn { background: none; border: none; color: white; font-size: 26px; cursor: pointer; padding: 0; display: none;}

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: #0f0f11; padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; transition: transform 0.3s; }
        .lang-switcher { display: flex; gap: 5px; margin-bottom: 25px; background: #1f1f22; padding: 4px; border-radius: 8px;}
        .lang-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 6px 0; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .lang-btn.active { background: #3f3f46; color: #fff; }

        .auth-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: var(--radius); margin-bottom: 25px; border: 1px solid var(--border); }
        .auth-text { font-size: 13px; margin-bottom: 12px; color: var(--muted); text-align: center; }
        
        input, button, textarea { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #27272a; color: white; outline: none; font-size: 14px; }
        .btn-main { background: var(--accent); border: none; color: white; transition: 0.2s;}
        .btn-main:hover { background: var(--accent-hover); transform: translateY(-1px); }

        /* NAVIGATION TABS */
        .tabs-container { background: rgba(15, 15, 17, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 500; }
        .app-tabs { display: flex; max-width: 800px; margin: 0 auto; }
        .app-tab { flex: 1; background: transparent; border: none; color: var(--muted); padding: 16px 0; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: bold; transition: 0.2s; border-radius: 0;}
        .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .content { flex: 1; overflow-y: auto; background: var(--bg); position: relative; display: flex; flex-direction: column;}
        .tab-content { padding: 20px; display: none; flex-direction: column; animation: fadeIn 0.3s ease;}
        .tab-content.active { display: flex; }

        /* UPLOAD SECTION */
        .upload-section { background: var(--card); padding: 20px; border-radius: var(--radius); margin-bottom: 25px; border: 1px solid var(--border); }
        .upload-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .upload-controls > input, .upload-controls > textarea { flex: 1; min-width: 150px; background: #1f1f22;}

        /* FEED ELEMENTS */
        .gallery { display: flex; flex-wrap: wrap; gap: 12px; padding-bottom: 50px; }
        .gallery::after { content: ""; flex-grow: 10; }
        .post-card { flex: 1 1 240px; max-width: 100%; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; position: relative; transition: 0.3s; break-inside: avoid; }
        .post-card-media { width: 100%; height: 260px; background: #000; display: flex; justify-content: center; align-items: center; overflow: hidden;}
        .post-card-media img, .post-card-media video { width: 100%; height: 100%; object-fit: cover; }
        .post-card-info { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); font-size: 12px;}
        
        .board-feed { display: flex; flex-direction: column; gap: 16px; max-width: 700px; margin: 0 auto; width: 100%; }
        .board-post { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .b-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #27272a;}
        .action-row { display: flex; gap: 8px; margin-top: 10px;}
        .btn-action { background: #27272a; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: #eee; font-size: 13px; font-weight: bold; flex: 1; cursor: pointer;}
        .btn-action.active { color: var(--accent); border-color: var(--accent); background: rgba(225, 29, 72, 0.1); }

        /* SHORTS */
        .shorts-feed { height: calc(100vh - 120px); overflow-y: scroll; scroll-snap-type: y mandatory; margin: -20px; scrollbar-width: none;}
        .short-wrapper { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; background: #000; position: relative;}
        .short-container { display: flex; gap: 20px; height: 95%; max-width: 850px; width: 100%; justify-content: center; }
        .short-video-wrap { aspect-ratio: 9/16; height: 100%; background: #000; border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #222;}
        .short-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
        .short-sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; padding-bottom: 20px;}
        .s-btn { background: #1f1f22; border: 1px solid #333; color: white; width: 50px; height: 50px; border-radius: 50%; font-size: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative;}
        .s-count { position: absolute; bottom: -18px; font-size: 11px; font-weight: bold; width: 100%; text-align: center; color: var(--muted);}

        /* PROFILE & POST VIEW */
        .view-mode { display: none; padding: 20px; animation: fadeIn 0.3s; max-width: 1000px; margin: 0 auto; width: 100%; }
        .profile-header { background: var(--card); border-radius: var(--radius); padding: 25px; display: flex; gap: 20px; align-items: center; border: 1px solid var(--border); margin-bottom: 20px;}
        .p-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); }
        .pv-layout { display: flex; gap: 20px; flex-wrap: wrap; }
        .pv-main { flex: 2; min-width: 300px; }
        .pv-sidebar { flex: 1; min-width: 280px; background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); height: fit-content; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .modal { background: var(--card); padding: 25px; border-radius: var(--radius); width: 90%; max-width: 380px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #333; }
        
        .toast-container { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
        .toast { background: #333; color: white; padding: 12px 20px; border-radius: 10px; font-size: 14px; opacity: 0; transform: translateY(10px); transition: 0.3s; font-weight: bold; text-align: center;}
        .toast.show { opacity: 1; transform: translateY(0); }
        
        #loader { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* MOBILE FIXES */
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .short-container { height: 100%; max-width: 100%; gap: 0; }
            .short-video-wrap { width: 100%; border-radius: 0; }
            .short-sidebar { position: absolute; right: 10px; bottom: 100px; z-index: 10; }
            .s-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div class="toast-container" id="toastBox"></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalTitle">Вход</h2>
        <input type="text" id="authName" placeholder="Никнейм">
        <input type="password" id="authPass" placeholder="Пароль (мин. 6)">
        <button class="btn-main" onclick="window.submitAuth()">Войти</button>
        <button onclick="window.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted);">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2>Редактировать профиль</h2>
        <p style="font-size:12px; color:var(--muted);">Загрузи аватарку:</p>
        <input type="file" id="editAvatarFile" accept="image/*">
        <textarea id="editBio" placeholder="О себе..." rows="3"></textarea>
        <button class="btn-main" onclick="window.saveProfile()">Сохранить</button>
        <button onclick="window.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted);">Отмена</button>
    </div>
</div>

<header class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="window.openMyProfile()">
        <h1 onclick="window.goHome()">fembooru</h1>
    </div>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</header>

<div class="sidebar-overlay" id="menuOverlay" onclick="window.toggleMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:140;"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="window.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="window.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="window.setLang('en')" id="lang-en">EN</button>
        </div>

        <div class="auth-box">
            <div id="loggedOutView">
                <div class="auth-text" data-i18n="guestMsg">Войди, чтобы постить.</div>
                <button class="btn-main" style="width:100%" onclick="window.openAuth('login')">Вход / Регистрация</button>
            </div>
            <div id="loggedInView" style="display:none;">
                <div class="auth-text" id="userNameDisplay" style="color:white; font-weight:bold; cursor:pointer;" onclick="window.openMyProfile()">User</div>
                <button onclick="window.doLogout()" style="width:100%; background:#27272a; margin-top:10px;">Выйти</button>
            </div>
        </div>

        <div id="filtersPanel">
            <h3 data-i18n="feedFilter">Фильтр</h3>
            <div class="filter-group">
                <label><input type="radio" name="rating" value="all" checked onchange="window.renderCurrentTab()"> <span>Всё</span></label>
                <label><input type="radio" name="rating" value="sfw" onchange="window.renderCurrentTab()"> <span>SFW</span></label>
                <label><input type="radio" name="rating" value="nsfw" onchange="window.renderCurrentTab()"> <span style="color:var(--accent)">NSFW</span></label>
            </div>
            <h3 data-i18n="tagSearch">Поиск</h3>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="Тэги..." style="width:100%">
                <div id="hints" class="hints"></div>
            </div>
        </div>
    </aside>

    <main class="content">
        <nav class="tabs-container" id="navTabs">
            <div class="app-tabs">
                <button class="app-tab active" onclick="window.switchTab('gallery')" id="tab-gallery">Галерея</button>
                <button class="app-tab" onclick="window.switchTab('board')" id="tab-board">Борда</button>
                <button class="app-tab" onclick="window.switchTab('shorts')" id="tab-shorts">Шортсы</button>
            </div>
        </nav>

        <div id="tabContent-gallery" class="tab-content active">
            <div class="upload-section" id="uploadPanelGal" style="display:none">
                <div class="upload-controls">
                    <input type="file" id="fileGal" accept="image/*,video/*" multiple>
                    <input type="text" id="tag1Gal" placeholder="Главный тэг">
                    <input type="text" id="tag2Gal" placeholder="Доп. тэги (через пробел)">
                    <label><input type="checkbox" id="nsfwGal"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('gallery')">Пост</button>
                </div>
            </div>
            <div class="gallery" id="galFeed"></div>
        </div>

        <div id="tabContent-board" class="tab-content">
            <div class="upload-section" id="uploadPanelBoard" style="display:none">
                <textarea id="textBoard" placeholder="Что нового?" rows="2" style="width:100%; margin-bottom:10px;"></textarea>
                <div class="upload-controls">
                    <input type="file" id="fileBoard" accept="image/*,video/*">
                    <label><input type="checkbox" id="nsfwBoard"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('board')">Отправить</button>
                </div>
            </div>
            <div class="board-feed" id="boardFeed"></div>
        </div>

        <div id="tabContent-shorts" class="tab-content" style="padding:0">
            <div id="uploadPanelShorts" style="display:none; padding:15px; background:var(--card); border-bottom:1px solid var(--border);">
                <div class="upload-controls">
                    <input type="file" id="fileShorts" accept="video/*">
                    <input type="text" id="textShorts" placeholder="Описание...">
                    <label><input type="checkbox" id="nsfwShorts"> NSFW</label>
                    <button class="btn-main" onclick="window.upload('shorts')">Залить</button>
                </div>
            </div>
            <div class="shorts-feed" id="shortsFeed"></div>
        </div>

        <div id="profileMode" class="view-mode">
            <button onclick="window.closeProfile()" style="margin-bottom:20px;">← Назад</button>
            <div class="profile-header">
                <img src="" id="profAvatar" class="p-avatar">
                <div>
                    <h2 id="profName">User</h2>
                    <p id="profBio" style="color:var(--muted); font-size:14px; margin-bottom:10px;"></p>
                    <button id="profEditBtn" class="btn-main" style="padding:6px 12px; display:none" onclick="window.openModal('editProfileModal')">Настроить</button>
                </div>
            </div>
            <div class="app-tabs" style="margin-bottom:20px;">
                <button class="app-tab active" onclick="window.switchProfTab('uploads')" id="pt-uploads">Моё</button>
                <button class="app-tab" onclick="window.switchProfTab('reposts')" id="pt-reposts">Репосты</button>
            </div>
            <div class="gallery" id="profFeed"></div>
        </div>

        <div id="postMode" class="view-mode">
            <button onclick="window.closePost()" style="margin-bottom:20px;">← Назад</button>
            <div class="pv-layout" id="pvContainer"></div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getDatabase, ref, push, onValue, remove, update, get, set } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

    const config = { apiKey: "AIzaSyCTNoJDcWPcLh5XUEXBRLqCeFSu0lOuyEI", authDomain: "database-2560e.firebaseapp.com", databaseURL: "https://database-2560e-default-rtdb.europe-west1.firebasedatabase.app", projectId: "database-2560e", storageBucket: "database-2560e.firebasestorage.app", messagingSenderId: "52592277568", appId: "1:52592277568:web:4c49e5f818ee7348abc7a5" };
    const IMGBB_KEY = "120a27bcbb28d3ffd9f03bc4b32bb54f";
    const ADMIN_EMAIL = "test@anon.ru";

    const app = initializeApp(config); const db = getDatabase(app); const auth = getAuth(app);
    window.AppState = { user: null, isAdmin: false, data: { gallery: [], board: [], shorts: [] }, users: {}, currentTab: 'gallery', profUid: null, profTab: 'uploads', lang: 'ru' };

    // SYSTEM
    window.showToast = (m, e=false) => { const b = document.getElementById('toastBox'); const t = document.createElement('div'); t.className = 'toast ' + (e?'error':''); t.innerText = m; b.appendChild(t); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{t.classList.remove('show'); setTimeout(()=>t.remove(),400)},3000); };
    window.openModal = (id) => document.getElementById(id).style.display = 'flex';
    window.closeModal = (id) => document.getElementById(id).style.display = 'none';
    window.toggleMenu = () => { const s = document.getElementById('sidebar'), o = document.getElementById('menuOverlay'); s.classList.toggle('open'); o.style.display = s.classList.contains('open') ? 'block' : 'none'; };

    // AUTH
    onAuthStateChanged(auth, u => {
        AppState.user = u; AppState.isAdmin = u && u.email === ADMIN_EMAIL;
        ['Gal', 'Board', 'Shorts'].forEach(i => document.getElementById('uploadPanel'+i).style.display = u ? 'block' : 'none');
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block';
        document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        if(u) {
            document.getElementById('userNameDisplay').innerText = u.displayName;
            get(ref(db, 'users/'+u.uid)).then(s => { if(s.exists()) document.getElementById('navAvatar').src = s.val().avatar || 'https://i.ibb.co/3sW3xQy/default-avatar.png'; });
        }
        fetchAll();
    });

    function genMail(n) { const r = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'}; return n.toLowerCase().replace(/[а-яё]/g, m => r[m] || m).replace(/[^a-z0-9]/g, '') + '@anon.ru'; }
    window.openAuth = () => window.openModal('authModal');
    window.submitAuth = async () => {
        const n = document.getElementById('authName').value.trim(), p = document.getElementById('authPass').value;
        if(!n || p.length < 6) return window.showToast('Ошибка данных', true);
        const e = genMail(n);
        try {
            await signInWithEmailAndPassword(auth, e, p);
        } catch(err) {
            try {
                const res = await createUserWithEmailAndPassword(auth, e, p);
                await updateProfile(res.user, { displayName: n });
                await set(ref(db, 'users/'+res.user.uid), { name: n, avatar: 'https://i.ibb.co/3sW3xQy/default-avatar.png', bio: '' });
            } catch(e2) { window.showToast('Ошибка: ' + e2.message, true); }
        }
        window.closeModal('authModal');
    };
    window.doLogout = () => signOut(auth);

    // UPLOAD LOGIC (WITH PROXY)
    async function upImg(file) { const fd = new FormData(); fd.append('image', file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd }); const d = await res.json(); return d.success ? d.data.url : null; }
    async function upCat(file) { const fd = new FormData(); fd.append('reqtype', 'fileupload'); fd.append('fileToUpload', file); const res = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd }); return res.ok ? await res.text() : null; }

    window.upload = async (type) => {
        const input = document.getElementById(type==='gallery'?'fileGal':type==='board'?'fileBoard':'fileShorts');
        if(!input.files.length) return;
        document.getElementById('loader').style.display='flex';
        for(let f of input.files) {
            try {
                let url = f.type.startsWith('image/') ? await upImg(f) : await upCat(f);
                if(!url) url = await upCat(f); // Fallback
                const nsfw = document.getElementById('nsfw'+(type==='gallery'?'Gal':type==='board'?'Board':'Shorts')).checked;
                const data = { url, uid: AppState.user.uid, author: AppState.user.displayName, time: Date.now(), isVid: f.type.includes('video'), nsfw };
                if(type==='gallery') { data.t1 = document.getElementById('tag1Gal').value || 'art'; data.t2 = document.getElementById('tag2Gal').value || ''; }
                if(type==='board') data.text = document.getElementById('textBoard').value;
                if(type==='shorts') data.text = document.getElementById('textShorts').value;
                await push(ref(db, type), data);
            } catch(e) { window.showToast('Ошибка загрузки', true); }
        }
        document.getElementById('loader').style.display='none'; input.value='';
    };

    // PROFILE
    window.openMyProfile = () => AppState.user ? window.openProfile(AppState.user.uid) : window.openAuth();
    window.openProfile = async (uid) => {
        AppState.profUid = uid; AppState.currentPostId = null;
        document.getElementById('navTabs').style.display = 'none';
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('profileMode').style.display = 'block';
        const d = (await get(ref(db, 'users/'+uid))).val() || {};
        document.getElementById('profAvatar').src = d.avatar || 'https://i.ibb.co/3sW3xQy/default-avatar.png';
        document.getElementById('profName').innerText = d.name || 'Anon';
        document.getElementById('profBio').innerText = d.bio || '';
        document.getElementById('profEditBtn').style.display = AppState.user?.uid === uid ? 'block' : 'none';
        window.switchProfTab('uploads');
    };
    window.closeProfile = () => { AppState.profUid = null; document.getElementById('profileMode').style.display = 'none'; document.getElementById('navTabs').style.display = 'block'; window.switchTab(AppState.currentTab); };
    window.saveProfile = async () => {
        const file = document.getElementById('editAvatarFile').files[0], bio = document.getElementById('editBio').value;
        let ava = document.getElementById('profAvatar').src;
        document.getElementById('loader').style.display='flex';
        if(file) ava = await upImg(file);
        await update(ref(db, 'users/'+AppState.user.uid), { avatar: ava, bio });
        document.getElementById('navAvatar').src = ava;
        document.getElementById('loader').style.display='none';
        window.closeModal('editProfileModal'); window.openProfile(AppState.user.uid);
    };

    // FETCH & RENDER
    function fetchAll() {
        onValue(ref(db, 'users'), s => AppState.users = s.val() || {});
        ['gallery', 'board', 'shorts'].forEach(t => onValue(ref(db, t), s => {
            const a = []; s.forEach(c => a.push({id:c.key,...c.val()}));
            AppState.data[t] = a.reverse();
            renderCurrentTab();
        }));
    }

    window.switchTab = (t) => {
        AppState.currentTab = t; AppState.profUid = null;
        document.querySelectorAll('.app-tab').forEach(b => b.classList.remove('active')); document.getElementById('tab-'+t).classList.add('active');
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById('tabContent-'+t).classList.add('active');
        document.getElementById('profileMode').style.display='none'; document.getElementById('postMode').style.display='none';
        renderCurrentTab();
    };

    window.renderCurrentTab = () => {
        if(AppState.profUid) return renderProfFeed();
        const rf = document.querySelector('input[name="rating"]:checked').value;
        const q = document.getElementById('search').value.toLowerCase().split(' ').filter(Boolean);
        const filter = (p) => {
            if(rf==='sfw' && p.nsfw) return false; if(rf==='nsfw' && !p.nsfw) return false;
            if(AppState.currentTab==='gallery' && q.length) { 
                const tags = `${p.t1||''} ${p.t2||''}`.toLowerCase();
                return q.every(w => tags.includes(w));
            }
            return true;
        };
        const feed = AppState.data[AppState.currentTab].filter(filter);
        if(AppState.currentTab==='gallery') renderGal(feed, 'galFeed');
        if(AppState.currentTab==='board') renderBoard(feed);
        if(AppState.currentTab==='shorts') renderShorts(feed);
    };

    function renderGal(arr, target) {
        const el = document.getElementById(target); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'post-card'; 
            div.onclick = () => window.openPost(p.id, AppState.currentTab);
            div.innerHTML = `${p.nsfw?'<div class="nsfw-badge">NSFW</div>':''}
                <div class="post-card-media">${p.isVid?'<div class="vid-icon">▶</div><video src="'+p.url+'#t=0.1" preload="metadata" muted></video>':'<img src="'+p.url+'" loading="lazy">'}</div>
                <div class="post-card-info"><b>#${p.t1}</b><span>❤ ${p.likes?Object.keys(p.likes).length:0}</span></div>`;
            el.appendChild(div);
        });
    }

    function renderBoard(arr) {
        const el = document.getElementById('boardFeed'); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'board-post';
            const ava = AppState.users[p.uid]?.avatar || 'https://i.ibb.co/3sW3xQy/default-avatar.png';
            div.innerHTML = `<div class="board-header" onclick="window.openProfile('${p.uid}')" style="cursor:pointer"><img src="${ava}" class="b-avatar"><b>${p.author}</b></div>
                ${p.text?'<div>'+p.text+'</div>':''} ${p.url?'<div class="board-media">'+(p.isVid?'<video src="'+p.url+'" controls></video>':'<img src="'+p.url+'">')+'</div>':''}
                <div class="action-row">
                    <button class="btn-action ${p.likes?.[AppState.user?.uid]?'active':''}" onclick="window.like('${p.id}','board')">❤ ${p.likes?Object.keys(p.likes).length:0}</button>
                    <button class="btn-action" onclick="window.repost('${p.id}','board')">🔄 Репост</button>
                    <button class="btn-action" onclick="window.openPost('${p.id}','board')">💬</button>
                </div>`;
            el.appendChild(div);
        });
    }

    function renderShorts(arr) {
        const el = document.getElementById('shortsFeed'); el.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'short-wrapper';
            div.innerHTML = `<div class="short-container">
                <div class="short-video-wrap">
                    <video src="${p.url}" loop playsinline preload="metadata" onclick="this.paused?this.play():this.pause()"></video>
                    <div style="position:absolute; bottom:20px; left:20px; z-index:5"><b onclick="window.openProfile('${p.uid}')" style="cursor:pointer">@${p.author}</b><p>${p.text||''}</p></div>
                </div>
                <div class="short-sidebar">
                    <button class="s-btn ${p.likes?.[AppState.user?.uid]?'active':''}" onclick="window.like('${p.id}','shorts')">❤<span class="s-count">${p.likes?Object.keys(p.likes).length:0}</span></button>
                    <button class="s-btn" onclick="window.repost('${p.id}','shorts')">🔄</button>
                    <button class="s-btn" onclick="window.openPost('${p.id}','shorts')">💬</button>
                    ${AppState.isAdmin || AppState.user?.uid===p.uid ? '<button class="s-btn" onclick="window.del(\''+p.id+'\',\'shorts\')">🗑</button>':''}
                </div>
            </div>`;
            el.appendChild(div);
        });
        const obs = new IntersectionObserver(e => e.forEach(v => { const vid = v.target.querySelector('video'); if(v.isIntersecting) vid.play(); else vid.pause(); }), {threshold:0.7});
        document.querySelectorAll('.short-wrapper').forEach(w => obs.observe(w));
    }

    window.openPost = (id, type) => {
        const p = AppState.data[type].find(x => x.id === id); if(!p) return;
        AppState.currentPostId = id; document.getElementById('postMode').style.display = 'block';
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('pvContainer').innerHTML = `<div class="pv-main">
            <div class="pv-media-wrap">${p.isVid?'<video src="'+p.url+'" controls autoplay></video>':'<img src="'+p.url+'">'}</div>
        </div>
        <div class="pv-sidebar">
            <h3>@${p.author}</h3><p>${p.text||''}</p>
            <div class="action-row">
                <button class="btn-action" onclick="window.like('${p.id}','${type}')">❤ Лайк</button>
                <button class="btn-action" onclick="window.del('${p.id}','${type}')" style="color:var(--accent)">Удалить</button>
            </div>
            <div class="comments-list" id="commList"></div>
            <div style="display:flex;gap:5px"><input type="text" id="cInp" style="flex:1"><button onclick="window.addComm('${id}','${type}')">➤</button></div>
        </div>`;
        onValue(ref(db, `${type}/${id}/comments`), s => {
            const list = document.getElementById('commList'); list.innerHTML = '';
            s.forEach(c => { const d = c.val(); list.innerHTML += `<div class="comment-item"><b>${d.name}:</b> ${d.t}</div>`; });
        });
    };

    window.addComm = async (id, type) => {
        const inp = document.getElementById('cInp'), t = inp.value.trim();
        if(!t || !AppState.user) return;
        await push(ref(db, `${type}/${id}/comments`), { uid: AppState.user.uid, name: AppState.user.displayName, t });
        inp.value = '';
    };

    function renderProfFeed() {
        let items = [];
        if(AppState.profTab === 'uploads') {
            ['gallery', 'board', 'shorts'].forEach(t => items.push(...AppState.data[t].filter(p => p.uid === AppState.profUid)));
        } else {
            const rep = AppState.users[AppState.profUid]?.reposts || {};
            Object.keys(rep).forEach(id => { const type = rep[id]; const post = AppState.data[type]?.find(x => x.id === id); if(post) items.push(post); });
        }
        renderGal(items.sort((a,b)=>b.time-a.time), 'profFeed');
    }

    window.switchProfTab = (t) => { AppState.profTab = t; document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active')); document.getElementById('pt-'+t).classList.add('active'); renderProfFeed(); };
    window.closePost = () => { AppState.currentPostId = null; document.getElementById('postMode').style.display='none'; window.switchTab(AppState.currentTab); };
    window.goHome = () => window.switchTab('gallery');
    window.like = async (id, type) => { if(!AppState.user) return window.openAuth(); const r = ref(db, `${type}/${id}/likes/${AppState.user.uid}`); const s = await get(r); await set(r, s.exists()?null:true); };
    window.repost = async (id, type) => { if(!AppState.user) return window.openAuth(); const r = ref(db, `users/${AppState.user.uid}/reposts/${id}`); const s = await get(r); await set(r, s.exists()?null:type); window.showToast('Репост!'); };
    window.del = async (id, type) => { if(confirm('Удалить?')) await remove(ref(db, `${type}/${id}`)); };
    window.setLang = (l) => { AppState.lang = l; window.renderCurrentTab(); };

</script>
</body>
</html>
