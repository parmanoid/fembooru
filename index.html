    <script type="module">
        // --- 1. Инициализация Firebase ---
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';

        import { getDatabase, ref, push, set, get, child, onValue, query, orderByChild, equalTo, limitToLast, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAu8tzzrqKizHt2_0_-6r6DJU02szqtgEA",

        async function handleLoginSignup() {
            const username = document.getElementById('username-input').value.trim();
            if (!username) {
                alert('Введите логин.');
                return;
            }

            const email = `${username}@anon.ru`;
            const password = 'defaultPassword123'; // В реальном приложении - более безопасно

            try {
                // Пробуем войти
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                // Если успех, ничего делать не нужно, onAuthStateChanged сработает
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    // Пользователя нет, создаем
                    try {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        // После регистрации сразу установим displayName
                        await updateProfile(userCredential.user, { displayName: username });
                    } catch (createError) {
                        console.error("Ошибка регистрации:", createError);
                        alert('Ошибка регистрации: ' + createError.message);
                    }
                } else {
                    console.error("Ошибка входа:", error);
                    alert('Ошибка входа: ' + error.message);
                }
            }
        }

        function logout() {
            signOut(auth);
        }

        // --- 3. Управление профилем ---
        function loadProfile(userId) {
            currentProfileUserId = userId;
            const profileRef = ref(db, `profiles/${userId}`);
            get(profileRef).then((snapshot) => {
                const profileData = snapshot.val();
                if (profileData) {
                    document.getElementById('profile-avatar-large').src = profileData.avatarUrl || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2U5ZWNmMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5BdmF0YXI8L3RleHQ+PC9zdmc+';
                    document.getElementById('profile-username').textContent = profileData.displayName || 'Anon';
                    document.getElementById('profile-status').textContent = profileData.status || '';
                    document.getElementById('profile-about').textContent = profileData.about || 'Нет информации.';
                } else {
                    // Если профиль не существует, создаем минимальный
                    document.getElementById('profile-avatar-large').src = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2U5ZWNmMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5BdmF0YXI8L3RleHQ+PC9zdmc+';
                    document.getElementById('profile-username').textContent = 'Anon';
                    document.getElementById('profile-status').textContent = '';
                    document.getElementById('profile-about').textContent = 'Нет информации.';
                }
            }).catch(console.error);
        }

        // --- 4. Отображение представлений ---
        function showHomeView() {
            currentView = 'home';
            currentSearchTag = null; // Сбросить тег поиска
            document.getElementById('main-content').innerHTML = `
                <div class="search-bar">
                    <input type="text" id="tag-search-input" placeholder="Поиск по тегам...">
                    <button onclick="handleTagSearch()">Найти</button>
                    <div class="tag-suggestions-container" id="tag-suggestions-container"></div>
                </div>
                <div id="post-form-container">
                    <h2>Создать пост</h2>
                    <div class="form-group">
                        <label for="description">Описание:</label>
                        <textarea id="description" placeholder="Введите описание поста..."></textarea>
                    </div>
                    <div class="form-group">
                        <label for="tags">Теги (через запятую):</label>
                        <input type="text" id="tags" placeholder="например: art, cute, anime">

                    <div class="form-group">
                        <label for="media-upload">Медиа файл:</label>
                        <input type="file" id="media-upload" accept="image/*,video/*">
                    </div>
                    <button onclick="uploadPost()">Загрузить пост</button>
                </div>
                <div id="posts-container"></div>
            `;
            if (currentUser) {
                document.getElementById('post-form-container').classList.remove('hidden');
            } else {
                document.getElementById('post-form-container').classList.add('hidden');
            }

            // Обработчик ввода для поиска тегов
            const searchInput = document.getElementById('tag-search-input');
            searchInput.addEventListener('input', debounce(handleTagSuggestionInput, 300));

            loadPosts(); // Загрузить все посты по умолчанию
        }

        function showProfileView(userId) {
            currentView = 'profile';
            currentProfileUserId = userId;
            document.getElementById('main-content').innerHTML = `
                <div class="profile-header">
                    <img id="profile-avatar-large" src="..." alt="Profile Avatar" class="profile-avatar-large">
                    <div class="profile-details">
                        <h2 id="profile-username">...</h2>
                        <div class="profile-status" id="profile-status">...</div>
                        <div class="profile-about" id="profile-about">...</div>
                    </div>
                </div>
                <div class="tab-buttons">
                    <button class="tab-button active" data-tab="uploads">Загрузки</button>
                    <button class="tab-button" data-tab="reposts">Репосты</button>
                </div>
                <div id="profile-posts-container"></div>
            `;
            // Логика переключения вкладок
            document.querySelectorAll('.tab-button').forEach(button => {
                button.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');
                    loadProfilePosts(e.target.dataset.tab);
                });
            });
            loadProfile(userId);
            loadProfilePosts('uploads'); // Загрузить вкладку "Загрузки" по умолчанию
        }

        function showPostView(postId) {
            // Для упрощения, показываем подробности поста на той же главной странице
ация отдельной страницы потребует изменения маршрутизации
            alert(`Открытие поста ${postId} в детализированном виде. Эта функция требует доработки.`);
        }

        // --- 5. Загрузка контента ---
        function loadPosts(tag = null) {
            const postsContainer = document.getElementById('posts-container');
            let postsQuery;

            if (tag) {
                // Загрузка постов по тегу
                postsContainer.innerHTML = `<p>Поиск по тегу #${tag}...</p>`;
                const tagRef = ref(db, `postsByTag/${tag}`);
                get(tagRef).then(tagSnapshot => {
                    if (tagSnapshot.exists()) {
                        const postIds = Object.keys(tagSnapshot.val());
                        postsContainer.innerHTML = ''; // Очистить сообщение "Поиск..."
                        loadPostsByIds(postIds, postsContainer); // Загрузить посты по ID
                    } else {
                        postsContainer.innerHTML = `<p>Постов с тегом #${tag} не найдено.</p>`;
                    }
                }).catch(error => {
                    console.error("Ошибка поиска по тегу:", error);
                    postsContainer.innerHTML = '<p>Ошибка при поиске.</p>';
                });
            } else {
                // Загрузка всех постов (или последних N)
                postsContainer.innerHTML = '<p>Загрузка постов...</p>';
                postsQuery = query(ref(db, 'posts/'), orderByChild('timestamp'), limitToLast(20));
                onValue(postsQuery, (snapshot) => {
                    postsContainer.innerHTML = ''; // Очистить перед загрузкой
                    snapshot.forEach((childSnapshot) => {
                        const postData = childSnapshot.val();
                        const postKey = childSnapshot.key;
                        renderPost(postData, postKey, postsContainer);
                    });
                }, { onlyOnce: true }); // onlyOnce для загрузки при открытии домашней страницы
            }
        }

        function loadPostsByIds(postIds, container) {
            postIds.forEach(async (postId) => {
                const postDetailRef = ref(db, `posts/${postId}`);
                const postDetailSnapshot = await get(postDetailRef);
                if (postDetailSnapshot.exists()) {
                    const postData = postDetailSnapshot.val();
                    renderPost(postData, postId, container);
                }
            });
        }

        function renderPost(postData, postKey, container) {
            const postElement = document.createElement('div');
            postElement.className = 'post';
            postElement.innerHTML = `
                <div class="post-header">
                    <img src="${postData.authorAvatar || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iI2U5ZWNmMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5BdmF0YXI8L3RleHQ+PC9zdmc+'}" alt="Author Avatar" class="post-author-avatar" onclick="showProfileView('${postData.userId}')">
                    <span class="post-author-name" onclick="showProfileView('${postData.userId}')">${postData.authorName}</span>
                    <span class="post-meta">${new Date(postData.timestamp).toLocaleString()}</span>
                </div>
                <div class="post-content">
                    <p>${postData.description}</p>
                    ${postData.mediaUrl ? `<img src="${postData.mediaUrl}" alt="Post Media" class="post-media">` : ''}
                </div>
                <div class="post-tags">
                    ${postData.tags.map(tag => `<span class="tag" onclick="searchByTag('${tag}')">#${tag}</span>`).join(' ')}
                </div>
                <div class="post-actions">
                    <button>❤️ ${postData.likes || 0}</button>
                    <button>🔄 ${postData.reposts || 0}</button>
                    <button onclick="showPostView('${postKey}')">💬 Комментарии</button>
                </div>
                <div class="comment-section">
                    <h4>Комментарии:</h4>
                    <div id="comments-${postKey}"></div>
                    ${currentUser ? `
                        <div class="form-group">
                            <textarea id="comment-input-${postKey}" placeholder="Написать комментарий..."></textarea>
                            <button onclick="addComment('${postKey}', '${currentUser.uid}', '${currentUser.displayName || currentUser.email.split('@')[0]}')">Отправить</button>
                        </div>
                    ` : '<p>Чтобы оставить комментарий, <a href="#" onclick="showHomeView()">войдите</a>.</p>'}
                </div>
            `;
            container.appendChild(postElement);

            // Загрузка комментариев для этого поста
            loadComments(postKey);
        }

        function loadProfilePosts(tab) {
            const postsContainer = document.getElementById('profile-posts-container');
            postsContainer.innerHTML = '<p>Загрузка...</p>';
            const path = tab === 'uploads' ? `userPosts/${currentProfileUserId}` : `userReposts/${currentProfileUserId}`;
            const postsQuery = query(ref(db, path), orderByChild('timestamp'));

            get(postsQuery).then((snapshot) => {
                postsContainer.innerHTML = '<div class="post-grid">'; // Используем сетку
                if (snapshot.exists()) {
                    snapshot.forEach((childSnapshot) => {
                        const postData = childSnapshot.val();
                        const postElement = document.createElement('div');
                        postElement.className = 'post';
                        postElement.innerHTML = `
                            <img src="${postData.mediaUrl || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjUwIiBoZWlnaHQ9IjI1MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48cmVjdCB3aWR0aD0iMjUwIiBoZWlnaHQ9IjI1MCIgZmlsbD0iI2U5ZWNmMiIvPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMTgiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuM2VtIj5ObyBNZWRpYTwvdGV4dD48L3N2Zz='}" alt="Post Media" class="post-media">
                            <p>${postData.description}</p>
                            <div class="post-tags">
                                ${postData.tags.slice(0, 3).map(tag => `<span class="tag" onclick="searchByTag('${tag}')">#${tag}</span>`).join(' ')} <!-- Показываем первые 3 тега -->
                            </div>
                        `;
                        postElement.onclick = () => showPostView(childSnapshot.key);
                        postsContainer.appendChild(postElement);
                    });
                } else {
                    postsContainer.innerHTML = '<p>Пока нет постов.</p>';
                }
                postsContainer.innerHTML += '</div>';
            }).catch(console.error);

        function loadComments(postId) {

        // --- 6. Функции загрузки ---
        async function uploadPost() {
            if (!currentUser) {
                alert("Сначала войдите в систему.");
                return;
            }

            const description = document.getElementById('description').value;
            const tagsInput = document.getElementById('tags').value;
            const mediaFile = document.getElementById('media-upload').files[0];

            if (!mediaFile) {
                alert("Пожалуйста, выберите файл.");
                return;
            }

            const tags = tagsInput.split(',').map(tag => tag.trim()).filter(tag => tag);

            // Загрузка файла на ImgBB
            const formData = new FormData();
            formData.append('image', mediaFile);
            formData.append('key', '120a27bcbb28d3ffd9f03bc4b32bb54f');

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    const mediaUrl = data.data.url;
                    const newPostRef = push(ref(db, 'posts/'));

                    // Подготовим обновления для базы данных
                    const updates = {};
                    updates[`posts/${newPostRef.key}`] = {
                        userId: currentUser.uid,
                        authorName: currentUser.displayName || currentUser.email.split('@')[0],
                        authorAvatar: currentUser.photoURL,
                        description: description,
                        tags: tags,
                        mediaUrl: mediaUrl,
                        timestamp: Date.now(),
                        likes: 0,
                        reposts: 0
                    };

                    // Обновим связи по тегам
                    tags.forEach(tag => {
                        updates[`postsByTag/${tag}/${newPostRef.key}`] = true;
                    });

                    // Обновим связи в профиле пользователя (загрузки)
                    updates[`userPosts/${currentUser.uid}/${newPostRef.key}`] = {
                        description: description,
                        tags: tags,
                        mediaUrl: mediaUrl,
                        timestamp: Date.now()
                    };

                    await update(ref(db), updates);

                    // Сброс формы
                    document.getElementById('description').value = '';
                    document.getElementById('tags').value = '';
                    document.getElementById('media-upload').value = '';

                    alert("Пост успешно загружен!");

                    // Если был активен поиск, перезагрузить его результаты
                    if (currentSearchTag) {
                        loadPosts(currentSearchTag);
                    } else {
                        // Иначе обновить главную страницу
                        showHomeView();
                    }
                } else {
                    alert("Ошибка загрузки изображения: " + data.error.message);
                }
            } catch (error) {
                console.error("Ошибка при загрузке:", error);
                alert("Произошла ошибка при загрузке.");
            }
        }

        async function addComment(postId, userId, authorName) {
            if (!currentUser) {
                alert("Сначала войдите в систему.");
                return;
            }

            const commentText = document.getElementById(`comment-input-${postId}`).value.trim();
            if (!commentText) return;

            const newCommentRef = push(ref(db, `comments/${postId}/`));
            await set(newCommentRef, {
                userId: userId,
                authorName: authorName,
                avatar: currentUser.photoURL,
                text: commentText,
                timestamp: Date.now()
            });

            document.getElementById(`comment-input-${postId}`).value = '';
        }

        function searchByTag(tag) {

        function handleTagSearch() {
            const tag = document.getElementById('tag-search-input').value.trim();
            if (tag) {
                searchByTag(tag);

                // Если поле пустое, вернуть к обычному просмотру

        function handleTagSuggestionInput() {
            const input = document.getElementById('tag-search-input').value.toLowerCase().trim();
            const suggestionsContainer = document.getElementById('tag-suggestions-container');
            if (input.length > 0) {
                // Простая эмуляция поиска тегов (в реальности это был бы запрос к базе данных или предопределённый список)
                const mockTags = ['art', 'cute', 'anime', 'landscape', 'photo', 'digital', 'traditional'];
                const filteredSuggestions = mockTags.filter(tag => tag.startsWith(input)).slice(0, 5);

                if (filteredSuggestions.length > 0) {
                    suggestionsContainer.innerHTML = filteredSuggestions.map(tag => `<div class="tag-suggestion" onclick="selectSuggestion('${tag}')">${tag}</div>`).join('');
                    suggestionsContainer.style.display = 'block';
                } else {
                    suggestionsContainer.style.display = 'none';
                }
            } else {
                suggestionsContainer.style.display = 'none';
            }
        }

        function selectSuggestion(tag) {
            document.getElementById('tag-search-input').value = tag;
            document.getElementById('tag-suggestions-container').style.display = 'none';
            handleTagSearch(); // Выполнить поиск по выбранному тегу
        }

        // --- 8. Вспомогательные функции ---
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        window.selectSuggestion = selectSuggestion;
