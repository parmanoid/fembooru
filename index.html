<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>fembooru</title>
    
    <link rel="preconnect" href="https://cdn.fluidplayer.com">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        :root {
            --bg: #09090b; --card: #18181b; --card-hover: #27272a;
            --accent: #e11d48; --accent-hover: #f43f5e;
            --text: #f4f4f5; --muted: #a1a1aa; --border: #27272a;
            --radius: 12px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* Glassmorphism Шапка */
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(24, 24, 27, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); z-index: 100; }
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; border: 2px solid transparent; transition: 0.2s;}
        .nav-avatar:hover { border-color: var(--accent); transform: scale(1.05);}
        .top-nav h1 { margin: 0; color: var(--accent); font-size: 22px; letter-spacing: 1px; cursor: pointer; font-weight: 900; }
        .menu-btn { background: none; border: none; color: white; font-size: 26px; cursor: pointer; padding: 0; transition: 0.2s; display: none;}
        .menu-btn:active { transform: scale(0.9); }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        /* Сайдбар */
        .sidebar { width: 280px; background: rgba(15, 15, 17, 0.95); padding: 25px 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; flex-shrink: 0; backdrop-filter: blur(10px);}
        .lang-switcher { display: flex; gap: 5px; margin-bottom: 25px; background: #1f1f22; padding: 4px; border-radius: 8px;}
        .lang-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 6px 0; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .lang-btn.active { background: #3f3f46; color: #fff; }

        .auth-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: var(--radius); margin-bottom: 25px; border: 1px solid var(--border); }
        .auth-text { font-size: 13px; margin-bottom: 12px; color: var(--muted); text-align: center; }
        
        input, button, textarea { padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); background: #27272a; color: white; outline: none; font-size: 14px; font-family: inherit; transition: 0.2s;}
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225, 29, 72, 0.2); }
        button { cursor: pointer; font-weight: 600; }
        .btn-main { background: var(--accent); border: none; color: white; }
        .btn-main:hover { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 4px 15px rgba(225, 29, 72, 0.3);}
        
        h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 0 0 15px 0; font-weight: 700; }
        .filter-group { display: flex; flex-direction: column; gap: 12px; margin-bottom: 25px; }
        .filter-group label { font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #d4d4d8; transition: 0.2s;}
        .filter-group label:hover { color: #fff; }
        .filter-group input { accent-color: var(--accent); width: 16px; height: 16px; margin: 0; cursor: pointer;}
        
        .search-wrap { position: relative; margin-bottom: 20px; }
        .hints { position: absolute; top: 100%; left: 0; width: 100%; background: #27272a; border-radius: 8px; z-index: 50; max-height: 200px; overflow-y: auto; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.8); margin-top: 5px; border: 1px solid #3f3f46;}
        .hint-item { padding: 10px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; border-bottom: 1px solid #3f3f46;}
        .hint-item:hover { background: #3f3f46; color: var(--accent); padding-left: 20px;}

        /* Контент и Табы */
        .content { flex: 1; overflow-y: auto; background: var(--bg); position: relative; scroll-behavior: smooth; display: flex; flex-direction: column;}
        .app-tabs { display: flex; background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 40;}
        .app-tab { flex: 1; background: transparent; border: none; color: var(--muted); padding: 14px 0; font-size: 14px; cursor: pointer; border-bottom: 3px solid transparent; border-radius: 0; font-weight: bold; transition: 0.2s;}
        .app-tab:hover { color: #fff; background: rgba(255,255,255,0.02);}
        .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(225, 29, 72, 0.05); }

        .tab-content { padding: 20px; display: none; flex: 1; flex-direction: column; }
        .tab-content.active { display: flex; }

        .upload-section { background: var(--card); padding: 20px; border-radius: var(--radius); margin-bottom: 25px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.2);}
        .upload-controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .upload-controls > input, .upload-controls > textarea { flex: 1; min-width: 200px; background: #1f1f22;}

        /* ГАЛЕРЕЯ (Идеальная плитка) */
        .gallery { display: flex; flex-wrap: wrap; gap: 12px; padding-bottom: 50px; }
        .gallery::after { content: ""; flex-grow: 10; }
        
        .post-card { flex: 1 1 250px; max-width: 100%; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; cursor: pointer; position: relative; transition: 0.3s; animation: fadeIn 0.4s ease forwards; opacity: 0; transform: translateY(10px);}
        .post-card:hover { border-color: #52525b; box-shadow: 0 10px 30px rgba(0,0,0,0.6); transform: translateY(-3px); z-index: 2;}
        .post-card-media { width: 100%; height: 260px; background: #050505; display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative;}
        .post-card-media img, .post-card-media video { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .post-card:hover .post-card-media img { transform: scale(1.05); }
        .nsfw-badge { position: absolute; top: 10px; left: 10px; background: rgba(225, 29, 72, 0.9); color: white; font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 800; backdrop-filter: blur(4px); z-index: 10;}
        .vid-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 5; pointer-events: none; border: 2px solid rgba(255,255,255,0.7); backdrop-filter: blur(2px);}
        .post-card-info { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: var(--card); border-top: 1px solid var(--border); z-index: 2;}

        /* БОРДА */
        .board-feed { display: flex; flex-direction: column; gap: 16px; max-width: 700px; margin: 0 auto; width: 100%; padding-bottom: 50px;}
        .board-post { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: flex; flex-direction: column; gap: 15px; animation: fadeIn 0.4s;}
        .board-header { display: flex; align-items: center; gap: 12px; color: var(--muted); font-size: 13px;}
        .b-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #27272a;}
        .board-text { font-size: 15px; line-height: 1.6; white-space: pre-wrap;}
        .board-media { border-radius: 12px; overflow: hidden; background: #000; border: 1px solid var(--border); max-height: 450px; display: flex; justify-content: center;}
        .board-media img, .board-media video { max-width: 100%; max-height: 450px; object-fit: contain;}
        
        .action-row { display: flex; gap: 10px; flex-wrap: wrap;}
        .btn-action { background: #27272a; border: 1px solid var(--border); border-radius: 8px; padding: 8px 15px; color: #e4e4e7; display: flex; align-items: center; gap: 6px; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; flex: 1; justify-content: center;}
        .btn-action:hover { background: #3f3f46; color: #fff;}
        .btn-action.active { color: var(--accent); border-color: var(--accent); background: rgba(225, 29, 72, 0.1); }
        .btn-action.repost { color: #10b981; } .btn-action.repost.active { background: rgba(16, 185, 129, 0.1); border-color: #10b981;}

        /* ШОРТСЫ (TikTok Style) */
        .shorts-feed { height: calc(100vh - 120px); overflow-y: scroll; scroll-snap-type: y mandatory; background: #000; padding: 0; margin: -20px; scrollbar-width: none;}
        .shorts-feed::-webkit-scrollbar { display: none; }
        .short-wrapper { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; padding: 20px; background: #09090b;}
        
        /* Шортсы: ПК */
        .short-container { display: flex; gap: 20px; height: 100%; max-width: 500px; width: 100%; position: relative;}
        .short-video-wrap { flex: 1; background: #000; border-radius: 16px; overflow: hidden; position: relative; border: 1px solid #27272a; box-shadow: 0 10px 40px rgba(0,0,0,0.5);}
        .short-video-wrap video { width: 100%; height: 100%; object-fit: cover; cursor: pointer;}
        .short-info-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 40px 20px 20px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); color: white; pointer-events: none;}
        
        .short-sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 15px; padding-bottom: 20px;}
        .s-btn { background: #1f1f22; border: 1px solid #3f3f46; color: white; width: 48px; height: 48px; border-radius: 50%; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; position: relative;}
        .s-btn:hover { background: #27272a; transform: scale(1.1);}
        .s-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(225, 29, 72, 0.1);}
        .s-btn.repost.active { color: #10b981; border-color: #10b981; background: rgba(16, 185, 129, 0.1);}
        .s-count { position: absolute; bottom: -20px; font-size: 12px; font-weight: bold; color: #a1a1aa;}

        /* ПРОФИЛЬ */
        .profile-view { display: none; padding-bottom: 50px; max-width: 900px; margin: 0 auto; width: 100%; animation: fadeIn 0.3s;}
        .profile-header { background: var(--card); border-radius: var(--radius); padding: 30px; display: flex; gap: 25px; align-items: center; margin-bottom: 25px; border: 1px solid var(--border);}
        .p-avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 3px solid var(--border); background: #27272a;}
        .p-info { flex: 1; }
        .p-info h2 { margin: 0 0 10px 0; font-size: 24px; }
        .p-bio { color: var(--muted); font-size: 14px; margin-bottom: 15px; white-space: pre-wrap;}
        
        .profile-tabs { display: flex; gap: 15px; margin-bottom: 20px;}
        .p-tab { background: transparent; border: 1px solid var(--border); color: var(--muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold;}
        .p-tab.active { background: var(--text); color: var(--bg); border-color: var(--text);}

        /* СТРАНИЦА ПОСТА */
        .post-view { display: none; padding-bottom: 50px; max-width: 1000px; margin: 0 auto; width: 100%;}
        .pv-layout { display: flex; gap: 25px; align-items: flex-start;}
        .pv-main { flex: 2; display: flex; flex-direction: column; gap: 20px; min-width: 0;}
        .pv-sidebar { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; position: sticky; top: 20px;}
        .pv-media-wrap { width: 100%; border-radius: var(--radius); overflow: hidden; background: #000; border: 1px solid var(--border); display: flex; justify-content: center;}
        .pv-media-wrap img, .pv-media-wrap video { max-width: 100%; max-height: 80vh; object-fit: contain; }
        
        .comments-list { max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; font-size: 13px;}
        .comment-item { background: #1f1f22; padding: 12px 15px; border-radius: 10px; border: 1px solid #27272a;}

        /* Модалки и Тосты */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px);}
        .modal { background: var(--card); padding: 30px; border-radius: var(--radius); width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #3f3f46; animation: modalPop 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes modalPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .toast-container { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 9999; pointer-events: none;}
        .toast { background: #27272a; border: 1px solid #3f3f46; color: white; padding: 14px 20px; border-radius: 10px; font-size: 14px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); opacity: 0; transform: translateY(20px); transition: 0.3s; font-weight: bold;}
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { background: var(--accent); border-color: #be123c; }

        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; flex-direction: column; justify-content: center; align-items: center; color: white;}
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--accent); border-radius: 50%; width: 50px; height: 50px; animation: spin 0.8s linear infinite; margin-bottom: 20px;}
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Адаптивка Mobile */
        @media (max-width: 900px) { .pv-layout { flex-direction: column; } .pv-sidebar { width: 100%; position: static; } }
        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .top-nav h1 { font-size: 20px; }
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 280px; transform: translateX(-100%); border-right: none; box-shadow: 5px 0 25px rgba(0,0,0,0.8);}
            .sidebar.open { transform: translateX(0); }
            .content { padding: 15px; height: calc(100vh - 57px); }
            .upload-controls { flex-direction: column; align-items: stretch;}
            .action-row { flex-direction: column; }
            
            /* Шортсы Mobile */
            .short-wrapper { padding: 0; margin: 0 -15px;}
            .short-container { max-width: 100%; gap: 0;}
            .short-video-wrap { border-radius: 0; border: none; }
            .short-sidebar { position: absolute; right: 10px; bottom: 80px; padding: 0; z-index: 10;}
            .s-btn { background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); border: none; width: 44px; height: 44px;}
            .s-count { color: white; text-shadow: 0 1px 3px #000; bottom: -18px;}
            .short-info-overlay { padding-right: 60px; padding-bottom: 30px;}
            
            .profile-header { flex-direction: column; text-align: center; padding: 20px;}
        }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 140; opacity: 0; transition: 0.3s;}
        .sidebar-overlay.active { display: block; opacity: 1; }
        ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
    </style>
</head>
<body>

<div class="toast-container" id="toastBox"></div>
<div id="loader"><div class="spinner"></div><p id="loader-text" style="font-family:monospace; letter-spacing:2px; font-weight:bold; color:#a1a1aa;">LOADING</p></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 id="modalTitle" data-i18n="loginTitle">Вход</h2>
        <input type="text" id="authName" placeholder="Никнейм">
        <input type="password" id="authPass" placeholder="Пароль (от 6 символов)">
        <button class="btn-main" onclick="window.submitAuth()" data-i18n="continueBtn">Продолжить</button>
        <button onclick="window.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted);" data-i18n="cancelBtn">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2 data-i18n="editProfile">Редактировать профиль</h2>
        <input type="text" id="editAvatar" placeholder="URL аватарки (https://...)">
        <textarea id="editBio" placeholder="О себе..." rows="3"></textarea>
        <button class="btn-main" onclick="window.saveProfile()" data-i18n="saveBtn">Сохранить</button>
        <button onclick="window.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted);" data-i18n="cancelBtn">Отмена</button>
    </div>
</div>

<div class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="window.openMyProfile()">
        <h1 onclick="window.goHome()">fembooru</h1>
    </div>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</div>

<div class="sidebar-overlay" id="menuOverlay" onclick="window.toggleMenu()"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="window.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="window.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="window.setLang('en')" id="lang-en">EN</button>
        </div>

        <div class="auth-box">
            <div id="loggedOutView">
                <div class="auth-text" data-i18n="guestMsg">Войди в аккаунт для публикации.</div>
                <div class="btn-group">
                    <button class="btn-main" onclick="window.openAuth('login')" data-i18n="loginBtn">Вход</button>
                    <button style="background:#3f3f46;" onclick="window.openAuth('reg')" data-i18n="regBtn">Рега</button>
                </div>
            </div>
            <div id="loggedInView" style="display:none;">
                <div class="auth-text" id="userNameDisplay" style="color:white; font-size:15px; font-weight:800; cursor:pointer;" onclick="window.openMyProfile()">Привет!</div>
                <button onclick="window.doLogout()" style="width: 100%; background: #27272a; margin-top:10px;" data-i18n="logoutBtn">Выйти</button>
            </div>
        </div>

        <div id="filtersBlock">
            <h3 data-i18n="feedFilter">Фильтр ленты</h3>
            <div class="filter-group">
                <label><input type="radio" name="rating" value="all" checked onchange="window.renderCurrentTab()"> <span data-i18n="filterAll">Всё подряд</span></label>
                <label><input type="radio" name="rating" value="sfw" onchange="window.renderCurrentTab()"> <span>SFW</span></label>
                <label><input type="radio" name="rating" value="nsfw" onchange="window.renderCurrentTab()"> <span>NSFW</span></label>
            </div>
            <h3 data-i18n="tagSearch">Поиск по тегам</h3>
            <div class="search-wrap">
                <input type="text" id="search" placeholder="anime cute..." style="width: 100%;" autocomplete="off">
                <div id="hints" class="hints"></div>
            </div>
        </div>
    </aside>

    <main class="content" id="mainContent">
        <div class="app-tabs" id="mainTabs">
            <button class="app-tab active" onclick="window.switchTab('gallery')" id="tab-gallery" data-i18n="tabGal">Галерея</button>
            <button class="app-tab" onclick="window.switchTab('board')" id="tab-board" data-i18n="tabBoard">Борда</button>
            <button class="app-tab" onclick="window.switchTab('shorts')" id="tab-shorts" data-i18n="tabShorts">Шортсы</button>
        </div>

        <div id="tabContent-gallery" class="tab-content active">
            <div class="upload-section" id="uploadPanelGal" style="display: none;">
                <div class="upload-controls">
                    <input type="file" id="fileGal" accept="image/*,video/*" multiple>
                    <input type="text" id="tag1Gal" placeholder="Главный тег">
                    <input type="text" id="tag2Gal" placeholder="Доп. теги">
                    <label class="checkbox-wrap" style="color:var(--text);"><input type="checkbox" id="nsfwGal"> <span style="color:var(--accent)">NSFW</span></label>
                    <button class="btn-main" onclick="window.upload('gallery')" data-i18n="publishBtn">Опубликовать</button>
                </div>
            </div>
            <div class="gallery" id="galFeed"></div>
        </div>

        <div id="tabContent-board" class="tab-content">
            <div class="upload-section" id="uploadPanelBoard" style="display: none;">
                <div class="upload-controls" style="flex-direction: column; align-items: stretch;">
                    <textarea id="textBoard" placeholder="Что происходит?" rows="3"></textarea>
                    <div style="display:flex; gap:12px; flex-wrap:wrap;">
                        <input type="file" id="fileBoard" accept="image/*,video/*" style="flex:1; min-width:200px;">
                        <label class="checkbox-wrap" style="color:var(--text);"><input type="checkbox" id="nsfwBoard"> <span style="color:var(--accent)">NSFW</span></label>
                        <button class="btn-main" onclick="window.upload('board')" data-i18n="publishBtn">Запостить</button>
                    </div>
                </div>
            </div>
            <div class="board-feed" id="boardFeed"></div>
        </div>

        <div id="tabContent-shorts" class="tab-content" style="padding:0;">
            <div class="upload-section" id="uploadPanelShorts" style="display: none; margin: 15px; position:absolute; top:0; left:0; right:0; z-index:50; background:rgba(24,24,27,0.95); backdrop-filter:blur(8px);">
                <div class="upload-controls">
                    <input type="file" id="fileShorts" accept="video/*">
                    <input type="text" id="textShorts" placeholder="Описание">
                    <label class="checkbox-wrap" style="color:var(--text);"><input type="checkbox" id="nsfwShorts"> <span style="color:var(--accent)">NSFW</span></label>
                    <button class="btn-main" onclick="window.upload('shorts')" data-i18n="publishBtn">Залить</button>
                </div>
            </div>
            <div class="shorts-feed" id="shortsFeed"></div>
        </div>

        ['Gal', 'Board', 'Shorts'].forEach(id => document.getElementById(`uploadPanel${id}`).style.display = u ? (id==='Shorts'?'block':'flex') : 'none');
        document.getElementById('loggedOutView').style.display = u ? 'none' : 'block'; document.getElementById('loggedInView').style.display = u ? 'block' : 'none';
        
        if(u) {
            document.getElementById('userNameDisplay').innerText = `${u.displayName} ${AppState.isAdmin?'👑':''}`;

    window.openAuth = (m) => { authMode = m; window.openModal('authModal'); document.getElementById('modalTitle').innerText = m==='reg'?t('regTitle'):t('loginTitle'); document.getElementById('authName').style.display = m==='reg'?'block':'none';};
    function genEmail(n) { const r = {'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'e','ж':'zh','з':'z','и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r','с':'s','т':'t','у':'u','ф':'f','х':'h','ц':'ts','ч':'ch','ш':'sh','щ':'sch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'}; let c = n.toLowerCase().replace(/[а-яё]/g, m => r[m] || m).replace(/[^a-z0-9]/g, ''); return (c||'anon'+Date.now()) + '@anon.ru'; }
    window.submitAuth = async () => {
        const n = document.getElementById('authName').value.trim(), p = document.getElementById('authPass').value;
        if((authMode==='reg' && !n) || p.length < 6) return window.showToast('Check inputs', true);
        try { 
            if(authMode === 'reg') { 
                const res = await createUserWithEmailAndPassword(auth, genEmail(n), p); 
                await updateProfile(res.user, { displayName: n });
                await set(ref(db, `users/${res.user.uid}`), { name: n, avatar: DEF_AVATAR, bio: '' });
            } else { await signInWithEmailAndPassword(auth, document.getElementById('authEmail').value, p); } 
            window.closeModal('authModal'); if(window.innerWidth<=768) window.toggleMenu(); 
        } catch(err) { window.showToast(err.message, true); }
    };
    window.doLogout = () => signOut(auth);

    // ПРОФИЛЬ
    window.openMyProfile = () => { if(AppState.user) window.openProfile(AppState.user.uid); else window.openAuth('login'); };
    window.openProfile = async (uid) => {
        AppState.viewingProfUid = uid; window.closePost();
        document.getElementById('mainTabs').style.display = 'none'; document.getElementById('filtersBlock').style.display = 'none';
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        document.getElementById('profAvatar').src = d.avatar || DEF_AVATAR;
        document.getElementById('profName').innerText = d.name || 'Anon';
        document.getElementById('profBio').innerText = d.bio || '';

        if(!AppState.user) return;
        const ava = document.getElementById('editAvatar').value.trim() || DEF_AVATAR;

    window.switchProfTab = (tab) => {
        AppState.profTab = tab; document.querySelectorAll('.p-tab').forEach(b => b.classList.remove('active')); document.getElementById(`ptab-${tab}`).classList.add('active');
        renderProfileView();
    };

    function renderProfileView() {
        const uid = AppState.viewingProfUid; const feed = document.getElementById('profFeed'); feed.innerHTML = '';
        let items = [];
        
        if (AppState.profTab === 'uploads') {
            ['gallery', 'board', 'shorts'].forEach(t => { items.push(...AppState.data[t].filter(p => p.uid === uid).map(p => ({...p, _type: t}))); });
        } else {
            const userData = AppState.usersData[uid] || {}; const rep = userData.reposts || {};
            Object.keys(rep).forEach(id => {
                const type = rep[id]; const post = AppState.data[type]?.find(p => p.id === id);
                if(post) items.push({...post, _type: type});
            });
        }
        
        items.sort((a,b) => b.time - a.time).forEach((p, i) => {
            const div = document.createElement('div'); div.className = 'post-card'; div.style.animationDelay = `${i*0.03}s`;
            div.onclick = () => { document.getElementById('profileMode').style.display='none'; window.openPost(p.id, p._type); };
            const m = p.isVid ? `<div class="vid-icon">▶</div><video src="${p.url}#t=0.1" preload="metadata" muted loop></video>` : (p.url ? `<img src="${p.url}" loading="lazy">` : `<div style="padding:20px; font-size:12px; color:#aaa;">${p.text?.substring(0,100)}...</div>`);
            div.innerHTML = `<div class="post-card-media">${m}</div><div class="post-card-info"><span style="color:var(--accent); font-size:10px; font-weight:bold;">${p._type.toUpperCase()}</span><span>❤ ${p.likes?Object.keys(p.likes).length:0}</span></div>`;
            feed.appendChild(div);
        });
        if(!items.length) feed.innerHTML = `<div style="flex:1 1 100%; text-align:center; color:var(--muted); padding:50px;">${t('notFound')}</div>`;
    }

    // UPLOAD
    async function safeUpload(file) {
        if (file.type.startsWith('image/')) { try { const fd = new FormData(); fd.append('image', file); const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd }); const d = await res.json(); if(d.success) return d.data.url; } catch(e) {} }
        const fd2 = new FormData(); fd2.append('reqtype', 'fileupload'); fd2.append('fileToUpload', file);
        const r2 = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', { method: 'POST', body: fd2 }); if(r2.ok) return await r2.text();
        const r3 = await fetch('https://corsproxy.io/?https://litterbox.catbox.moe/resources/internals/api.php', { method: 'POST', body: fd2 }); if(r3.ok) return await r3.text();
        throw new Error('Upload Failed');
    }

    window.upload = async (type) => {
        let fInput = document.getElementById(type==='gallery'?'fileGal':type==='board'?'fileBoard':'fileShorts');
        let data = { uid: AppState.user.uid, author: AppState.user.displayName || 'Anon', time: Date.now() };
        if (type === 'gallery') { data.t1 = document.getElementById('tag1Gal').value.trim()||'art'; data.t2 = document.getElementById('tag2Gal').value.trim(); data.nsfw = document.getElementById('nsfwGal').checked; }
        if (type === 'board') { data.text = document.getElementById('textBoard').value.trim(); data.nsfw = document.getElementById('nsfwBoard').checked; if(!data.text && !fInput.files.length) return; }
        if (type === 'shorts') { data.text = document.getElementById('textShorts').value.trim(); data.nsfw = document.getElementById('nsfwShorts').checked; if(!fInput.files.length || !fInput.files[0].type.includes('video')) return window.showToast('Only video', true); }

        document.getElementById('loader').style.display = 'flex';
        try {
            if (fInput.files.length) { data.url = await safeUpload(fInput.files[0]); data.isVid = fInput.files[0].type.includes('video'); }
            await push(ref(db, type), data);
        } catch(e) { window.showToast(e.message, true); }
        document.getElementById('loader').style.display = 'none';
        fInput.value = ''; if(document.getElementById('textBoard')) document.getElementById('textBoard').value = ''; document.getElementById('textShorts').value='';
    };

    // FETCH & TABS
    function fetchAll() {
        onValue(ref(db, 'users'), s => { AppState.usersData = s.val() || {}; if(AppState.viewingProfUid) renderProfileView(); else renderCurrentTab(); });
        ['gallery', 'board', 'shorts'].forEach(t => onValue(ref(db, t), s => { 
            const a=[]; s.forEach(c => a.push({id:c.key,...c.val()})); AppState.data[t] = a.reverse(); 
            if(t === 'gallery') { AppState.tagStats={}; a.forEach(d => [d.t1, ...(d.t2||'').split(' ')].filter(Boolean).forEach(tg => { const ct = tg.toLowerCase(); AppState.tagStats[ct]=(AppState.tagStats[ct]||0)+1; })); }
            if(AppState.currentTab===t && !AppState.viewingProfUid && !AppState.currentPostId) renderCurrentTab(); 
        }));
    }

    window.switchTab = (tab) => {
        AppState.currentTab = tab; window.closePost();

        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active')); document.getElementById(`tabContent-${tab}`).classList.add('active');
        renderCurrentTab();

    window.renderCurrentTab = () => {
        if(AppState.currentPostId || AppState.viewingProfUid) return;
        const q = document.getElementById('search').value.toLowerCase().trim().split(' ').filter(Boolean);
        const rf = document.querySelector('input[name="rating"]:checked').value;
        
        let arr = AppState.data[AppState.currentTab].filter(p => {
            if(rf === 'sfw' && p.nsfw) return false; if(rf === 'nsfw' && !p.nsfw) return false;
            if(AppState.currentTab === 'gallery' && q.length > 0) { const tags = `${p.t1} ${p.t2 || ''}`.toLowerCase(); return q.every(w => tags.includes(w)); }
            return true;
        });

        if(AppState.currentTab === 'gallery') renderGalArr(arr);
        if(AppState.currentTab === 'board') renderBoardArr(arr);
        if(AppState.currentTab === 'shorts') renderShortsArr(arr);
    };

    function getAva(uid) { return AppState.usersData[uid]?.avatar || DEF_AVATAR; }

    function renderGalArr(arr) {
        const gal = document.getElementById('galFeed'); gal.innerHTML = '';

            div.innerHTML = `${p.nsfw?'<div class="nsfw-badge">NSFW</div>':''}<div class="post-card-media">${mHtml}</div><div class="post-card-info"><div style="display:flex; align-items:center; gap:8px;"><img src="${getAva(p.uid)}" style="width:20px; height:20px; border-radius:50%; object-fit:cover;"><span style="font-weight:bold; color:#60a5fa; font-size:12px;">#${p.t1}</span></div><div style="font-size:12px; color:var(--muted); font-weight:bold;">❤ ${p.likes?Object.keys(p.likes).length:0}</div></div>`;
            gal.appendChild(div);

        if(!arr.length) gal.innerHTML = `<div style="flex:1 1 100%; text-align:center; color:var(--muted); padding:50px;">${t('notFound')}</div>`;
    }

        const feed = document.getElementById('boardFeed'); feed.innerHTML = '';

            const isMe = AppState.user && AppState.user.uid===p.uid;
            div.innerHTML = `
                ${p.nsfw?'<div class="nsfw-badge" style="position:relative; display:inline-block; top:0; left:0; width:max-content; margin-bottom:10px;">NSFW</div>':''}

    }

    function renderShortsArr(arr) {
        const feed = document.getElementById('shortsFeed'); feed.innerHTML = '';
        arr.forEach(p => {
            const div = document.createElement('div'); div.className = 'short-wrapper';

                    </div>
                    <div class="short-sidebar">
                        <button class="s-btn ${AppState.user&&p.likes&&p.likes[AppState.user.uid]?'active':''}" onclick="window.like('${p.id}', 'shorts')">❤<span class="s-count">${p.likes?Object.keys(p.likes).length:0}</span></button>
                        <button class="s-btn repost ${AppState.user&&hasReposted(AppState.user.uid, p.id)}" onclick="window.repost('${p.id}', 'shorts')">🔄</button>

                        ${isMe||AppState.isAdmin ? `<button class="s-btn" style="color:var(--accent)" onclick="window.del('${p.id}', 'shorts')">🗑</button>`:''}
                    </div>
                </div>`;
            feed.appendChild(div);
        });
        const obs = new IntersectionObserver((entries) => { entries.forEach(e => { const v = e.target.querySelector('video'); if(e.isIntersecting) v.play(); else v.pause(); }); }, { threshold: 0.6 });
        document.querySelectorAll('.short-wrapper').forEach(v => obs.observe(v));
    }

    window.openPost = (id, type) => {
        AppState.currentPostId = id; AppState.currentPostType = type;
        document.getElementById('profileMode').style.display = 'none'; document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById('postMode').style.display = 'block'; 
        
        const p = AppState.data[type].find(x => x.id === id); if(!p) return window.closePost();
        
        let cHtml = ''; if(p.comments) Object.values(p.comments).forEach(c => cHtml += `<div class="comment-item"><div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;"><img src="${getAva(c.uid)}" style="width:20px;height:20px;border-radius:50%;object-fit:cover;"><span class="c-author">${c.name}:</span></div> ${c.t}</div>`);
        const isMe = AppState.user && AppState.user.uid === p.uid;
        
        let tHtml = ''; if(type === 'gallery') tHtml = `<div style="margin-bottom:20px;"><span class="btn-action" style="display:inline-block; width:auto; border-color:var(--accent); color:var(--accent);">#${p.t1}</span> ${(p.t2||'').split(' ').filter(Boolean).map(t=>`<span class="btn-action" style="display:inline-block; width:auto;">#${t}</span>`).join(' ')}</div>`;

        document.getElementById('pvContainer').innerHTML = `
            <div class="pv-main">
                <div class="pv-media-wrap" style="position:relative;">
                    ${p.nsfw ? `<div class="nsfw-badge" style="font-size:14px; top:15px; left:15px;">NSFW</div>` : ''}
                    ${p.isVid ? `<video id="vf-${p.id}" src="${p.url}" controls autoplay></video>` : (p.url ? `<img src="${p.url}">` : '<div style="padding:50px; text-align:center; color:#aaa;">Text Post</div>')}
                </div>
            </div>
            <div class="pv-sidebar">
                <div class="auth-box" style="margin:0;">
                    <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px; cursor:pointer;" onclick="window.openProfile('${p.uid}')"><img src="${getAva(p.uid)}" style="width:50px; height:50px; border-radius:50%; object-fit:cover; border:2px solid #3f3f46;"> <div><h3 style="margin:0; font-size:18px; color:#fff;">${p.author}</h3><span style="font-size:12px; color:var(--muted)">${new Date(p.time).toLocaleString()}</span></div></div>
                    ${p.text ? `<div style="margin-bottom:20px; font-size:15px; line-height:1.5;">${p.text}</div>` : ''}
                    ${tHtml}
                    <div class="action-row" style="margin-bottom:20px;">
                        <button class="btn-action ${AppState.user&&p.likes&&p.likes[AppState.user.uid]?'active':''}" onclick="window.like('${p.id}', '${type}')">❤ ${p.likes?Object.keys(p.likes).length:0}</button>
                        <button class="btn-action repost ${AppState.user&&hasReposted(AppState.user.uid, p.id)}" onclick="window.repost('${p.id}', '${type}')">${t('repost')}</button>
                        ${p.url ? `<button class="btn-action" onclick="window.shareUrl('${p.url}')">🔗</button>` : ''}
                        ${isMe||AppState.isAdmin ? `<button class="btn-action" style="color:var(--accent)" onclick="window.del('${p.id}', '${type}')">🗑</button>`:''}
                    </div>
                    <h3 style="color:#fff; font-size:14px;">${t('comments')}</h3>
                    <div class="comments-list">${cHtml || `<div style="color:var(--muted); font-style:italic;">${t('noComments')}</div>`}</div>
                    <div style="display:flex; gap:8px;"><input type="text" id="i-${p.id}" placeholder="${t('writeComment')}" style="flex:1" onkeypress="if(event.key === 'Enter') window.comm('${p.id}', '${type}')"><button class="btn-main" onclick="window.comm('${p.id}', '${type}')">${t('send')}</button></div>
                </div>
            </div>`;
    };
    
    window.closePost = () => { AppState.currentPostId = null; document.getElementById('postMode').style.display = 'none'; if(!AppState.viewingProfUid) document.getElementById(`tabContent-${AppState.currentTab}`).classList.add('active'); else document.getElementById('profileMode').style.display='block'; window.renderCurrentTab(); };
    window.goHome = () => { document.getElementById('search').value = ''; AppState.viewingProfUid = null; document.getElementById('profileMode').style.display = 'none'; document.getElementById('mainTabs').style.display = 'flex'; document.getElementById('filtersBlock').style.display = 'block'; window.closePost(); window.switchTab('gallery'); };
    window.shareUrl = (url) => { navigator.clipboard.writeText(url); window.showToast('Copied!'); };
    window.del = async (id, type) => { if(confirm('100%?')) { await remove(ref(db, `${type}/${id}`)); if(AppState.currentPostId === id) window.closePost(); } };
    window.like = async (id, type) => { if(!AppState.user) return window.showToast('Login required', true); try { const s = await get(ref(db, `${type}/${id}/likes/${AppState.user.uid}`)); await update(ref(db), { [`${type}/${id}/likes/${AppState.user.uid}`]: s.exists() ? null : true }); } catch(err) {} };
    window.comm = async (id, type) => { if(!AppState.user) return window.showToast('Login required', true); const i = document.getElementById(`i-${id}`), txt = i.value.trim(); if(!txt) return; i.disabled = true; try { await push(ref(db, `${type}/${id}/comments`), { uid: AppState.user.uid, name: AppState.user.displayName || 'Anon', t: txt }); i.value = ''; } catch(e) {} i.disabled = false; i.focus(); };
    
    window.repost = async (id, type) => {
        if(!AppState.user) return window.showToast('Login required', true);
        const rRef = ref(db, `users/${AppState.user.uid}/reposts/${id}`);
        try { const s = await get(rRef); if(s.exists()) await remove(rRef); else await set(rRef, type); window.showToast('Repost toggled'); } catch(e) {}
    };

    // ПОИСК (Галерея)
    document.getElementById('search').addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase(), box = document.getElementById('hints'); box.innerHTML = '';
        if (!val.trim()) { box.style.display = 'none'; window.renderCurrentTab(); return; }
        const parts = val.split(' '), cur = parts[parts.length - 1];
        if(!cur) { box.style.display = 'none'; window.renderCurrentTab(); return; }
        const m = Object.keys(AppState.tagStats).filter(t => t.includes(cur));
        if (m.length > 0) {
            m.sort((a, b) => AppState.tagStats[b] - AppState.tagStats[a]).slice(0, 8).forEach(tag => {
                const el = document.createElement('div'); el.className = 'hint-item'; el.innerHTML = `<span>#${tag}</span> <span style="color:var(--muted); font-weight:bold;">${AppState.tagStats[tag]}</span>`;
                el.onclick = () => { parts.pop(); parts.push(tag); document.getElementById('search').value = parts.join(' ') + ' '; box.style.display = 'none'; if(window.innerWidth <= 768) window.toggleMenu(); window.renderCurrentTab(); document.getElementById('search').focus(); };
                box.appendChild(el);
            }); box.style.display = 'block';
        } else box.style.display = 'none';
        window.renderCurrentTab();
    });
    document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) document.getElementById('hints').style.display = 'none'; });

    window.setLang(AppState.lang);
</script>
</body>
</html>
