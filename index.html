<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>fembooru</title>
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=default,Array.prototype.includes,String.prototype.includes,Promise,Object.assign,Object.keys,Array.prototype.find,Array.prototype.filter"></script>
    
    <link rel="preconnect" href="https://cdn.fluidplayer.com">
    <link rel="stylesheet" href="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.css" type="text/css"/>
    <script src="https://cdn.fluidplayer.com/v3/current/fluidplayer.min.js"></script>
    
    <style>
        :root {
            --bg: #050506; --card: #0f0f11; --card-h: #161619;
            --accent: #e11d48; --accent-h: #f43f5e;
            --text: #f4f4f5; --muted: #71717a; --border: #1f1f22;
            --radius: 14px; --radius-sm: 8px;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: rgba(5, 5, 6, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 1000; height: 64px; flex-shrink: 0; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .nav-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #27272a; cursor: pointer; border: 2px solid transparent; transition: 0.3s; box-shadow: 0 0 10px rgba(0,0,0,0.5);}
        .nav-avatar:hover { border-color: var(--accent); transform: scale(1.1); box-shadow: 0 0 20px rgba(225,29,72,0.4); }
        .top-nav h1 { color: var(--accent); font-size: 24px; cursor: pointer; font-weight: 900; letter-spacing: -1px; transition: 0.2s; margin: 0; display: flex; align-items: center; gap: 12px;}
        .top-nav h1:hover { color: var(--accent-h); }
        .ai-greeting { font-size: 12px; color: var(--muted); font-weight: 500; font-style: italic; max-width: 350px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: none; }
        @media (min-width: 768px) { .ai-greeting { display: block; animation: fadeIn 1s ease; } }
        
        .menu-btn { background: none; border: none; color: white; font-size: 28px; cursor: pointer; display: none; transition: 0.2s; }
        .menu-btn:active { transform: scale(0.9); }

        .app-container { display: flex; flex: 1; overflow: hidden; position: relative; }

        .sidebar { width: 280px; background: rgba(5, 5, 6, 0.95); backdrop-filter: blur(10px); padding: 20px; border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; z-index: 150; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .lang-switcher { display: flex; gap: 6px; margin-bottom: 25px; background: #121214; padding: 6px; border-radius: var(--radius-sm); border: 1px solid var(--border);}
        .lang-btn { flex: 1; background: transparent; border: none; color: var(--muted); padding: 8px 0; border-radius: 8px; font-size: 11px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;}
        .lang-btn:hover { color: #fff; }
        .lang-btn.active { background: #27272a; color: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }

        .auth-box { background: rgba(255,255,255,0.02); padding: 15px; border-radius: var(--radius-sm); margin-bottom: 25px; border: 1px solid var(--border); }
        
        .btn-main { background: linear-gradient(135deg, var(--accent), #be123c); border: none; font-weight: 800; cursor: pointer; color: #fff; padding: 12px 20px; border-radius: var(--radius-sm); transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 14px; box-shadow: 0 4px 15px rgba(225,29,72,0.2);}
        .btn-main:hover { background: linear-gradient(135deg, var(--accent-h), var(--accent)); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(225,29,72,0.4); }
        .btn-main:active { transform: translateY(0) scale(0.98); }
        
        .btn-action { background: #161619; border: 1px solid #27272a; color: #eee; padding: 12px 18px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; font-size: 13px; flex: 1;}
        .btn-action:hover { background: #222226; border-color: #3f3f46; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .btn-action:active { transform: scale(0.96); }
        .btn-action.active { color: var(--accent); border-color: var(--accent); background: rgba(225,29,72,0.1); }
        
        .btn-back { background: #161619; border: 1px solid #27272a; color: #fff; padding: 10px 20px; border-radius: var(--radius-sm); cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; width: max-content; margin-bottom: 25px; flex-shrink: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.2);}
        .btn-back:hover { background: #222226; transform: translateX(-5px); border-color: #3f3f46;}

        input, textarea { padding: 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: #0f0f11; color: white; font-size: 14px; transition: 0.3s; font-family: inherit; width: 100%;}
        input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(225,29,72,0.2); background: #161619;}
        input:-webkit-autofill, textarea:-webkit-autofill { -webkit-text-fill-color: white; -webkit-box-shadow: 0 0 0px 1000px #0f0f11 inset; transition: background-color 5000s ease-in-out 0s; }

        .user-mention { color: var(--accent); cursor: pointer; font-weight: 800; padding: 2px 6px; background: rgba(225,29,72,0.1); border-radius: 6px; transition: 0.2s; display: inline-block;}
        .user-mention:hover { background: rgba(225,29,72,0.2); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(225,29,72,0.3);}
        
        .hints-box { position: absolute; z-index: 9999; background: #161619; border: 1px solid #333; border-radius: var(--radius-sm); box-shadow: 0 15px 40px rgba(0,0,0,0.9); max-height: 250px; overflow-y: auto; display: none; animation: fadeIn 0.2s; }
        .hint-item { padding: 12px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; color: #eee; transition: 0.2s; gap: 10px;}
        .hint-item:hover { background: #27272a; color: var(--accent); padding-left: 20px; }
        .hint-count { color: var(--muted); font-size: 10px; font-weight: 900; background: #000; padding: 2px 6px; border-radius: 4px; }

        .tabs-wrap { background: rgba(5, 5, 6, 0.95); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 500; width: 100%;}
        .app-tabs { display: flex; max-width: 900px; margin: 0 auto; }
        .app-tab { flex: 1; background: transparent; border: none; color: var(--muted); padding: 18px 0; font-size: 13px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 800; text-transform: uppercase; transition: 0.3s; }
        .app-tab:hover { color: #fff; background: rgba(255,255,255,0.02); }
        .app-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: linear-gradient(to top, rgba(225, 29, 72, 0.08), transparent); }

        .content { flex: 1; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; position: relative; scroll-behavior: smooth; }
        .view-layer { display: none; flex-direction: column; width: 100%; min-height: 100%; animation: fadeUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .view-layer.active { display: flex; }
        .tab-content { display: none; flex-direction: column; padding: 25px; animation: fadeIn 0.3s ease; width: 100%; max-width: 1400px; margin: 0 auto;}
        .tab-content.active { display: flex; }

        .search-wrap { position: relative; margin-bottom: 20px; }

        .gallery { display: flex; flex-wrap: wrap; gap: 16px; padding-bottom: 50px; }
        .gallery::after { content: ""; flex-grow: 10; }
        .post-card { flex: 1 1 220px; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1); position: relative; height: fit-content; display: flex; flex-direction: column; animation: popIn 0.4s ease forwards; opacity: 0; }
        .post-card:hover { border-color: #444; transform: translateY(-6px); box-shadow: 0 15px 40px rgba(0,0,0,0.7); z-index: 2; }
        .pc-media { width: 100%; height: 260px; background: #050506; overflow: hidden; display: flex; align-items: center; justify-content: center; position: relative; }
        .pc-media img, .pc-media video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s, transform 0.5s; }
        .post-card:hover .pc-media img { transform: scale(1.05); }
        .pc-media .loaded { opacity: 1; }
        .pc-info { padding: 14px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: bold; background: var(--card); z-index: 2; border-top: 1px solid var(--border);}
        .nsfw-badge { position: absolute; top: 12px; left: 12px; background: rgba(225,29,72,0.95); color: white; font-size: 10px; font-weight: 900; padding: 4px 8px; border-radius: 6px; z-index: 5; backdrop-filter: blur(4px); letter-spacing: 0.5px;}

        .yt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; padding-bottom: 50px; }
        .yt-card { background: transparent; cursor: pointer; transition: 0.3s; animation: popIn 0.4s forwards; opacity: 0;}
        .yt-card:hover .yt-thumb { border-color: #555; transform: translateY(-4px); box-shadow: 0 15px 35px rgba(0,0,0,0.7);}
        .yt-thumb { width: 100%; aspect-ratio: 16/9; background: #0a0a0c; border-radius: var(--radius); overflow: hidden; position: relative; border: 1px solid var(--border); transition: 0.3s; }
        .yt-thumb video { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: 0.5s; }
        .yt-thumb .loaded { opacity: 1; }
        .vid-icon-big { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; font-size: 20px; z-index: 5; pointer-events: none; backdrop-filter: blur(4px); transition: 0.3s;}
        .yt-card:hover .vid-icon-big { background: var(--accent); border-color: transparent; transform: translate(-50%, -50%) scale(1.1);}
        .yt-info { padding: 16px 4px; display: flex; gap: 14px; align-items: flex-start; }
        .yt-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; background: #222; flex-shrink: 0; border: 1px solid #333; }
        .yt-title { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 6px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4;}
        .yt-meta { font-size: 12px; color: var(--muted); display: flex; gap: 12px; align-items: center; }

        .board-feed { display: flex; flex-direction: column; gap: 20px; max-width: 750px; margin: 0 auto; width: 100%; padding-bottom: 50px; }
        .board-post { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; animation: fadeUp 0.4s forwards; opacity: 0;}
        .board-post:hover { border-color: #333; box-shadow: 0 15px 30px rgba(0,0,0,0.4); transform: translateY(-2px);}
        .b-header { display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .b-avatar { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #27272a; border: 1px solid #333;}
        .b-media { border-radius: 12px; overflow: hidden; border: 1px solid #27272a; background: #050506; max-height: 500px; display: flex; justify-content: center; margin-top: 5px; }
        .b-media img, .b-media video { max-width: 100%; max-height: 500px; object-fit: contain; opacity: 0; transition: 0.5s; }
        .b-media .loaded { opacity: 1; }

        .shorts-feed { height: calc(100vh - 130px); overflow-y: scroll; scroll-snap-type: y mandatory; margin: -25px; scrollbar-width: none; background: #000; }
        .shorts-feed::-webkit-scrollbar { display: none; }
        .short-wrap { height: 100%; width: 100%; scroll-snap-align: start; display: flex; justify-content: center; align-items: center; position: relative; padding: 20px; }
        .short-ui { display: flex; flex-direction: row; gap: 30px; height: 100%; width: 100%; max-width: 600px; justify-content: center; align-items: center; position: relative; }
        .short-video { flex: 1; height: 100%; max-width: 480px; background: transparent; position: relative; display: flex; align-items: center; justify-content: center; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.9); border: 1px solid #222;}
        .short-video video { width: 100%; height: 100%; object-fit: cover; }
        .short-info-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 60px 20px 25px; background: linear-gradient(transparent, rgba(0,0,0,0.95)); color: white; pointer-events: none; z-index: 5;}
        
        .short-sidebar { display: flex; flex-direction: column; justify-content: flex-end; gap: 20px; height: 100%; padding-bottom: 30px; width: 60px; }
        .s-btn { width: 56px; height: 56px; border-radius: 50%; background: #161619; border: 1px solid #333; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 22px; position: relative; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.5);}
        .s-btn:hover { background: #27272a; transform: translateY(-4px); border-color: #555; box-shadow: 0 15px 30px rgba(0,0,0,0.8);}
        .s-btn:active { transform: scale(0.9); }
        .s-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(225,29,72,0.15); box-shadow: 0 0 20px rgba(225,29,72,0.4);}
        .s-count { position: absolute; bottom: -22px; font-size: 12px; color: var(--muted); width: 100%; text-align: center; font-weight: 900; }

        .profile-header { background: var(--card); border-radius: var(--radius); padding: 40px; display: flex; gap: 30px; align-items: center; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.4);}
        .p-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--border); background: #27272a; box-shadow: 0 0 25px rgba(0,0,0,0.6);}
        
        .pv-layout { display: flex; gap: 35px; flex-wrap: wrap; align-items: flex-start; margin-top: 10px;}
        .pv-main { flex: 3; min-width: 320px; display: flex; flex-direction: column; gap: 20px; }
        .pv-side { flex: 1; min-width: 320px; background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); height: fit-content; position: sticky; top: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.5);}
        .pv-media-box { background: #050506; border-radius: var(--radius); display: flex; justify-content: center; align-items: center; min-height: 50vh; max-height: 85vh; width: 100%; border: 1px solid #222; box-shadow: 0 20px 60px rgba(0,0,0,0.8);}
        .pv-media-box img, .pv-media-box video { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: var(--radius);}
        
        .hashtag { color: #60a5fa; cursor: pointer; font-weight: 700; margin-right: 8px; font-size: 13px; display: inline-block; padding: 6px 12px; background: rgba(96,165,250,0.1); border-radius: 8px; margin-bottom: 8px; transition: 0.2s;}
        .hashtag:hover { background: rgba(96,165,250,0.2); transform: translateY(-2px); box-shadow: 0 4px 10px rgba(96,165,250,0.2);}

        .comments-section { margin-top: 25px; border-top: 1px solid var(--border); padding-top: 25px; }
        .comm-list { max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; margin-bottom: 15px; padding-right: 8px; }
        .comm-item { background: #161619; padding: 14px 16px; border-radius: var(--radius-sm); font-size: 14px; border: 1px solid #222; line-height: 1.4;}

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(15px); }
        .modal { background: var(--card); padding: 40px; border-radius: 24px; width: 90%; max-width: 420px; display: flex; flex-direction: column; gap: 18px; border: 1px solid #333; box-shadow: 0 30px 60px rgba(0,0,0,0.9); animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);}

        #loader { display: none; position: fixed; inset: 0; background: rgba(5,5,6,0.95); z-index: 9000; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.05); border-top: 4px solid var(--accent); border-radius: 50%; width: 60px; height: 60px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        @media (max-width: 768px) {
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: 0; top: 0; height: 100%; transform: translateX(-100%); z-index: 2000; width: 280px; box-shadow: 10px 0 40px rgba(0,0,0,0.9); }
            .sidebar.open { transform: translateX(0); }
            
            .short-wrap { padding: 0; }
            .short-ui { max-width: 100%; height: 100%; gap: 0; flex-direction: column; position: relative;}
            .short-video { width: 100%; max-width: none; border-radius: 0; border: none; height: 100%;}
            .short-video video { border-radius: 0; border: none; object-fit: cover; }
            
            .short-sidebar { position: absolute; right: 12px; bottom: 100px; z-index: 100; padding: 0; height: auto; }
            .s-btn { background: rgba(0,0,0,0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); width: 48px; height: 48px; }
            .short-info-overlay { padding-right: 80px; padding-bottom: 30px; pointer-events: auto; border-radius: 0;}
            
            .profile-header { flex-direction: column; text-align: center; padding: 25px;}
            .pv-layout { flex-direction: column; }
            .pv-side { position: static; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>
<div id="toastBox" style="position:fixed; bottom:20px; left:50%; transform:translateX(-50%); z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none;"></div>
<div id="globalMentions" class="hints-box" style="width:auto; min-width:220px; max-width:320px;"></div>
<div id="searchHints" class="hints-box" style="width:100%; max-width:100%; box-sizing:border-box;"></div>

<div id="authModal" class="modal-overlay">
    <div class="modal">
        <h2 style="text-align:center; margin:0; font-size:26px;" data-i18n="authTitle">fembooru</h2>
        <input type="text" id="authName" placeholder="Никнейм" autocomplete="username">
        <input type="password" id="authPass" placeholder="Пароль" autocomplete="current-password">
        <button class="btn-main" onclick="window.submitAuth()" data-i18n="btnEnter">Продолжить</button>
        <button onclick="window.closeModal('authModal')" style="background:transparent; border:none; color:var(--muted); cursor:pointer; font-weight:bold; padding:10px;" data-i18n="btnCancel">Отмена</button>
    </div>
</div>

<div id="editProfileModal" class="modal-overlay">
    <div class="modal">
        <h2 style="margin:0; font-size:22px;" data-i18n="profSettings">Настройки</h2>
        <p style="font-size:12px; color:var(--muted); margin:0" data-i18n="profAva">Аватарка:</p>
        <input type="file" id="editAvaFile" accept="image/*">
        <textarea id="editBio" placeholder="..." rows="3" autocomplete="off" spellcheck="false" role="presentation"></textarea>
        <button class="btn-main" onclick="window.saveProfile()" data-i18n="btnSave">Сохранить</button>
        <button onclick="window.closeModal('editProfileModal')" style="background:transparent; border:none; color:var(--muted); cursor:pointer; font-weight:bold; padding:10px;" data-i18n="btnCancel">Закрыть</button>
    </div>
</div>

<header class="top-nav">
    <div class="top-nav-left">
        <img src="https://i.ibb.co/3sW3xQy/default-avatar.png" class="nav-avatar" id="navAvatar" onclick="window.openMyProfile()">
        <h1><span onclick="window.goHome()">fembooru</span> <span id="aiFact" class="ai-greeting"></span></h1>
    </div>
    <button class="menu-btn" onclick="window.toggleMenu()">☰</button>
</header>

<div id="menuOverlay" onclick="window.toggleMenu()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:140; backdrop-filter:blur(5px);"></div>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="window.setLang('ru')" id="lang-ru">RU</button>
            <button class="lang-btn" onclick="window.setLang('uk')" id="lang-uk">UK</button>
            <button class="lang-btn" onclick="window.setLang('en')" id="lang-en">EN</button>
        </div>
        <div class="auth-box">
            <div id="loggedOutView"><button class="btn-main" style="width:100%" onclick="window.openAuth()" data-i18n="btnLogin">Войти / Рега</button></div>
            <div id="loggedInView" style="display:none">
                <div id="userNameDisplay" style="font-weight:900; cursor:pointer; color:#fff; font-size:16px; margin-bottom:15px; text-align:center;" onclick="window.openMyProfile()">User</div>
                <button class="btn-action" onclick="window.doLogout()" style="width:100%; font-size:12px; padding:10px; justify-content:center;" data-i18n="btnLogout">Выйти</button>
            </div>
        </div>

        var dbNode = type; if(type === 'gallery') dbNode = 'posts'; 
        var input = document.getElementById(type==='gallery'?'fGal':type==='board'?'fBoard':'fShorts');
        if(!input.files.length && type !== 'board') return;
        document.getElementById('loader').style.display='flex';
        var files = input.files.length ? input.files : [null];
        for(var i = 0; i < files.length; i++) {
            var f = files[i];
            try {
                var url = f ? (f.type.indexOf('image/')===0 ? await upImg(f) : await upVid(f)) : null;
                var nsfw = document.getElementById('n'+(type==='gallery'?'Gal':type==='board'?'Board':'Shorts'))?.checked || false;
                var data = { url:url, uid: AppState.user.uid, author: AppState.user.displayName, time: Date.now(), isVid: (f && f.type.indexOf('video')!==-1) || false, nsfw:nsfw };
                
                if(type==='gallery') { data.t1 = document.getElementById('t1G').value || ''; data.t2 = document.getElementById('t2G').value || ''; data.text = document.getElementById('txtGal').value || ''; }
                if(type==='board') data.text = document.getElementById('txtB').value || '';
                if(type==='shorts') data.text = document.getElementById('txtS').value || '';
                
                await push(ref(db, dbNode), data); 
            } catch(e) { window.showToast('Помилка', true); }
        }
        document.getElementById('loader').style.display='none'; input.value='';
        if(document.getElementById('txtGal')) document.getElementById('txtGal').value='';
        if(document.getElementById('txtB')) document.getElementById('txtB').value='';
        if(document.getElementById('txtS')) document.getElementById('txtS').value='';
    };

    function fetchAll() {
        onValue(ref(db, 'users'), function(s) { AppState.users = s.val() || {}; if(AppState.profUid) renderProfFeed(); });
        ['posts', 'board', 'shorts'].forEach(function(t) { 
            onValue(ref(db, t), function(s) {
                var a = []; AppState.tags = {};
                s.forEach(function(c) { 
                    var d = c.val(); d.id = c.key; a.push(d);
                    if(t==='posts') { [d.t1||'', ...(d.t2||'').split(' ')].filter(Boolean).forEach(function(x) { var tag=x.toLowerCase().trim(); AppState.tags[tag]=(AppState.tags[tag]||0)+1; }); }
                });
                AppState.data[t==='posts'?'gallery':t] = a.reverse(); 
                window.renderCurrentTab();
            });
        });
    }

    window.switchTab = function(t) {
        window.switchView('mainView');
        AppState.currentTab = t; AppState.profUid = null; AppState.currentPostId = null;
        document.querySelectorAll('.app-tab').forEach(function(b) { b.classList.remove('active'); });
        var targetTab = document.getElementById('tab-'+t); if(targetTab) targetTab.classList.add('active');
        document.querySelectorAll('.tab-content').forEach(function(c) {
            c.style.display = 'none'; c.classList.remove('active');
            if(c.id === 'tab-content-'+t) { c.style.display = 'flex'; setTimeout(function(){c.classList.add('active');},10); }
        });
        window.renderCurrentTab();
    };

    window.renderCurrentTab = function() {
        if(AppState.profUid || AppState.currentPostId) return;
        var rf = document.querySelector('input[name="rating"]:checked').value;
        var q = sInput.value.toLowerCase().replace(/#/g, '').trim().split(' ').filter(Boolean);
        
        if (AppState.currentTab === 'videos') { renderVideos(rf, q); return; }

        var feed = AppState.data[AppState.currentTab]?.filter(function(p) {
            if(rf==='sfw' && p.nsfw) return false; if(rf==='nsfw' && !p.nsfw) return false;
            if(q.length) {
                var searchStr = ((p.t1||'')+' '+(p.t2||'')+' '+(p.text||'')).toLowerCase();
                return q.every(function(word) { return searchStr.indexOf(word) !== -1; });
            }
            return true;
        }) || [];

        if(AppState.currentTab==='gallery') feed.sort(function(a,b) { return RecomEngine.score(b) - RecomEngine.score(a); });

        if(AppState.currentTab==='gallery') renderGrid(feed, 'galFeed');
        if(AppState.currentTab==='board') renderBoard(feed);
        if(AppState.currentTab==='shorts') renderShorts(feed);
    };

    function renderGrid(arr, target) {
        var el = document.getElementById(target); el.innerHTML = '';
        if(!arr.length) { el.innerHTML = '<div style="text-align:center;width:100%;padding:80px 20px;color:var(--muted);font-size:18px;font-weight:bold;">'+t('emptySearch')+'</div>'; return; }
        arr.forEach(function(p, i) {
            var div = document.createElement('div'); div.className = 'post-card'; div.style.animationDelay = (i*0.03)+'s';
            div.onclick = function() { window.openPost(p.id, target.indexOf('prof')!==-1?(p._type||'gallery'):'gallery'); };
            var mediaTag = p.isVid ? '<div class="vid-icon-big" style="width:40px;height:40px;font-size:14px;">▶</div><video data-src="'+p.url+'#t=0.1" preload="none" muted loop></video>' : '<img data-src="'+p.url+'" loading="lazy">';
            div.innerHTML = (p.nsfw?'<div class="nsfw-badge">NSFW</div>':'') +
                '<div class="pc-media">'+mediaTag+'</div>' +
                '<div class="pc-info"><span style="color:#60a5fa; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">#'+(p.t1||'post')+'</span><span style="flex-shrink:0;">❤ '+(p.likes?Object.keys(p.likes).length:0)+'</span></div>';
            el.appendChild(div);
            lazyObs.observe(div);
        });
    }

    function renderVideos(rf, q) {
        var el = document.getElementById('ytFeed'); el.innerHTML = '';
        var allVids = [];
        ['gallery', 'board'].forEach(function(t) { 
            if(AppState.data[t]) {
                var vids = AppState.data[t].filter(function(p){ return p.isVid && p.url; });
                vids.forEach(function(v){ var obj=Object.assign({}, v); obj._type=t; allVids.push(obj); });
            }
        });

        allVids = allVids.filter(function(p) {
            if(rf==='sfw' && p.nsfw) return false; if(rf==='nsfw' && !p.nsfw) return false;
            if(q.length) { var sStr = ((p.t1||'')+' '+(p.t2||'')+' '+(p.text||'')).toLowerCase(); return q.every(function(w){ return sStr.indexOf(w) !== -1;}); }
            return true;
        }).sort(function(a,b) { return b.time - a.time; });

        if(!allVids.length) { el.innerHTML = '<div style="text-align:center;width:100%;grid-column:1/-1;padding:50px;color:var(--muted)">'+t('empty')+'</div>'; return; }

        allVids.forEach(function(p, i) {
            var ava = AppState.users[p.uid]?.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
            var div = document.createElement('div'); div.className = 'yt-card'; div.style.animationDelay = (i*0.05)+'s';
            div.onclick = function() { window.openPost(p.id, p._type); };
            div.innerHTML = '<div class="yt-thumb">' +
                    (p.nsfw?'<div class="nsfw-badge">NSFW</div>':'') +
                    '<div class="vid-icon-big">▶</div>' +
                    '<video data-src="'+p.url+'#t=0.1" preload="none" muted onmouseover="this.play()" onmouseout="this.pause()"></video>' +
                '</div>' +
                '<div class="yt-info">' +
                    '<img src="'+ava+'" class="yt-avatar" onclick="event.stopPropagation(); window.openProfile(\''+p.uid+'\')">' +
                    '<div class="yt-text">' +
                        '<div class="yt-title">'+(p.text || (p.t1 ? '#'+p.t1 : 'Відео'))+'</div>' +
                        '<div class="yt-meta"><span onclick="event.stopPropagation(); window.openProfile(\''+p.uid+'\')" style="cursor:pointer">'+p.author+'</span> • <span>❤ '+(p.likes?Object.keys(p.likes).length:0)+'</span></div>' +
                    '</div>' +
                '</div>';
            el.appendChild(div);
            lazyObs.observe(div);
        });
    }

    function renderBoard(arr) {
        var el = document.getElementById('boardFeed'); el.innerHTML = '';
        if(!arr.length) { el.innerHTML = '<div style="text-align:center;width:100%;padding:50px;color:var(--muted)">'+t('empty')+'</div>'; return; }
        arr.forEach(function(p, i) {
            var ava = AppState.users[p.uid]?.avatar || "https://i.ibb.co/3sW3xQy/default-avatar.png";
            var div = document.createElement('div'); div.className = 'board-post'; div.style.animationDelay = (i*0.05)+'s';
            div.innerHTML = '<div class="b-header" onclick="event.stopPropagation(); window.openProfile(\''+p.uid+'\')"><img src="'+ava+'" class="b-avatar"> <div><span style="color:#fff">'+p.author+'</span><br><span style="font-size:11px;color:var(--muted);font-weight:normal;">'+new Date(p.time).toLocaleString()+'</span></div></div>' +
                (p.text?'<div style="font-size:15px; white-space:pre-wrap; line-height:1.6;">'+window.parseMentions(p.text)+'</div>':'') + 
                (p.url?'<div class="b-media" onclick="window.openPost(\''+p.id+'\',\'board\')">'+(p.isVid?'<video data-src="'+p.url+'" preload="none" controls></video>':'<img data-src="'+p.url+'" loading="lazy">')+'</div>':'') +
                '<div class="action-row" style="margin-top:10px">' +
                    '<button class="btn-action '+(p.likes&&p.likes[AppState.user?.uid]?'active':'')+'" onclick="window.like(\''+p.id+'\',\'board\')">❤ '+(p.likes?Object.keys(p.likes).length:0)+'</button>' +
                    '<button class="btn-action" onclick="window.repost(\''+p.id+'\',\'board\')">🔄 Репост</button>' +
                    '<button class="btn-action" onclick="window.openPost(\''+p.id+'\',\'board\')">💬</button>' +
                '</div>';
            el.appendChild(div);
            if(p.url) lazyObs.observe(div);
        });
    }

    function renderShorts(arr) {
        var el = document.getElementById('shortsFeed'); el.innerHTML = '';
        if(!arr.length) return;
        arr.forEach(function(p) {
            var div = document.createElement('div'); div.className = 'short-wrap';
            var uAvatar = AppState.users[p.uid]?.avatar||'https://i.ibb.co/3sW3xQy/default-avatar.png';
            div.innerHTML = '<div class="short-ui"><div class="short-video"><video data-src="'+p.url+'" preload="none" loop playsinline></video>' +
                '<div class="short-info-overlay"><b onclick="event.stopPropagation(); window.openProfile(\''+p.uid+'\')" style="cursor:pointer;font-size:18px;display:flex;align-items:center;gap:8px;margin-bottom:10px;"><img src="'+uAvatar+'" style="width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid #333;">@'+p.author+'</b><p style="margin:0;font-size:15px;line-height:1.5;">'+window.parseMentions(p.text||'')+'</p></div></div>' +
                '<div class="short-sidebar">' +
                    '<button class="s-btn '+(p.likes&&p.likes[AppState.user?.uid]?'active':'')+'" onclick="window.like(\''+p.id+'\',\'shorts\')">❤<span class="s-count">'+(p.likes?Object.keys(p.likes).length:0)+'</span></button>' +
                    '<button class="s-btn" onclick="window.repost(\''+p.id+'\',\'shorts\')">🔄</button>' +
                    '<button class="s-btn" onclick="window.openPost(\''+p.id+'\',\'shorts\')">💬</button>' +
                    (AppState.isAdmin||(AppState.user&&AppState.user.uid===p.uid)?'<button class="s-btn" style="color:var(--accent)" onclick="window.del(\''+p.id+'\',\'shorts\')">🗑</button>':'') +
                '</div></div>';
            el.appendChild(div);
            lazyObs.observe(div);
        });
    }

    window.openProfile = function(uid) {
        AppState.profUid = uid; 
        window.switchView('profileMode');
        get(ref(db, 'users/'+uid)).then(function(snapshot) {
            var d = snapshot.val()||{};
            document.getElementById('pAva').src = d.avatar||"https://i.ibb.co/3sW3xQy/default-avatar.png";
            document.getElementById('pName').innerText = d.name||'Anon';
            document.getElementById('pBio').innerHTML = window.parseMentions(d.bio||'');
            document.getElementById('pEditBtn').style.display = (AppState.user&&AppState.user.uid===uid)?'flex':'none';
            window.switchProfTab('uploads');
        }).catch(function() { window.showToast('Помилка', true); });
    };

    window.saveProfile = async function() {
        var f=document.getElementById('editAvaFile').files[0], b=document.getElementById('editBio').value;
        var a=document.getElementById('pAva').src; document.getElementById('loader').style.display='flex';
        if(f) a=await upImg(f);
        await update(ref(db, 'users/'+AppState.user.uid), {avatar:a, bio:b}); 
        document.getElementById('loader').style.display='none'; window.closeModal('editProfileModal'); window.openProfile(AppState.user.uid);
    };

    window.switchProfTab = function(t) { 
        AppState.profTab=t; 
        document.querySelectorAll('#profileMode .app-tab').forEach(function(b){b.classList.remove('active')}); 
        document.getElementById('pt-'+t).classList.add('active'); 
        renderProfFeed(); 
    };

    function renderProfFeed() {
        var items = [];
        if(AppState.profTab==='uploads') {
            ['gallery','board','shorts'].forEach(function(t){
                var dbTarget = t==='gallery'?'posts':t;
                if(AppState.data[dbTarget]) {
                    var filtered = AppState.data[dbTarget].filter(function(p){return p.uid===AppState.profUid});
                    filtered.forEach(function(p){ var obj=Object.assign({}, p); obj._type=t; items.push(obj); });
                }
            });
        }
        else { 
            var r=AppState.users[AppState.profUid]?.reposts||{}; 
            Object.keys(r).forEach(function(id){ 
                var type=r[id]; var dbTarget = type==='gallery'?'posts':type;
                var post=AppState.data[dbTarget]?.find(function(x){return x.id===id}); 
                if(post) { var obj=Object.assign({}, post); obj._type=type; items.push(obj); }
            }); 
        }
        renderGrid(items.sort(function(a,b){return b.time-a.time}), 'profFeed');
    }

    window.openPost = function(id, type) {
        var dbType = type === 'gallery' ? 'posts' : type; 
        var p = AppState.data[dbType]?.find(function(x){return x.id === id}); if(!p) return;
        AppState.currentPostId = id; window.switchView('postMode');
        
        RecomEngine.track((p.t1||'')+' '+(p.t2||'')+' '+(p.text||''));

        var tagsHTML = '';
        if(p.t1) tagsHTML += '<span class="hashtag" onclick="window.setSearch(\''+p.t1+'\')">#'+p.t1+'</span>';
        if(p.t2) { p.t2.split(' ').filter(Boolean).forEach(function(t) { tagsHTML += '<span class="hashtag" onclick="window.setSearch(\''+t+'\')">#'+t+'</span>'; }); }
        
        document.getElementById('pvContainer').innerHTML = '<div class="pv-layout">' +
            '<div class="pv-main">' +
                (p.url ? '<div class="pv-media-box" style="animation: popIn 0.4s ease forwards;">'+(p.isVid?'<video src="'+p.url+'" controls autoplay></video>':'<img src="'+p.url+'">')+'</div>' : '') +
            '</div>' +
            '<div class="pv-side" style="animation: fadeIn 0.5s ease forwards;">' +
                '<div style="display:flex;align-items:center;gap:15px;margin-bottom:20px;cursor:pointer" onclick="window.openProfile(\''+p.uid+'\')">' +
                    '<img src="'+(AppState.users[p.uid]?.avatar||'https://i.ibb.co/3sW3xQy/default-avatar.png')+'" style="width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid #333;">' +
                    '<div><b style="font-size:16px">'+p.author+'</b><br><span style="font-size:11px;color:var(--muted)">'+new Date(p.time).toLocaleString()+'</span></div>' +
                '</div>' +
                (p.text ? '<p style="font-size:15px;line-height:1.6;margin-bottom:20px;white-space:pre-wrap;">'+window.parseMentions(p.text)+'</p>' : '') +
                '<div style="margin-bottom:25px">'+tagsHTML+'</div>' +
                '<div class="action-row" style="flex-wrap:wrap; margin-bottom:25px;">' +
                    '<button class="btn-action '+(p.likes&&p.likes[AppState.user?.uid]?'active':'')+'" onclick="window.like(\''+id+'\',\''+dbType+'\')">❤ '+(p.likes?Object.keys(p.likes).length:0)+'</button>' +
                    '<button class="btn-action" onclick="window.repost(\''+id+'\',\''+(type==='posts'?'gallery':type)+'\')">🔄 Репост</button>' +
                    ((AppState.isAdmin||(AppState.user&&AppState.user.uid===p.uid))?'<button class="btn-action" style="color:var(--accent); flex:0.3" onclick="window.del(\''+p.id+'\',\''+dbType+'\')">🗑</button>':'') +
                '</div>' +
                '<h4 style="margin-bottom:15px; font-size:13px; text-transform:uppercase; color:var(--muted);">Коментарі</h4>' +
                '<div class="comm-list" id="commList"></div>' +
                '<div style="display:flex; gap:10px;">' +
                    '<input type="text" id="cInp" placeholder="..." autocomplete="off" spellcheck="false" role="presentation" style="flex:1;">' +
                    '<button class="btn-main" onclick="window.addComm(\''+id+'\',\''+dbType+'\')">➤</button>' +
                '</div>' +
            '</div>' +
        '</div>';
        
        onValue(ref(db, dbType+'/'+id+'/comments'), function(s) {
            var list = document.getElementById('commList'); if(!list) return;
            list.innerHTML = '';
            if(!s.exists()) { list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center; padding: 20px;">Порожньо...</div>'; return; }
            s.forEach(function(c) {
                var d = c.val();
                list.innerHTML += '<div class="comm-item"><b style="cursor:pointer; color:var(--accent);" onclick="window.openProfile(\''+d.uid+'\')">'+d.name+'</b>: '+window.parseMentions(d.t)+'</div>';
            });
            list.scrollTop = list.scrollHeight;
        });

        if(dbType === 'posts') renderGrid(RecomEngine.getSimilar(p, dbType), 'aiRecs');
        else document.getElementById('aiRecs').innerHTML = '';
    };

    window.addComm = async function(id, type) {
        if(!AppState.user) return window.openAuth();
        var inp = document.getElementById('cInp'); var txt = inp.value.trim();
        if(!txt) return; inp.disabled = true;
        try { await push(ref(db, type+'/'+id+'/comments'), { uid: AppState.user.uid, name: AppState.user.displayName || 'Anon', t: txt, time: Date.now() }); inp.value = ''; } 
        catch(e) { window.showToast('Помилка', true); }
        inp.disabled = false; inp.focus();
    };

    window.goHome = function() { sInput.value=''; AppState.profUid=null; AppState.currentPostId=null; window.switchView('mainView'); window.switchTab(AppState.currentTab); };
    window.closePost = function() { window.goHome(); };
    window.setSearch = function(t) { sInput.value=t; window.goHome(); window.renderCurrentTab(); };
    
    window.like = async function(id, type) { 
        if(!AppState.user) return window.openAuth(); 
        var realType = type==='posts'||type==='gallery' ? 'posts' : type; 
        var r=ref(db, realType+'/'+id+'/likes/'+AppState.user.uid); 
        var s = await get(r); await set(r, s.exists()?null:true); 
    };
    
    window.repost = async function(id, type) { 
        if(!AppState.user) return window.openAuth(); 
        var realType = type==='posts'||type==='gallery' ? 'gallery' : type; 
        var r = ref(db, 'users/'+AppState.user.uid+'/reposts/'+id); 
        var s = await get(r); await set(r, s.exists()?null:realType); window.showToast('Збережено!'); 
    };
    
    window.del = async function(id, type) { 
        if(confirm(t('del') + '?')) { 
            var realType = type==='posts'||type==='gallery' ? 'posts' : type; 
            await remove(ref(db, realType+'/'+id)); window.goHome(); 
        } 
    };
    
    window.setLang = function(l) { 
        AppState.lang=l; 
        document.querySelectorAll('.lang-btn').forEach(function(b){b.classList.remove('active')});
        document.getElementById('lang-'+l).classList.add('active');
        document.querySelectorAll('[data-i18n]').forEach(function(el){ el.innerText = t(el.dataset.i18n); });
        window.renderCurrentTab(); 
    };
    window.setLang('ru');

</script>
</body>
</html>
