<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBooru • Art & Community</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #f8f9fa;
            --bg-dark: #121212;
            --card: #ffffff;
            --card-dark: #1e1e1e;
            --text: #212529;
            --text-dark: #e0e0e0;
            --primary: #4361ee;
            --primary-dark: #5a72e8;
            --success: #4ade80;
            --danger: #ef4444;
            --border: #dee2e6;
            --border-dark: #333333;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-dark: rgba(0, 0, 0, 0.3);
            --transition: all 0.3s cubic-bezier(0.17, 0.67, 0.88, 1.01);
        }

        [data-theme="dark"] {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            transition: var(--transition);
        }

        /* Анимации */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0 }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        .pulse {
            animation: pulse 1.5s infinite;
        }
        .slide-in {
            animation: slideIn 0.5s ease-out forwards;
        }

        /* Header */
        header {
            background: linear-gradient(135deg, var(--primary), #e5);
            color: white;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .logo i {
            color: #ffd166;
       nav-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: white;
            color: var(--primary);
 }
        .btn-primary:hover {
            background: #f0f4ff;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.1);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }

        /* Main */
        main {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .search-bar {
            background: var(--card);
            border-radius: 12px;
            padding: 12px 20px;
            box-shadow: 0 4px 12px var(--shadow);
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        .search-bar input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            transition: var(--transition);
        }
        .search-bar input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        .search-bar button {
            background: var(--primary);
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
        }

        .suggestions {
            position: absolute;
            background: var(--card);
            border-radius: 8px;
            box-shadow: 0 6px 16px var(--shadow);
            width: 100%;
            max-height: 20px;
            overflow-y: auto;
            margin-top: 4px;
            z-index: 10;
            display: none;
        }
        .suggestion-item {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }
        .suggestion-item:hover {
            background: #f1f3f8;
        }
        .suggestion-item i {
            color: var(--primary);
        }

        /* Post Form */
        .post-form {
            background: var(--card);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 6px 16px var(--shadow);
            margin-bottom: 24px;
            transition: var(--transition);
        }
        .post-form:hover {
            box-shadow: 0 10px 20px var(--shadow);
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        @media (max-width: 768px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            background: transparent;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: #fafafa;
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }
        .upload-area i {
            font-size: 3rem;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .upload-area p {
            color: #6c757d;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .post-card {
            background: var(--card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px var(--shadow);
            transition: var(--transition);
            position: relative;
        }
        .post-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 20px var(--shadow);
        }

        .post-header {
            padding: 16px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .post-author-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.8rem;
            color: #555;
        }
        .post-author-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        .post-author-name {
            font-weight: 600;
            color: var(--text);
        }
        .post-meta {
            margin-left: auto;
            font-size: 0.85rem;
            color: #6c757d;
        }

        .post-media {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        .post-content {
            padding: 16px;
        }
        .post-desc {
            font-size: 0.95rem;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .post-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }
        .tag {
            background: rgba(67, 97, 238, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .tag:hover {
            background: rgba(67, 97, 238, 0.2);
        }

        .post-actions {
            display: flex;
            justify-content: space-between;
            padding: 0 16px 16px;
            border-top: 1px solid var(--border);
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            color: #6c757d;
            cursor: pointer;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .action-btn:hover {
            color: var(--primary);
        }
        .action-btn.active {
            color: var(--primary);
        }
        .action-btn i {
            font-size: 1.1rem;
        }

        /* Comments */
        .comments-section {
            padding: 16px;
            border-top: 1px solid var(--border);
            max-height: 200px;
            overflow-y: auto;
        }
        .comment {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }
        .comment-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
        }
        .comment-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
        }
        .comment-body {
            flex: 1;
        }
        .comment-author {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .comment-text {
            font-size: 0.9rem;
            color: #495057;
        }
        .comment-time {
            font-size: 0.75rem;
            color: #6c757d;
            margin-top: 4px;
        }

        .comment-form {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        .comment-form textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.9rem;
            resize: none;
        }
        .comment-form button {
            padding: 10px 16px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
        }

        /* Profile */
        .profile-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 30px;
            text-align: center;
        }
        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 20px;
            border: 4px solid white;
            box-shadow: 0 6px 16px var(--shadow);
        }
        .profile-name {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .profile-status {
            font-style: italic;
            color: #6c757d;
            margin-bottom: 16px;
            max-width: 600px;
        }
        .profile-about {
            max-width: 600px;
            line-height: 1.6;
            color: #495057;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 10px 20px;
            background: #f1f3f8;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 5rem;
            margin-bottom: 20px;
            color: #adb5bd;
        }
        .empty-state h3 {
            font-size: 1.5rem;
            margin-bottom: 12px;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px;
            color: #6c757d;
            font-size: 0.9rem;
            margin-top: 40px;
            border-top: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .search-bar {
                flex-direction: column;
            }
            .post-form {
                padding: 16px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            header {
                flex-direction: column;
                gap: 12px;
            }
        }

        /* Loading skeleton */
        .skeleton {
            background: linear-gradient(90deg, var(--bg) 25%, var(--border) 50%, var(--bg) 75%);
            background-size: 200% 100%;
            animation: skeleton 1.5s infinite;
        }
        @keyframes skeleton {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i class="fas fa-paint-brush"></i>
            <span>MyBooru</span>
        </div>
        <div class="nav-actions">
            <div id="login-section">
                <input type="text" id="username-input" placeholder="Логин" autocomplete="off">
                <button class="btn btn-primary" onclick="handleLoginSignup()">
                    <i class="fas fa-sign-in-alt"></i> Войти
                </button>
            </div>
            <div id="user-info" class="hidden">
                <div class="user-info">
                    <div class="avatar" id="avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span id="username-display">Аноним</span>
                    <button class="btn btn-outline" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> Выход
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="app-content">
        <!-- Динамический контент будет сюда -->
        <div class="search-bar">
            <input type="text" id="search-input" placeholder="🔍 Искать по тегам (например: art, anime)..." autocomplete="off">
            <button onclick="performSearch()">Найти</button>
            <div class="suggestions" id="suggestions"></div>
        </div>

        <div id="post-form" class="post-form hidden">
            <h2><i class="fas fa-plus-circle"></i> Создать пост</h2>
            <div class="form-row">
                <div class="form-group">
                    <>Описание</label>
                    <textarea id="description" placeholder="Что происходит на изображении?"></textarea>
                </div>
                <div class="form-group">
                    <label>Теги (через запятую)</label>
                    <input type="text" id="tags" placeholder="art, cute, anime, digital">
                </div>
            </div>
            <div class="form-group">
                <label>Медиа</label>
                <div class="upload-area" id="upload-area">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Перетащите файл или нажмите для выбора</p>
                    <input type="file" id="media-upload" accept="image/*,video/*" style="display:none;">
                </div>
            </div>
            <button class="btn btn-primary" onclick="uploadPost()">
                <i class="fas fa-upload"></i> Загрузить пост
            </button>
        </div>

        <div id="posts-container" class="posts-grid">
            <!-- Посты будут здесь -->
        </div>

        <div id="loading" class="empty-state hidden">
            <i class="fas fa-spinner fa-spin"></i>
            <h3>Загрузка...</h3>
        </div>
    </main>

    <footer>
        <p>© 2026 MyBooru • Вдохновлено Danbooru, Rule34, Gelbooru</p>
        <p>Используется Firebase, ImgBB и Catbox.moe (прокси)</p>
    </footer>

    <script type="module">
        // --- Firebase Initialization ---
        import { initializeApp from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
        import { getDatabase, ref, push, set, get, child, onValue, query, orderByChild, equalTo, limitToLast, update } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAu8tzzrqKizHt2_0_-6r6DJU02szqtgEA",
            authDomain: "fir-3fa84.firebaseapp.com",
            databaseURL: "https://fir-3fa84-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "fir-3fa84",
            storageBucket: "fir-3fa84.firebasestorage.app",
            messagingSenderId: "725404219596",
            appId: "1:725404219596:web:34ab5087aeed5b9bb1aa69"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let currentView = 'home'; // 'home', 'profile', 'post'
        let currentProfileUserId = null;
        let isSearching = false;

        // --- UI Helpers ---
        function showLoading() {
            document.getElementById('loading').classList.remove('hidden');
            document.getElementById('posts-container').innerHTML = '';
        }

        function hideLoading() {
            document.getElementById('loading').classList.add('hidden');
        }

        function showToast(message, type = 'info') {
            // Простой toast — можно заменить на библиотеку
            const toast = document.createElement('div');
            toast.textContent = message;
            toast.style.cssText = `
                position: fixed;
                bottom: 20px;
                right: 20px;
                background: ${type === 'success' ? '#4ade80' : type === 'error' ? '#ef4444' : '#4361ee'};
                color: white;
                padding: 12px 20px;
                border-radius: 8px;
                font-weight: 500;
                z-index: 1000;
                animation: fadeIn 0.3s, slideOut 0.3s 3s forwards;
            `;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3500);
        }

        // --- Auth ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-section').classList.add('hidden');
                document.getElementById('user-info').classList.remove('hidden');
                document.getElementById('avatar').innerHTML = `<img src="${user.photoURL || ''}" alt="Avatar">`;
                document.getElementById('username-display').textContent = user.displayName || user.email.split('@')[0];
                document.getElementById('post-form').classList.remove('hidden');
                loadProfile(user.uid);
            } else {
                currentUser = null;
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('post-form').classList.add('hidden');
                showHome();
            }
        });

        async function handleLoginSignup() {
            const username = document.getElementById('username-input').value.trim();
            if (!username) {
                showToast('Введите логин', 'error');
                return;
            }

            const email = `${username}@anon.ru`;
            const password = 'defaultPassword123';

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                showToast(`Добро пожаловать, ${username}!`, 'success');
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    try {
                        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                        await updateProfile(userCredential.user, { displayName: username });
                        showToast(`Аккаунт создан! Добро пожаловать, ${username}!`, 'success');
                    } catch (e) {
                        showToast('Ошибка регистрации: ' + e.message, 'error');
                    }
                } else {
                    showToast('Ошибка входа: ' + error.message, 'error');
                }
            }
        }

        function logout() {
            signOut(auth).then(() => {
                showToast('Вы вышли', 'info');
            });
        }

        // --- Profile ---
        function loadProfile(userId) {
            const profileRef = ref(db, `profiles/${userId}`);
            get(profileRef).then(snapshot => {
                const data = snapshot.val() || {};
                document.getElementById('avatar').innerHTML = `<img src="${data.avatarUrl || ''}" alt="Avatar">`;
                document.getElementById('username-display').textContent = data.displayName || userId.split('@')[0];
            });
        }

        // --- Search ---
        const searchInput = document.getElementById('search-input');
        const suggestionsEl = document.getElementById('suggestions');

        searchInput.addEventListener('input', debounce(() => {
            const q = searchInput.value.toLowerCase().trim();
            if (q.length < 2) {
                suggestionsEl.style.display = 'none';
                return;
            }

            // Простая подсказка (в реальности — запрос к базе или предопределённый список)
            const mockTags = ['art', 'anime', 'cute', 'digital', 'traditional', 'landscape', 'nsfw', 'safe'];
            const filtered = mockTags.filter(t => t.startsWith(q)).slice(0, 5);

            if (filtered.length > 0) {
                suggestionsEl.innerHTML = filtered.map(tag => 
                    `<div class="suggestion-item" onclick="selectSuggestion('${tag}')">
                     <i class="fas fa-hashtag"></i> #${tag}
                     </div>`
                ).join('');
                suggestionsEl.style.display = 'block';
            } else {
                suggestionsEl.style.display = 'none';
            }
        }, 300));

        function selectSuggestion(tag) {
            searchInput.value = tag;
            suggestionsEl.style.display = 'none';
            performSearch();
        }

        function performSearch() {
            const q = searchInput.value.trim();
            if (!q) {
                showHome();
                return;
            }
            isSearching = true;
            showLoading();
            loadPostsByTag(q);
        }

        // --- Posts ---
        function showHome() {
            currentView = 'home';
            isSearching = false;
            document.getElementById('app-content').innerHTML = `
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="🔍 Искать по тегам (например: art, anime)..." autocomplete="off">
                    <button onclick="performSearch()">Найти</button>
                    <div class="suggestions" id="suggestions"></div>
                </div>
                <div id="post-form" class="post-form ${currentUser ? '' : 'hidden'}">
                    <h2><i class="fas fa-plus-circle"></i> Создать пост</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Описание</label>
                            <textarea id="description" placeholder="Что происходит на изображении?"></textarea>
                        </div>
                        <div class="form-group">
                            <label>Теги (через запятую)</label>
                            <input type="text" id="tags" placeholder="art, cute, anime, digital">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Медиа</label>
                        <div class="upload-area" id="upload-area">
                            <i class="fas fa-cloud-upload-alt"></i>
                            <p>Перетащите файл или нажмите для выбора</p>
                            <input type="file" id="media-upload" accept="image/*,video/*" style="display:none;">
                        </div>
                    </div>
                    <button class="btn btn-primary" onclick="uploadPost()">
                        <i class="fas fa-upload"></i> Загрузить пост
                    </button>
                </div>
                <div id="posts-container" class="posts-grid"></div>
                <div id="loading" class="empty-state hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Загрузка...</h3>
                </div>
            `;
            // Перепривязываем обработчики
            document.getElementById('search-input').addEventListener('input', debounce(() => {
                const q = document.getElementById('search-input').value().trim();
                if (q.length < 2) {
                    document.getElementById('suggestions').style.display = 'none';
                    return;
                }
                const mockTags = ['art', 'anime', 'cute', 'digital', 'traditional', 'landscape', 'nsfw', 'safe'];
                const filtered = mockTags.filter(t => t.startsWith(q)).slice(0, 5);
                const sugg = document.getElementById('suggestions');
                if (filtered.length > 0) {
                    sugg.innerHTML = filtered.map(tag => 
                        `<div class="suggestion-item" onclick="selectSuggestion('${tag}')">
                         <i class="fas fa-hashtag"></i> #${tag}
                         </div>`
                    ).join('');
                    sugg.style.display = 'block';
                } else sugg.style.display = 'none';
            }, 300));
            document.getElementById('upload-area')
                .addEventListener('click', () => document.getElementById('media-upload').click());
            document.getElementById('media-upload')
                .addEventListener('change', handleFileUpload);
            loadPosts();
        }

        function loadPosts(tag = null) {
            showLoading();
            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            let postsQuery;
            if (tag) {
                // Поиск по тегу
                const tagRef = ref(db, `postsByTag/${tag}`);
                get(tagRef).then(snapshot => {
                    if (snapshot.exists()) {
                        const postIds = Object.keys(snapshot.val());
                        if (postIds.length === 0) {
                            container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Постов с тегом #${tag} не найдено</h3></div>`;
                            hideLoading();
                            return;
                        }
                        loadPostsByIds(postIds, container);
                    } else {
                        container.innerHTML = `<div class="empty-state"><i class="fas fa-search"></i><h3>Постов с тегом #${tag} найдено</h3></div>`;
                        hideLoading();
                    }
                }).catch(err => {
                    console.error(err);
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Ошибка загрузки</h3><p>${err.message}</p></div>`;
                    hideLoading();
                });
            } else {
                // Все посты
                postsQuery = query(ref(db, 'posts/'), orderByChild('timestamp'), limitToLast(20));
                onValue(postsQuery, (snapshot) => {
                    if (snapshot.exists()) {
                        snapshot.forEach(childSnapshot => {
                            const postData = childSnapshot.val();
                            renderPostCard(postData, childSnapshot.key, container);
                        });
                    } else {
                        container.innerHTML = `<div class="empty-state"><i class="fas fa-inbox"></i><h3>Пока нет постов</h3><p>Создайте первый!</p></div>`;
                    }
                    hideLoading();
                }, { onlyOnce: true });
            }
        }

        function loadPostsByIds(ids, container) {
            let loaded = 0;
            ids.forEach(id => {
                const postRef = ref(db, `posts/${id}`);
                get(postRef).then(snapshot => {
                    if (snapshot.exists()) {
                        const postData = snapshot.val();
                        renderPostCard(postData, id, container);
                    }
                    loaded++;
                    if (loaded === ids.length) hideLoading();
                }).catch(() => {
                    loaded++;
                    if (loaded === ids.length) hideLoading();
                });
            });
        }

        function renderPostCard(postData, postId, container) {
            const card = document.createElement('div');
            card.className = 'post-card fade-in';
            card.innerHTML = `
                <div class="post-header">
                    <div class="post-author" onclick="showProfile('${postData.userId}')">
                        <div class="post-author-avatar">
                            <img src="${postData.authorAvatar || ''}" alt="${postData.authorName}">
                        </div>
                        <span class="post-author-name">${postData.authorName}</span>
                    </div>
                    <span class="post-meta">${new Date(postData.timestamp).toLocaleDateString('ru')}</span>
                </div>
                <img src="${postData.mediaUrl || 'https://via.placeholder.com/300x240/e0e0e0/6c757d?text=No+Image'}" 
                     alt="Post" class="post-media">
                <div class="post-content">
                    <p class="post-desc">${postData.description || '—'}</p>
                    <div class="post-tags">
                        ${postData.tags.map(t => `<span class="tag" onclick="searchByTag('${t}')">#${t}</span>`).join('')}
                    </div>
                </div>
                <div class="post-actions">
                    <button class="action-btn" title="Лайк">
                        <i class="far fa-heart"></i> <span>${postData.likes || 0}</span>
                    </button>
                    <button class="action-btn" title="Репост">
                        <i class="fas fa-retweet"></i> <span>${postData.reposts || 0}</span>
                    </button>
                    <button class="action-btn" title="Комментарии">
                        <i class="fas fa-comment"></i> <span>${postData.commentCount || 0}</span>
                    </button>
                </div>
                <div class="comments-section" id="comments-${postId}">
                    <!-- Комментарии загружаются отдельно -->
                </div>
                ${currentUser ? `
                <div class="comment-form">
                    <textarea placeholder="Напишите комментарий..."></textarea>
                    <button onclick="addComment('${postId}')">Отправить</button>
                </div>
                ` : ''}
            `;
            container.appendChild(card);
            loadComments(postId, `comments-${postId}`);
        }

        function loadComments(postId, targetId) {
            const commentsRef = query(ref(db, `comments/${postId}`), orderByChild('timestamp'));
            onValue(commentsRef, (snapshot) => {
                const container = document.getElementById(targetId);
                container.innerHTML = '';
                if (snapshot.exists()) {
                    snapshot.forEach(c => {
                        const data = c.val();
                        const el = document.createElement('div');
                        el.className = 'comment';
                        el.innerHTML = `
                            <div class="comment-avatar">
                                <img src="${data.avatar || ''}" alt="${data.authorName}">
                            </div>
                            <div class="comment-body">
                                <div class="comment-author">${data.authorName}</div>
                                <div class="comment-text">${data}</div>
                                <div class="comment-time">${new Date(data.timestamp).toLocaleTimeString('ru', { hour: '2-digit', minute: '2-digit' })}</div>
                            </div>
                        `;
                        container.appendChild(el);
                    });
                }
            }, { onlyOnce: true });
        }

        async function addComment(postId) {
            if (!currentUser) {
                showToast('Войдите, чтобы комментировать', 'error');
                return;
            }
            const textarea = document.querySelector(`#comments-${postId} + .comment-form textarea`);
            const text = textarea.value.trim();
            if (!text) return;

            const newCommentRef = push(ref(db, `comments/${postId}/`));
            await set(newCommentRef, {
                userId: currentUser.uid,
                authorName: currentUser.displayName || currentUser.email.split('@')[0],
                avatar: currentUser.photoURL,
                text: text,
                timestamp: Date.now()
            });

            // Обновим счётчик комментариев в посте
            const postRef = ref(db, `posts/${postId}`);
            const postSnap = await get(postRef);
            const postData = postSnap.val();
            await update(postRef, {
                commentCount: (postData.commentCount || 0) + 1
            });

            textarea.value = '';
            showToast('Комментарий добавлен!', 'success');
        }

        // --- Upload ---
        document.getElementById('upload-area').addEventListener('click', () => {
            document.getElementById('media-upload').click();
        });

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            document.getElementById('upload-area').innerHTML = `<i class="fas fa-spinner fa-spin"></i> Загрузка...`;
            uploadToImgBB(file);
        }

        async function uploadToImgBB(file) {
            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', '120a27bcbb28d3ffd9f03bc4b32bb54f');

            try {
                const res = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                if (data.success) {
                    const url = data.data.url;
                    document.getElementById('upload-area').innerHTML = `
                        <i class="fas fa-check-circle" style="color:#4ade80;"></i>
                        <p>Готово! Кликните, чтобы изменить.</p>
                    `;
                    document.getElementById('media-url').value = url;
                } else {
                    throw new Error(data.error.message);
                }
            } catch (err) {
                document.getElementById('upload-area').innerHTML = `
                    <i class="fas fa-exclamation-circle" style="color:#ef4444;"></i>
                    <p>Ошибка: ${err.message}</p>
                `;
                showToast('Ошибка загрузки изображения', 'error');
            }
        }

        async function uploadPost() {
            if (!currentUser) {
                showToast('Войдите для загрузки', 'error');
                return;
            }

            const desc = document.getElementById('description').value.trim();
            const tagsStr = document.getElementById('tags').value.trim();
            const mediaUrl = document.getElementById('media-url')?.value || '';

            if (!desc && !mediaUrl) {
                showToast('Укажите описание или выберите файл', 'error');
                return;
            }

            const tags = tagsStr.split(',').map(t => t.trim()).filter(t => t);

            showLoading();
            try {
                const newPostRef = push(ref(db, 'posts/'));
                const postId = newPostRef.key;

                // Подготовка данных
                const postData = {
                    userId: currentUser.uid,
                    authorName: currentUser.displayName || currentUser.email.split('@')[0],
                    authorAvatar: currentUser.photoURL,
                    description: desc,
                    tags: tags,
                    mediaUrl: mediaUrl,
                    timestamp: Date.now(),
                    likes: 0,
                    reposts: 0,
                    commentCount: 0
                };

                // Обновления
                const updates = {};
                updates[`posts/${postId}`] = postData;
                tags(tag => {
                    updates[`postsByTag/${tag}/${postId}`] = true;
                });
                updates[`userPosts/${currentUser.uid}/${postId}`] = {
                    description: desc,
                    tags: tags,
                    mediaUrl: mediaUrl,
                    timestamp: Date.now()
                };

                await update(ref(db), updates);
                showToast('Пост успешно загружен!', 'success');

                // Сброс формы
                document.getElementById('description').value = '';
                document.getElementById('tags').value = '';
                document.getElementById('upload-area').innerHTML = `
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>Перетащите файл или нажмите для выбора</p>
                `;
                document.getElementById('media-url').remove();

                // Обновить ленту
                if (isSearching) {
                    loadPosts(currentSearchTag);
                } else {
                    showHome();
                }
            } catch (err) {
                console.error(err);
                showToast('Ошибка загрузки: ' + err.message, 'error');
                hideLoading();
            }
        }

        // --- Navigation ---
        function showProfile(userId) {
            currentView = 'profile';
            currentProfileUserId = userId;
            showLoading();
            document.getElementById('app-content').innerHTML = `
                <div class="profile-header">
                    <img src="" alt="Avatar" class="profile-avatar" id="profile-avatar">
                    <h2 class="profile-name" id="profile-name">Загрузка...</h2>
                    <div class="profile-status" id="profile-status"></div>
                    <div class="profile-about" id="profile-about"></div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="uploads">Загрузки</button>
                    <button class="tab-btn" data-tab="reposts">Репосты</button>
                </div>
                <div id="profile-posts" class="posts-grid"></div>
                <div id="loading-profile" class="empty-state hidden">
                    <i class="fas fa-spinner fa-spin"></i>
                    <h3>Загрузка профиля...</h3>
                </div>
            `;

            // Загрузка профиля
            get(ref(db, `profiles/${userId}`)).then(snapshot => {
                const data = snapshot.val() || {};
                document.getElementById('profile-avatar').src = data.avatarUrl || 'https://via.placeholder.com/120/e0e0e0/6c757d?text=Аватар';
                document.getElementById('profile-name').textContent = data.displayName || 'Аноним';
                document.getElementById('profile-status').textContent = data.status || '';
                document.getElementById('profile-about').textContent = data.about || 'Нет информации.';
                loadProfilePosts('uploads');
            }).catch(() => {
                document.getElementById('profile-name').textContent = 'Профиль не найден';
                hideLoading();
            });
        }

        function loadProfilePosts(tab) {
            const container = document.getElementById('profile-posts');
            container.innerHTML = '';
            const path = tab === 'uploads' ? `userPosts/${currentProfileUserId}` : `userReposts/${currentProfileUserId}`;
            get(ref(db, path)).then(snapshot => {
                if (snapshot.exists()) {
                    snapshot.forEach(child => {
                        const data = child.val();
                        const card = document.createElement('div');
                        card.className = 'post-card';
                        card.innerHTML = `
                            <img src="${data.mediaUrl || 'https://via.placeholder.com/300x240/e0e0e0/6c757d?" class="post-media">
                            <div class="post-content">
                                <p class="post-desc">${data.description || '—'}</p>
                                <div class="post-tags">
                                    ${data.tags.slice(0, 3).map(t => `<span class="tag">#${t}</span>`).join('')}
                                </div>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                } else {
                    container.innerHTML = `<div class="empty-state"><i class="fas fa-user-friends"></i><h3>Пока нет постов</h3></div>`;
                }
            });
        }

        // --- Utility ---
        function searchByTag(tag) {
            document.getElementById('search-input').value = tag;
            performSearch();
        }

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // --- Init ---
        window.onload = () => {
            showHome();
            // Привязка обработчиков после рендеринга
            document.getElementById('upload-area').addEventListener('click', () => {
                document.getElementById('media-upload').click();
            });
            document.getElementById('media-upload').addEventListener('change', handleFileUpload);
        };

        // Глобальные функции для HTML
        window.handleLoginSignup = handleLoginSignup;
        window.logout = logout;
        window.showProfile = showProfile;
        window.performSearch = performSearch;
        window.selectSuggestion = selectSuggestion;
        window.searchByTag = searchByTag;
        window.uploadPost = uploadPost;
        window.addComment = addComment;
    </script>
</body>
</html>
